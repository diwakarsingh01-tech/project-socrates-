<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates Training Platform</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        socrates: {
                            primary: '#2563EB', // Blue 600
                            primaryHover: '#1D4ED8', // Blue 700
                            dark: '#0F172A', // Slate 900
                            light: '#F8FAFC', // Slate 50
                            accent: '#10B981', // Emerald 500
                            border: '#E2E8F0', // Slate 200
                            text: '#334155' // Slate 700
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #0F172A; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .card { background: white; border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.03), 0 8px 10px -6px rgba(15, 23, 42, 0.03); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-2px); box-shadow: 0 20px 30px -10px rgba(15, 23, 42, 0.06), 0 10px 15px -8px rgba(15, 23, 42, 0.06); border-color: rgba(37, 99, 235, 0.25); }
        .btn-primary { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); color: white; border-radius: 14px; padding: 12px 24px; font-weight: 700; font-size: 14px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; box-shadow: 0 4px 12px -2px rgba(37,99,235,0.25); border: none; outline: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary:hover { background: linear-gradient(135deg, #1D4ED8 0%, #1E40AF 100%); transform: translateY(-1px); box-shadow: 0 8px 16px -2px rgba(37,99,235,0.35); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline { border: 1.5px solid #E2E8F0; background: white; color: #475569; border-radius: 14px; padding: 11px 24px; font-weight: 700; font-size: 14px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-outline:hover { background: #F8FAFC; border-color: #CBD5E1; color: #0F172A; transform: translateY(-1px); }
        .btn-outline:active { transform: scale(0.98); }
        .input-field { border: 1.5px solid #E2E8F0; border-radius: 14px; padding: 12px 18px; font-size: 14px; width: 100%; outline: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: #F8FAFC; }
        .input-field:focus { border-color: #3B82F6; background: white; box-shadow: 0 0 0 4px rgba(59,130,246,0.08); }
        
        /* Premium custom hidden scrollbars for mobile drag-scrolling */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }
        .animate-fall {
            animation-name: fall;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }
        
        .backdrop-blur-header {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    {% raw %}
        const { useState, useEffect } = React;
        const socket = io();

        const fallbackQuestions = {
            'zero day': {
                question: "What is the maximum LTV ratio allowed for a standard Two-Wheeler loan?",
                options: ["75%", "85%", "90%", "100%"],
                correctIndex: 1
            },
            'six days': {
                question: "What is the minimum CIBIL score required for a 90% LTV approval?",
                options: ["650", "700", "750", "800"],
                correctIndex: 2
            },
            'twenty days': {
                question: "Which document is mandatory for a loan amount exceeding ₹2 Lakhs?",
                options: ["Electricity Bill", "Rent Agreement", "ITR / Form 16", "Passport"],
                correctIndex: 2
            }
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [empId, setEmpId] = useState('');
            const [empDetails, setEmpDetails] = useState(null);
            const [pin, setPin] = useState('');
            
            // Dynamic assessment states broadcasted by trainer
            const [activeQuestion, setActiveQuestion] = useState('');
            const [activeOptions, setActiveOptions] = useState([]);
            const [activeCorrectIndex, setActiveCorrectIndex] = useState(null);
            const [activeAssignmentDay, setActiveAssignmentDay] = useState('zero day');
            const [activeTranslations, setActiveTranslations] = useState({});
            const [activeLanguage, setActiveLanguage] = useState('en'); // 'en', 'easy', 'hindi', 'hinglish'
            
            // Student scores
            const [preTestScore, setPreTestScore] = useState(null);
            const [postTestScore, setPostTestScore] = useState(null);

            // Listen to Trainer commands via Socket.IO
            useEffect(() => {
                socket.on('change_view', (data) => {
                    if (data.view) {
                        setView(data.view);
                    }
                    if (data.question) {
                        setActiveQuestion(data.question);
                    }
                    if (data.options) {
                        setActiveOptions(data.options);
                    }
                    if (data.correctIndex !== undefined) {
                        setActiveCorrectIndex(data.correctIndex);
                    }
                    if (data.assignment_day) {
                        setActiveAssignmentDay(data.assignment_day);
                    }
                    if (data.translations) {
                        setActiveTranslations(data.translations);
                    } else {
                        setActiveTranslations({});
                    }
                    if (data.forceLanguage) {
                        setActiveLanguage(data.forceLanguage);
                    }
                });

                socket.on('force_language', (data) => {
                    if (data.language) {
                        setActiveLanguage(data.language);
                    }
                });

                return () => {
                    socket.off('change_view');
                    socket.off('force_language');
                };
            }, []);

            const renderContent = () => {
                switch(view) {
                    case 'dashboard': return <Dashboard empDetails={empDetails} />;
                    case 'pretest': 
                        return (
                            <Quiz 
                                type="Pre-Test" 
                                empId={empId} 
                                pin={pin}
                                question={activeQuestion}
                                options={activeOptions}
                                correctIndex={activeCorrectIndex}
                                assignmentDay={activeAssignmentDay}
                                translations={activeTranslations}
                                activeLanguage={activeLanguage}
                                setActiveLanguage={setActiveLanguage}
                                onScoreSubmit={(score) => setPreTestScore(score)}
                            />
                        );
                    case 'training': return <Training assignmentDay={activeAssignmentDay} />;
                    case 'posttest': 
                        return (
                            <Quiz 
                                type="Post-Test" 
                                empId={empId} 
                                pin={pin}
                                question={activeQuestion}
                                options={activeOptions}
                                correctIndex={activeCorrectIndex}
                                assignmentDay={activeAssignmentDay}
                                translations={activeTranslations}
                                activeLanguage={activeLanguage}
                                setActiveLanguage={setActiveLanguage}
                                onScoreSubmit={(score) => setPostTestScore(score)}
                            />
                        );
                    case 'result': 
                        return (
                            <Result 
                                preScore={preTestScore} 
                                postScore={postTestScore} 
                                onFinish={() => {
                                    setView('dashboard');
                                    setPreTestScore(null);
                                    setPostTestScore(null);
                                }} 
                            />
                        );
                    default: return null;
                }
            };

            if (view === 'login') {
                return (
                    <Login 
                        onLogin={(id, details, sessionPin) => { 
                            setEmpId(id); 
                            setEmpDetails(details); 
                            setPin(sessionPin);
                            setView('dashboard'); 
                            socket.emit('join_session', {pin: sessionPin, emp_id: id}); 
                        }} 
                    />
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col relative border-x border-slate-200/60 shadow-[0_0_50px_rgba(0,0,0,0.25)]">
                    {/* Glassmorphism Sticky Header */}
                    <div className="backdrop-blur-header border-b border-slate-100/80 px-5 py-4 flex justify-between items-center sticky top-0 z-50 shadow-[0_2px_8px_-3px_rgba(15,23,42,0.03)]">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white text-sm shadow-[0_3px_10px_rgba(37,99,235,0.2)]"><i className="fas fa-brain"></i></div>
                            <span className="font-outfit font-extrabold text-xl tracking-tight text-slate-900">Socrates</span>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-100/80 backdrop-blur-sm px-3.5 py-1.5 rounded-full border border-slate-200/50">
                            <span className="relative flex h-2 w-2">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                            </span>
                            <span className="text-xs text-slate-700 font-bold tracking-tight">
                                {empDetails?.emp_name ? empDetails.emp_name.split(' ')[0] : 'Trainee'}
                            </span>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-5 pb-8">
                        {renderContent()}
                    </div>
                </div>
            );
        };

        const Login = ({onLogin}) => {
            const [pin, setPin] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [selectedEmp, setSelectedEmp] = useState(null);
            const [showDropdown, setShowDropdown] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlPin = params.get('pin');
                if (urlPin) {
                    setPin(urlPin);
                }
            }, []);

            useEffect(() => {
                const term = searchQuery.trim();
                if (term.length >= 2) {
                    const uppercaseQuery = term.toUpperCase();
                    fetch(`/api/roster/search?q=${encodeURIComponent(uppercaseQuery)}`)
                        .then(res => res.json())
                        .then(data => {
                            setSearchResults(data);
                            setShowDropdown(true);
                        })
                        .catch(err => console.error("Search failed:", err));
                } else {
                    setSearchResults([]);
                    setShowDropdown(false);
                }
            }, [searchQuery]);

            const handleSelect = (emp) => {
                setSelectedEmp(emp);
                setSearchQuery(emp.emp_name);
                setShowDropdown(false);
            };

            const handleJoin = () => {
                if (!pin) {
                    alert("Please enter the 4-digit Session PIN from the trainer.");
                    return;
                }
                if (!selectedEmp) {
                    alert("Please search and select your Employee Name/Code first.");
                    return;
                }
                onLogin(selectedEmp.emp_code, selectedEmp, pin);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4">
                    <div className="card w-full max-w-sm p-8 relative overflow-visible border-none shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-white">
                        <div className="flex justify-center mb-6">
                            <div className="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-2xl flex items-center justify-center text-3xl shadow-[0_4px_20px_rgba(37,99,235,0.3)]"><i className="fas fa-brain"></i></div>
                        </div>
                        <h1 className="font-outfit font-extrabold text-2xl text-center text-slate-900 mb-1 tracking-tight">Socrates AI</h1>
                        <p className="text-xs text-center text-slate-400 mb-8 font-medium tracking-wide">Socratic Method Training Platform</p>
                        
                        <div className="space-y-5 relative">
                            <div>
                                <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest font-outfit">Session PIN</label>
                                <input 
                                    type="text" 
                                    value={pin}
                                    onChange={e => setPin(e.target.value)}
                                    placeholder="4-digit PIN" 
                                    className="input-field text-center tracking-widest font-extrabold text-2xl border-slate-200/80 bg-slate-50 focus:border-blue-500" 
                                />
                            </div>
                            
                            <div className="relative">
                                <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest font-outfit">Search Employee Profile</label>
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        placeholder="Type Name or Code..." 
                                        value={searchQuery}
                                        onChange={e => { setSearchQuery(e.target.value.toUpperCase()); setSelectedEmp(null); }}
                                        className="input-field font-semibold pr-10 uppercase border-slate-200/80 bg-slate-50 focus:border-blue-500 text-sm" 
                                    />
                                    <div className="absolute right-4 top-4 text-slate-400">
                                        <i className="fas fa-search text-xs"></i>
                                    </div>
                                </div>
                                
                                {/* Autocomplete Search Dropdown */}
                                {showDropdown && searchResults.length > 0 && (
                                    <div className="absolute left-0 right-0 mt-2 bg-white border border-slate-100 rounded-2xl shadow-[0_15px_35px_rgba(0,0,0,0.12)] z-50 max-h-56 overflow-y-auto divide-y divide-slate-50 animate-slide-up">
                                        {searchResults.map((emp) => (
                                            <div 
                                                key={emp.emp_code}
                                                onClick={() => handleSelect(emp)}
                                                className="px-4 py-3 hover:bg-blue-50/50 cursor-pointer text-xs transition-colors flex justify-between items-center"
                                            >
                                                <div className="pr-2">
                                                    <div className="font-bold text-slate-800">{emp.emp_name}</div>
                                                    <div className="text-[10px] text-slate-400 mt-0.5 font-medium">{emp.role || 'No Role'} &bull; {emp.branch_name} &bull; {emp.business_unit}</div>
                                                </div>
                                                <span className="text-[9px] font-extrabold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg border border-blue-100/50 shrink-0">{emp.emp_code}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Auto-Fetched Profile Details Card */}
                            {selectedEmp && (
                                <div className="bg-emerald-50/60 border border-emerald-100/80 rounded-2xl p-4 mt-2 animate-fade-in shadow-[inset_0_2px_4px_rgba(0,0,0,0.01)]">
                                    <div className="text-[9px] font-extrabold text-emerald-800 uppercase tracking-widest mb-2 flex items-center gap-1.5 font-outfit">
                                        <i className="fas fa-check-circle text-emerald-500 text-sm"></i> Auto-Fetched Details
                                    </div>
                                    <div className="text-sm font-extrabold text-slate-800">{selectedEmp.emp_name}</div>
                                    <div className="grid grid-cols-2 gap-y-2 gap-x-4 mt-3 text-[11px] text-slate-500 font-semibold">
                                        <div><span className="text-slate-400 font-medium">Code:</span> {selectedEmp.emp_code}</div>
                                        <div><span className="text-slate-400 font-medium">Role:</span> {selectedEmp.role || 'N/A'}</div>
                                        <div><span className="text-slate-400 font-medium">Branch:</span> {selectedEmp.branch_name}</div>
                                        <div><span className="text-slate-400 font-medium">Unit:</span> {selectedEmp.business_unit}</div>
                                        <div className="col-span-2"><span className="text-slate-400 font-medium">Division:</span> {selectedEmp.division}</div>
                                    </div>
                                </div>
                            )}
                            
                            <button 
                                onClick={handleJoin} 
                                className="w-full btn-primary mt-6 shadow-lg flex justify-center items-center gap-2"
                            >
                                Join Live Session <i className="fas fa-arrow-right text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ empDetails }) => (
            <div className="animate-fade-in">
                <div className="mb-8 mt-6 text-center">
                    <div className="w-16 h-16 bg-blue-50/80 text-blue-600 border border-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_2px_10px_rgba(37,99,235,0.06)]"><i className="fas fa-user-check text-xl"></i></div>
                    <h2 className="font-outfit font-extrabold text-2xl text-slate-900 leading-tight">Welcome, {empDetails?.emp_name ? empDetails.emp_name.split(' ')[0] : 'Executive'}</h2>
                    <p className="text-xs text-slate-400 font-bold tracking-tight mt-1">{empDetails?.role || 'Executive'} &bull; {empDetails?.emp_code} &bull; {empDetails?.branch_name}</p>
                    <p className="text-xs text-slate-500 mt-4 font-semibold px-6 leading-relaxed bg-slate-100/50 py-3 rounded-2xl border border-slate-200/30">Look at the presenter screen. The trainer will initiate the assessment shortly.</p>
                </div>
                
                <div className="card p-6 border-l-4 border-blue-600 relative overflow-hidden bg-white shadow-md">
                    <div className="absolute top-0 right-0 p-4 opacity-5"><i className="fas fa-book-open text-7xl text-blue-600"></i></div>
                    <div className="flex justify-between items-start mb-4 relative z-10">
                        <span className="text-[9px] font-extrabold text-blue-600 bg-blue-50 border border-blue-100/50 px-2.5 py-1 rounded-lg uppercase tracking-widest font-outfit">Active Refresher Session</span>
                    </div>
                    <h4 className="font-outfit font-bold text-lg text-slate-800 mb-2 relative z-10">{empDetails?.business_unit || 'Two-Wheeler'} Product Refresher</h4>
                    <p className="text-xs text-slate-500 mb-2 relative z-10 flex items-center gap-2 font-bold"><span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span> Live Connection Established</p>
                    <div className="text-[11px] text-slate-400 bg-slate-50/50 p-3 rounded-xl border border-slate-100/80 mt-5 leading-relaxed font-semibold">
                        <span className="font-bold text-slate-600 uppercase tracking-wider text-[9px] mr-1.5 font-outfit">Scope:</span> {empDetails?.division} &bull; {empDetails?.zone}
                    </div>
                </div>
            </div>
        );

        const Confetti = () => {
            const colors = ['#f59e0b', '#3b82f6', '#10b981', '#ec4899', '#8b5cf6', '#ef4444'];
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden z-40">
                    {Array.from({ length: 30 }).map((_, i) => {
                        const size = Math.random() * 8 + 6;
                        const delay = Math.random() * 2;
                        const duration = Math.random() * 3 + 2;
                        const left = Math.random() * 100;
                        const color = colors[i % colors.length];
                        return (
                            <div 
                                key={i} 
                                className="absolute rounded-sm animate-fall"
                                style={{
                                    width: `${size}px`,
                                    height: `${size}px`,
                                    backgroundColor: color,
                                    left: `${left}%`,
                                    top: `-20px`,
                                    animationDelay: `${delay}s`,
                                    animationDuration: `${duration}s`,
                                    opacity: Math.random() * 0.7 + 0.3
                                }}
                            />
                        );
                    })}
                </div>
            );
        };

        const Quiz = ({type, empId, pin, question, options, correctIndex, assignmentDay, translations, activeLanguage, setActiveLanguage, onScoreSubmit}) => {
            const [selected, setSelected] = useState(null);
            const [submitted, setSubmitted] = useState(false);
            const [scoreInfo, setScoreInfo] = useState(null);
            
            // Socratic Session Feedback States
            const [feedbackSubmitted, setFeedbackSubmitted] = useState(false);
            const [rating, setRating] = useState(0);
            const [hoverRating, setHoverRating] = useState(0);
            const [understanding, setUnderstanding] = useState('Fully Clear');
            const [manpowerSaved, setManpowerSaved] = useState('Yes, much faster!');
            const [comments, setComments] = useState('');
            const [submittingFeedback, setSubmittingFeedback] = useState(false);
            
            const qText = (translations && translations[activeLanguage] && translations[activeLanguage].question)
                ? translations[activeLanguage].question
                : (question || (fallbackQuestions[assignmentDay] ? fallbackQuestions[assignmentDay].question : fallbackQuestions['zero day'].question));
                
            const qOpts = (translations && translations[activeLanguage] && translations[activeLanguage].options && translations[activeLanguage].options.length > 0)
                ? translations[activeLanguage].options
                : ((options && options.length > 0) ? options : (fallbackQuestions[assignmentDay] ? fallbackQuestions[assignmentDay].options : fallbackQuestions['zero day'].options));
                
            const qCorrect = correctIndex !== null ? correctIndex : (fallbackQuestions[assignmentDay] ? fallbackQuestions[assignmentDay].correctIndex : fallbackQuestions['zero day'].correctIndex);
            
            useEffect(() => {
                socket.on('score_confirmation', (data) => {
                    setScoreInfo(data);
                });
                return () => {
                    socket.off('score_confirmation');
                };
            }, []);

            useEffect(() => {
                setSelected(null);
                setSubmitted(false);
                setScoreInfo(null);
                setFeedbackSubmitted(false);
                setRating(0);
                setComments('');
            }, [question]);

            const submitAnswer = () => {
                if(selected !== null) {
                    setSubmitted(true);
                    // Emit vote to Trainer Console
                    socket.emit('submit_vote', {pin: pin, emp_id: empId, answer_idx: selected});
                    
                    const score = selected === qCorrect ? 100 : 0;
                    onScoreSubmit(score);
                    
                    const payload = {
                        emp_code: empId,
                        module_id: 1, // Default module
                        assignment_day: assignmentDay,
                        session_id: pin
                    };
                    if (type === 'Pre-Test') {
                        payload.pre_test_score = score;
                    } else {
                        payload.post_test_score = score;
                    }

                    fetch('/api/assessments/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(res => res.json())
                    .then(data => {
                        console.log("Score saved:", data);
                    })
                    .catch(err => {
                        console.error("Score submission error:", err);
                    });
                }
            };
            
            const submitFeedback = () => {
                setSubmittingFeedback(true);
                fetch('/api/feedback/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        emp_code: empId,
                        session_id: pin,
                        rating: rating || 5,
                        understanding: understanding,
                        manpower_saved: manpowerSaved,
                        comments: comments
                    })
                })
                .then(res => res.json())
                .then(data => {
                    setFeedbackSubmitted(true);
                    setSubmittingFeedback(false);
                })
                .catch(err => {
                    console.error("Feedback error:", err);
                    setSubmittingFeedback(false);
                });
            };
            
            return (
                <div className="card h-full flex flex-col overflow-hidden relative min-h-[400px] border-none shadow-lg bg-white">
                    {submitted && scoreInfo && scoreInfo.is_correct && <Confetti />}

                    <div className="px-6 py-4.5 border-b border-slate-100/60 flex items-center justify-between bg-slate-50/50">
                        <div className="flex items-center gap-2">
                            <span className="relative flex h-2 w-2">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                            </span>
                            <span className="font-outfit font-extrabold text-xs tracking-wider text-slate-800 uppercase">{type}</span>
                        </div>
                        <span className="text-[10px] font-extrabold text-slate-500 bg-white px-2.5 py-1 border border-slate-200/80 rounded-lg font-outfit uppercase tracking-wider">{assignmentDay}</span>
                    </div>
                    
                    {/* Trainee Language Pill Selector (With hidden scrollbars for native feel) */}
                    <div className="px-6 py-3 bg-slate-50/20 border-b border-slate-100/60 flex items-center gap-3">
                        <span className="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest shrink-0 font-outfit"><i className="fas fa-language text-slate-400 text-xs"></i> Lang:</span>
                        <div className="flex gap-1.5 overflow-x-auto py-0.5 no-scrollbar select-none">
                            {[
                                { id: 'en', label: 'English' },
                                { id: 'hindi', label: 'हिन्दी (Hindi)' },
                                { id: 'hinglish', label: 'Hinglish' },
                                { id: 'punjabi', label: 'ਪੰਜਾਬੀ (Punjabi)' },
                                { id: 'bengali', label: 'বাংলা (Bengali)' },
                                { id: 'marathi', label: 'मराठी (Marathi)' },
                                { id: 'telugu', label: 'తెలుగు (Telugu)' },
                                { id: 'tamil', label: 'தமிழ் (Tamil)' },
                                { id: 'gujarati', label: 'ગુજરાતી (Gujarati)' },
                                { id: 'kannada', label: 'ಕನ್ನಡ (Kannada)' }
                            ].map((lang) => {
                                const isSelected = activeLanguage === lang.id;
                                return (
                                    <button
                                        key={lang.id}
                                        type="button"
                                        onClick={() => setActiveLanguage(lang.id)}
                                        className={`px-3 py-1 rounded-full text-[10px] font-extrabold border transition-all active:scale-95 whitespace-nowrap ${
                                            isSelected 
                                                ? 'bg-blue-600 border-blue-600 text-white shadow-[0_2px_8px_rgba(37,99,235,0.25)]' 
                                                : 'bg-white border-slate-200/80 text-slate-500 hover:bg-slate-50'
                                        }`}
                                    >
                                        {lang.label}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    
                    <div className="p-6 flex-1 flex flex-col justify-between">
                        {submitted ? (
                            <div className="flex-1 flex flex-col items-center justify-center text-center p-4 animate-fade-in">
                                {!scoreInfo ? (
                                    <div className="space-y-4">
                                        <div className="w-10 h-10 border-4 border-socrates-primary border-t-transparent rounded-full fa-spin mx-auto"></div>
                                        <h4 className="font-bold text-sm text-slate-600 animate-pulse">Evaluating agility scores...</h4>
                                        <p className="text-xs text-slate-400">Comparing submission speeds and verifying option mappings.</p>
                                    </div>
                                ) : scoreInfo.is_correct ? (
                                    <div className="space-y-6 w-full">
                                        <div className="w-16 h-16 bg-emerald-50 text-emerald-500 border border-emerald-100 rounded-full flex items-center justify-center text-3xl mx-auto shadow-sm animate-bounce"><i className="fas fa-check-circle"></i></div>
                                        <div>
                                            <h4 className="font-extrabold text-2xl text-emerald-600 tracking-tight">Correct Answer!</h4>
                                            <p className="text-xs text-slate-400 font-medium mt-1">Excellent agility and knowledge accuracy.</p>
                                        </div>
                                        
                                        <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 shadow-inner space-y-3 w-full text-left">
                                            <div className="flex justify-between items-center text-xs text-emerald-800 font-medium">
                                                <span>Base Reward:</span>
                                                <span className="font-bold font-mono">1000 pts</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs text-emerald-800 font-semibold border-b border-emerald-100 pb-2">
                                                <span className="flex items-center gap-1"><i className="fas fa-bolt text-amber-500 animate-pulse"></i> Speed Bonus:</span>
                                                <span className="font-bold font-mono text-emerald-600">+{scoreInfo.speed_bonus} pts</span>
                                            </div>
                                            <div className="flex justify-between items-center text-sm font-bold text-emerald-950 pt-1">
                                                <span>Points Earned:</span>
                                                <span className="font-extrabold font-mono text-lg text-socrates-accent">+{scoreInfo.points} pts</span>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 flex justify-between items-center text-xs font-bold text-slate-600">
                                            <span>Session Score:</span>
                                            <span className="font-extrabold font-mono text-sm text-socrates-dark">{scoreInfo.total_score} pts</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6 w-full">
                                        <div className="w-16 h-16 bg-red-50 text-red-500 border border-red-100 rounded-full flex items-center justify-center text-3xl mx-auto shadow-sm"><i className="fas fa-times-circle animate-pulse"></i></div>
                                        <div>
                                            <h4 className="font-extrabold text-2xl text-red-600 tracking-tight">Incorrect!</h4>
                                            <p className="text-xs text-slate-400 font-medium mt-1">Better luck in the sustainment test round.</p>
                                        </div>
                                        
                                        <div className="bg-red-50/50 border border-red-100 rounded-2xl p-5 shadow-inner space-y-2 w-full text-left">
                                            <div className="flex justify-between items-center text-xs text-red-800 font-medium">
                                                <span>Points Earned:</span>
                                                <span className="font-bold font-mono">+0 pts</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs text-red-800 font-semibold">
                                                <span>Response Speed:</span>
                                                <span className="font-bold font-mono">{scoreInfo.response_time}s</span>
                                            </div>
                                        </div>
                                        
                                    </div>
                                )}
                                
                                {type === 'Post-Test' && (
                                    <div className="mt-8 border-t border-slate-200 pt-6 animate-fade-in text-left">
                                        {feedbackSubmitted ? (
                                            <div className="bg-emerald-50/50 border border-emerald-100 rounded-2xl p-6 text-center shadow-sm">
                                                <div className="w-12 h-12 bg-white text-emerald-500 rounded-full flex items-center justify-center text-xl mx-auto shadow-sm mb-3"><i className="fas fa-heart"></i></div>
                                                <h5 className="font-extrabold text-emerald-800 text-sm">Thank You for the Feedback!</h5>
                                                <p className="text-slate-500 text-[11px] mt-1 font-medium">Your ratings and concept clarity input have been submitted successfully to the Socratic Analytics Hub.</p>
                                            </div>
                                        ) : (
                                            <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 shadow-sm space-y-4">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <i className="fas fa-comment-alt text-socrates-primary"></i>
                                                    <h5 className="font-extrabold text-socrates-dark text-sm">Socratic Session Feedback</h5>
                                                </div>
                                                
                                                {/* 1. Star Rating */}
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Rate Trainer's Clarity & Dialogue</label>
                                                    <div className="flex gap-1.5 items-center">
                                                        {[1, 2, 3, 4, 5].map((star) => (
                                                            <button
                                                                key={star}
                                                                type="button"
                                                                onClick={() => setRating(star)}
                                                                onMouseEnter={() => setHoverRating(star)}
                                                                onMouseLeave={() => setHoverRating(0)}
                                                                className="text-xl focus:outline-none transition-transform active:scale-95"
                                                            >
                                                                <i className={`fas fa-star ${
                                                                    star <= (hoverRating || rating) ? 'text-amber-400' : 'text-slate-200'
                                                                }`}></i>
                                                            </button>
                                                        ))}
                                                        {rating > 0 && (
                                                            <span className="text-[10px] font-bold text-slate-500 ml-2 bg-white px-2 py-0.5 border border-slate-200 rounded">{rating}.0 / 5.0</span>
                                                        )}
                                                    </div>
                                                </div>

                                                {/* 2. Understanding */}
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider">How clear is the policy concept now?</label>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {['Fully Clear', 'Partially Clear', 'Need Help'].map((lvl) => {
                                                            const isSel = understanding === lvl;
                                                            return (
                                                                <button
                                                                    key={lvl}
                                                                    type="button"
                                                                    onClick={() => setUnderstanding(lvl)}
                                                                    className={`px-3 py-2 rounded-xl text-[10px] font-bold border-2 transition-all ${
                                                                        isSel 
                                                                            ? 'border-socrates-primary bg-blue-50 text-socrates-primary' 
                                                                            : 'border-slate-200 bg-white text-slate-600 hover:bg-slate-50'
                                                                    }`}
                                                                >
                                                                    {lvl === 'Fully Clear' && '🟢 '}
                                                                    {lvl === 'Partially Clear' && '🟡 '}
                                                                    {lvl === 'Need Help' && '🔴 '}
                                                                    {lvl}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                </div>

                                                {/* 3. Manpower Saved */}
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Did Socratic Session save your time over standard PPT?</label>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {['Yes, much faster!', 'No, PPT is better'].map((opt) => {
                                                            const isSel = manpowerSaved === opt;
                                                            return (
                                                                <button
                                                                    key={opt}
                                                                    type="button"
                                                                    onClick={() => setManpowerSaved(opt)}
                                                                    className={`px-3 py-2 rounded-xl text-[10px] font-bold border-2 transition-all ${
                                                                        isSel 
                                                                            ? 'border-socrates-accent bg-emerald-50 text-emerald-700' 
                                                                            : 'border-slate-200 bg-white text-slate-600 hover:bg-slate-50'
                                                                    }`}
                                                                >
                                                                    {opt}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                </div>

                                                {/* 4. Comments */}
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Comments for your Socratic Trainer</label>
                                                    <textarea
                                                        value={comments}
                                                        onChange={(e) => setComments(e.target.value)}
                                                        placeholder="Write your remarks here..."
                                                        rows="2"
                                                        className="input-field py-2 text-xs bg-white text-socrates-dark border border-slate-200 focus:border-socrates-primary"
                                                    ></textarea>
                                                </div>

                                                <button
                                                    type="button"
                                                    onClick={submitFeedback}
                                                    disabled={submittingFeedback}
                                                    className="w-full btn-primary bg-gradient-to-r from-socrates-primary to-blue-600 border-none text-white py-2.5 text-xs font-bold shadow-md flex items-center justify-center gap-1.5 disabled:opacity-50"
                                                >
                                                    {submittingFeedback ? (
                                                        <i className="fas fa-spinner fa-spin"></i>
                                                    ) : (
                                                        <><i className="fas fa-check-circle"></i> Submit Feedback</>
                                                    )}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <>
                                <div>
                                    <h3 className="text-base font-bold text-slate-800 mb-6 leading-relaxed font-outfit">
                                        {qText}
                                    </h3>
                                    
                                    <div className="space-y-3">
                                        {qOpts.map((opt, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => setSelected(i)}
                                                className={`w-full text-left p-4 rounded-2xl border-2 text-xs transition-all active:scale-[0.98] flex items-center gap-4 ${selected === i ? 'border-blue-600 bg-blue-50/50 text-blue-700 font-bold shadow-[0_2px_8px_rgba(37,99,235,0.08)]' : 'border-slate-100 bg-slate-50/30 text-slate-600 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-7 h-7 rounded-xl border flex items-center justify-center text-xs font-extrabold transition-all shrink-0 ${selected === i ? 'border-blue-600 bg-blue-600 text-white' : 'border-slate-200/80 text-slate-400 bg-white'}`}>
                                                    {String.fromCharCode(65 + i)}
                                                </div>
                                                <span className="leading-snug">{opt}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="mt-8">
                                    <button 
                                        onClick={submitAnswer}
                                        disabled={selected === null}
                                        className={`w-full shadow-md flex justify-center items-center gap-2 py-3.5 text-xs ${selected !== null ? 'btn-primary bg-gradient-to-r from-blue-600 to-indigo-600' : 'btn-outline bg-slate-50 text-slate-400 border-slate-200 shadow-none'}`}

                                    >
                                        Submit Answer <i className="fas fa-paper-plane text-xs"></i>
                                    </button>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const Training = ({assignmentDay}) => (
            <div className="card h-full flex flex-col items-center justify-center p-8 text-center bg-gradient-to-b from-white to-slate-50 border-t-4 border-socrates-primary">
                <div className="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center text-4xl text-socrates-primary shadow-sm border border-blue-100 mb-6"><i className="fas fa-chalkboard-teacher"></i></div>
                <h2 className="text-xl font-bold text-socrates-dark mb-3">Gap Analysis Phase</h2>
                <p className="text-sm text-slate-500 mb-8 leading-relaxed">The trainer is currently explaining the concepts based on the Pre-Test analytics on the main screen.</p>
                
                <div className="w-full bg-white border border-slate-200 rounded-xl p-5 mb-8 text-left shadow-sm">
                    <p className="text-[11px] font-bold text-socrates-primary mb-2 uppercase tracking-widest"><i className="fas fa-lightbulb mr-1"></i> Key Takeaway</p>
                    <p className="text-sm text-slate-700 font-medium leading-relaxed">
                        {assignmentDay === 'zero day' && "Max LTV is 85%. 90% is only for CIBIL > 750 with approval."}
                        {assignmentDay === 'six days' && "Min CIBIL required for 90% LTV approval is 750."}
                        {assignmentDay === 'twenty days' && "ITR / Form 16 is strictly mandatory for any loan exceeding ₹2 Lakhs."}
                    </p>
                </div>
                
                <p className="text-xs text-slate-400 font-medium flex items-center gap-2"><i className="fas fa-circle-notch fa-spin"></i> Waiting for Post-Test...</p>
            </div>
        );

        const Result = ({preScore, postScore, onFinish}) => (
            <div className="card h-full flex flex-col items-center justify-center p-8 text-center border-t-4 border-socrates-accent">
                <div className="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center text-4xl text-socrates-accent shadow-sm border border-emerald-100 mb-6"><i className="fas fa-trophy"></i></div>
                <h2 className="text-xl font-bold text-socrates-dark mb-2">Session Complete</h2>
                <p className="text-sm text-slate-500 mb-8">Your assessment results have been recorded.</p>
                
                <div className="w-full space-y-3 mb-10">
                    <div className="flex justify-between items-center p-4 bg-slate-50 border border-slate-200 rounded-xl">
                        <span className="text-sm text-slate-600 font-medium">Pre-Test Score</span>
                        <span className="font-bold text-base text-socrates-dark">{preScore !== null ? `${preScore}%` : 'N/A'}</span>
                    </div>
                    <div className="flex justify-between items-center p-4 bg-emerald-50 border border-emerald-200 rounded-xl shadow-sm">
                        <span className="text-sm text-emerald-800 font-bold">Post-Test Score</span>
                        <span className="font-bold text-lg text-emerald-600">{postScore !== null ? `${postScore}%` : 'N/A'}</span>
                    </div>
                </div>
                
                <button onClick={onFinish} className="w-full btn-primary">
                    Return to Dashboard
                </button>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    {% endraw %}
    </script>
</body>
</html>
