<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socrates Training Platform</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        socrates: {
                            primary: '#D97706',
                            primaryHover: '#B45309',
                            dark: '#090D16',
                            light: '#F3F6FA',
                            accent: '#10B981',
                            border: 'rgba(255,255,255,0.06)',
                            text: '#F8FAFC'
                        }
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                        inter: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #090D16; 
            color: #F8FAFC;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Lock scroll to internal containers */
            -webkit-tap-highlight-color: transparent;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }
        
        .card { 
            background: rgba(13, 17, 28, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5), inset 0 1px 0 0 rgba(255, 255, 255, 0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            backdrop-filter: blur(20px);
        }

        .btn-primary { 
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 50%, #B45309 100%); 
            color: #090D16; 
            border-radius: 18px; 
            padding: 14px 28px; 
            font-weight: 800; 
            font-size: 15px; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            box-shadow: 0 4px 20px -2px rgba(217,119,6,0.3); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            outline: none; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:active { transform: scale(0.97); }

        .btn-outline { 
            border: 1.5px solid rgba(255, 255, 255, 0.08); 
            background: rgba(255, 255, 255, 0.02); 
            color: #E2E8F0; 
            border-radius: 18px; 
            padding: 13px 28px; 
            font-weight: 700; 
            font-size: 15px; 
            transition: all 0.2s ease; 
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .input-field { 
            border: 1.5px solid rgba(255, 255, 255, 0.05); 
            border-radius: 18px; 
            padding: 14px 20px; 
            font-size: 15px; 
            width: 100%; 
            outline: none; 
            transition: all 0.25s ease; 
            background: rgba(255, 255, 255, 0.03); 
            color: #F8FAFC;
        }
        .input-field:focus { 
            border-color: #D97706; 
            background: rgba(255, 255, 255, 0.05); 
            box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.15); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }
        .animate-fall { animation: fall linear infinite; }
        
        .backdrop-blur-header {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background-color: rgba(9, 13, 22, 0.7);
        }

        /* Auto-set height helper */
        .vh-fix { height: 100dvh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    {% raw %}
        const { useState, useEffect, useRef } = React;
        const socket = io();

        const cleanQuestionText = (text) => {
            if (typeof text !== 'string') return text;
            return text.replace(/^\[[^\]]+\]\s*/g, '').trim();
        };

        const cleanOptionText = (opt) => {
            if (typeof opt !== 'string') return opt;
            return opt.replace(/^(Option\s+[A-D][:.-]?\s*|[A-D][:.-]\s*)/i, '').trim();
        };

        const fallbackQuestions = {
            'zero day': {
                question: "What is the maximum LTV ratio allowed for a standard Two-Wheeler loan?",
                options: ["75%", "85%", "90%", "100%"],
                correctIndex: 1
            },
            'six days': {
                question: "What is the minimum CIBIL score required for a 90% LTV approval?",
                options: ["650", "700", "750", "800"],
                correctIndex: 2
            },
            'twenty days': {
                question: "Which document is mandatory for a loan amount exceeding ₹2 Lakhs?",
                options: ["Electricity Bill", "Rent Agreement", "ITR / Form 16", "Passport"],
                correctIndex: 2
            }
        };

        const App = () => {
            const [view, setView] = useState(() => localStorage.getItem('socrates_view') || 'login'); 
            const [empId, setEmpId] = useState(() => localStorage.getItem('socrates_empId') || '');
            const [empDetails, setEmpDetails] = useState(() => {
                const saved = localStorage.getItem('socrates_empDetails');
                return saved ? JSON.parse(saved) : null;
            });
            const [pin, setPin] = useState(() => localStorage.getItem('socrates_pin') || '');

            useEffect(() => {
                const urlPin = new URLSearchParams(window.location.search).get('pin');
                if (urlPin) setPin(urlPin);
            }, []);
            const [activeQuestion, setActiveQuestion] = useState(() => localStorage.getItem('socrates_activeQuestion') || '');
            const [activeQIdx, setActiveQIdx] = useState(() => parseInt(localStorage.getItem('socrates_activeQIdx') || '-1'));
            const [activeOptions, setActiveOptions] = useState(() => {
                const saved = localStorage.getItem('socrates_activeOptions');
                return saved ? JSON.parse(saved) : [];
            });
            const [activeCorrectIndex, setActiveCorrectIndex] = useState(() => {
                const saved = localStorage.getItem('socrates_activeCorrectIndex');
                return saved !== null ? parseInt(saved) : null;
            });
            const [activeAssignmentDay, setActiveAssignmentDay] = useState(() => localStorage.getItem('socrates_activeAssignmentDay') || 'zero day');
            const [activeTranslations, setActiveTranslations] = useState(() => {
                const saved = localStorage.getItem('socrates_activeTranslations');
                return saved ? JSON.parse(saved) : {};
            });
            const [activeLanguage, setActiveLanguage] = useState('en');
            const [hasSubmittedCurrent, setHasSubmittedCurrent] = useState(() => localStorage.getItem('socrates_hasSubmittedCurrent') === 'true');
            
            const [correctCount, setCorrectCount] = useState(() => parseInt(localStorage.getItem('socrates_correctCount') || '0'));
            const [wrongCount, setWrongCount] = useState(() => parseInt(localStorage.getItem('socrates_wrongCount') || '0'));
            const [unattemptedCount, setUnattemptedCount] = useState(() => parseInt(localStorage.getItem('socrates_unattemptedCount') || '0'));
            const [totalQuestions, setTotalQuestions] = useState(() => parseInt(localStorage.getItem('socrates_totalQuestions') || '0'));

            const [preTestScore, setPreTestScore] = useState(null);
            const [postTestScore, setPostTestScore] = useState(null);

            // MISSION-CRITICAL: Use refs to access current state inside socket listeners without re-registering
            // This prevents the "blank question" or "stuck question" issue by keeping listeners stable.
            const viewRef = useRef(view);
            const questionRef = useRef(activeQuestion);
            const qIdxRef = useRef(activeQIdx);
            const subRef = useRef(hasSubmittedCurrent);

            useEffect(() => { viewRef.current = view; }, [view]);
            useEffect(() => { questionRef.current = activeQuestion; }, [activeQuestion]);
            useEffect(() => { qIdxRef.current = activeQIdx; }, [activeQIdx]);
            useEffect(() => { subRef.current = hasSubmittedCurrent; }, [hasSubmittedCurrent]);

            useEffect(() => {
                socket.on('change_view', (data) => {
                    const cView = viewRef.current;
                    const cQuestion = questionRef.current;
                    const cQIdx = qIdxRef.current;
                    const cHasSub = subRef.current;

                    if (data.view) {
                        // Increment unattempted if user is moving away from an unanswered question
                        if ((cView === 'pretest' || cView === 'posttest') && !cHasSub && cQuestion && !data.sync) setUnattemptedCount(prev => prev + 1);
                        setView(data.view);
                    }

                    // Priority check: Use question_idx if available, otherwise fallback to question text
                    const isNewQ = (data.question_idx !== undefined && data.question_idx !== cQIdx) || 
                                   (data.question && data.question !== cQuestion);

                    if (isNewQ) {
                        if (!cHasSub && cQuestion && !data.sync) setUnattemptedCount(prev => prev + 1);
                        setActiveQuestion(data.question || '');
                        if (data.question_idx !== undefined) setActiveQIdx(data.question_idx);
                        if (!data.sync) setTotalQuestions(prev => prev + 1);
                        setHasSubmittedCurrent(false);
                    }

                    if (data.options) setActiveOptions(data.options);
                    if (data.correctIndex !== undefined) setActiveCorrectIndex(data.correctIndex);
                    if (data.assignment_day) setActiveAssignmentDay(data.assignment_day);
                    if (data.translations) setActiveTranslations(data.translations); else if (data.question) setActiveTranslations({});
                    if (data.forceLanguage) setActiveLanguage(data.forceLanguage);
                });

                socket.on('client_command', (data) => {
                    if (data.command === 'reset_scores') {
                        setCorrectCount(0); setWrongCount(0); setUnattemptedCount(0); setTotalQuestions(0); setHasSubmittedCurrent(false);
                        setActiveQIdx(-1);
                        localStorage.removeItem('socrates_correctCount');
                        localStorage.removeItem('socrates_activeQIdx');
                    }
                });

                return () => { socket.off('change_view'); socket.off('client_command'); };
            }, []);

            useEffect(() => {
                localStorage.setItem('socrates_view', view);
                localStorage.setItem('socrates_empId', empId || '');
                localStorage.setItem('socrates_empDetails', JSON.stringify(empDetails));
                localStorage.setItem('socrates_pin', pin || '');
                localStorage.setItem('socrates_activeQuestion', activeQuestion || '');
                localStorage.setItem('socrates_activeQIdx', activeQIdx.toString());
                localStorage.setItem('socrates_activeOptions', JSON.stringify(activeOptions));
                localStorage.setItem('socrates_activeCorrectIndex', activeCorrectIndex);
                localStorage.setItem('socrates_activeAssignmentDay', activeAssignmentDay || '');
                localStorage.setItem('socrates_activeTranslations', JSON.stringify(activeTranslations));
                localStorage.setItem('socrates_correctCount', correctCount);
                localStorage.setItem('socrates_wrongCount', wrongCount);
                localStorage.setItem('socrates_unattemptedCount', unattemptedCount);
                localStorage.setItem('socrates_totalQuestions', totalQuestions);
                localStorage.setItem('socrates_hasSubmittedCurrent', hasSubmittedCurrent.toString());
            }, [view, empId, empDetails, pin, activeQuestion, activeQIdx, activeOptions, activeCorrectIndex, activeAssignmentDay, activeTranslations, correctCount, wrongCount, unattemptedCount, totalQuestions, hasSubmittedCurrent]);

            const renderContent = () => {
                switch(view) {
                    case 'dashboard': return <Dashboard empDetails={empDetails} assignmentDay={activeAssignmentDay} />;
                    case 'pretest': 
                    case 'posttest': 
                        return (
                            <Quiz 
                                type={view === 'pretest' ? "Pre-Test" : "Post-Test"}
                                empId={empId} pin={pin} question={activeQuestion} options={activeOptions} correctIndex={activeCorrectIndex}
                                assignmentDay={activeAssignmentDay} translations={activeTranslations} activeLanguage={activeLanguage}
                                setActiveLanguage={setActiveLanguage} counts={{correctCount, wrongCount, unattemptedCount, totalQuestions}}
                                onScoreSubmit={(score, isCorrect) => {
                                    if (isCorrect) setCorrectCount(prev => prev + 1); else setWrongCount(prev => prev + 1);
                                    if (view === 'pretest') setPreTestScore(score); else setPostTestScore(score);
                                    setHasSubmittedCurrent(true);
                                }}
                            />
                        );
                    case 'training': return <Training assignmentDay={activeAssignmentDay} />;
                    case 'result': 
                        return (
                            <Result 
                                preScore={preTestScore} postScore={postTestScore} counts={{correctCount, wrongCount, unattemptedCount, totalQuestions}}
                                onFinish={() => {
                                    setView('dashboard'); setCorrectCount(0); setWrongCount(0); setUnattemptedCount(0); setTotalQuestions(0);
                                    localStorage.clear();
                                }} 
                            />
                        );
                    default: return null;
                }
            };

            if (view === 'login') return <Login onLogin={(id, details, sessionPin) => { setEmpId(id); setEmpDetails(details); setPin(sessionPin); setView('dashboard'); socket.emit('join_session', {pin: sessionPin, emp_id: id}); }} />;

            return (
                <div className="w-full h-[100dvh] bg-[#090D16] flex flex-col relative overflow-hidden transition-all duration-300">
                    {/* Ambient glows inside classroom */}
                    <div className="absolute top-1/4 left-1/4 w-[35rem] h-[35rem] bg-amber-500/5 rounded-full blur-[140px] pointer-events-none"></div>
                    <div className="absolute bottom-1/4 right-1/4 w-[35rem] h-[35rem] bg-yellow-500/3 rounded-full blur-[140px] pointer-events-none"></div>
                    
                    <div className="backdrop-blur-header border-b border-white/5 px-6 py-4 flex justify-between items-center z-50 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-amber-500 to-yellow-600 rounded-2xl flex items-center justify-center text-[#090D16] text-base shadow-lg shadow-amber-500/10 border border-white/10"><i className="fas fa-brain"></i></div>
                            <span className="font-outfit font-extrabold text-xl tracking-tight text-white">Socrates</span>
                        </div>
                        <div className="flex items-center gap-2.5 bg-white/5 backdrop-blur-xl px-4 py-2 rounded-2xl border border-white/5 shadow-md">
                            <span className="relative flex h-2.5 w-2.5">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#10B981] opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#10B981]"></span>
                            </span>
                            <span className="text-[11px] text-slate-200 font-black tracking-wider uppercase">{empDetails?.emp_name?.split(' ')[0] || 'Trainee'}</span>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 md:p-6 w-full max-w-2xl mx-auto flex flex-col no-scrollbar z-10">
                        {renderContent()}
                    </div>
                </div>
            );
        };

        // Moved outside App to avoid TDZ and prevent React remount on every render
        const Login = ({onLogin}) => {
            const [pin, setPin] = useState('');

            useEffect(() => {
                const urlPin = new URLSearchParams(window.location.search).get('pin');
                if (urlPin) setPin(urlPin);
            }, []);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [selectedEmp, setSelectedEmp] = useState(null);
            const [showDropdown, setShowDropdown] = useState(false);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            useEffect(() => {
                const term = searchQuery.trim();
                if (term.length >= 2) {
                    fetch(`/api/roster/search?q=${encodeURIComponent(term.toUpperCase())}`)
                        .then(res => res.json()).then(data => { setSearchResults(data); setShowDropdown(true); });
                } else setShowDropdown(false);
            }, [searchQuery]);

            return (
                <div className="w-full h-[100dvh] bg-[#090D16] flex flex-col relative overflow-hidden">
                    {/* Highly responsive dynamic glow */}
                    <div className="absolute pointer-events-none rounded-full blur-[130px] opacity-35 transition-opacity duration-300" style={{
                        left: `${mousePos.x}px`,
                        top: `${mousePos.y}px`,
                        width: '450px',
                        height: '450px',
                        background: 'radial-gradient(circle, rgba(217,119,6,0.15) 0%, rgba(234,179,8,0.04) 50%, transparent 100%)',
                        transform: 'translate(-50%, -50%)',
                        zIndex: 1
                    }}></div>

                    <div className="absolute top-1/6 left-1/5 w-96 h-96 bg-amber-500/[0.03] rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-1/6 right-1/5 w-96 h-96 bg-yellow-500/[0.02] rounded-full blur-[120px] pointer-events-none"></div>

                    <div className="border-b border-white/5 px-6 py-4 flex justify-between items-center z-50 shrink-0 bg-[#090D16]/40 backdrop-blur-md">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-amber-500 to-yellow-600 rounded-2xl flex items-center justify-center text-[#090D16] text-base shadow-lg shadow-amber-500/10 border border-white/10"><i className="fas fa-brain"></i></div>
                            <span className="font-outfit font-extrabold text-xl tracking-tight text-white">Socrates AI</span>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto flex flex-col justify-center p-6 w-full max-w-md mx-auto z-10">
                        <div className="bg-slate-950/70 border border-white/5 backdrop-blur-2xl rounded-[2.5rem] shadow-3xl p-8 space-y-6 transition-all duration-300 hover:border-amber-500/20 shadow-amber-500/5">
                            <div className="text-center space-y-1">
                                <h2 className="font-outfit font-black text-2xl text-white tracking-tight">Executive Login</h2>
                                <p className="text-slate-400 font-bold text-[10px] tracking-widest uppercase">Institutional Training Portal</p>
                            </div>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Session Access PIN</label>
                                    <input type="text" value={pin} onChange={e => setPin(e.target.value)} placeholder="0000" className="w-full bg-[#0D111C]/60 border border-white/5 focus:border-[#D97706] rounded-2xl px-4 py-3 text-center tracking-[0.5em] font-black text-3xl text-slate-100 outline-none transition-all focus:ring-4 focus:ring-amber-500/10" />
                                </div>
                                <div className="relative">
                                    <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Find Your Profile</label>
                                    <input type="text" placeholder="NAME OR EMPLOYEE CODE" value={searchQuery} onChange={e => setSearchQuery(e.target.value.toUpperCase())} className="w-full bg-[#0D111C]/60 border border-white/5 focus:border-[#D97706] rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 outline-none transition-all focus:ring-4 focus:ring-amber-500/10 font-bold uppercase" />
                                    {showDropdown && searchResults.length > 0 && (
                                        <div className="absolute left-0 right-0 mt-2 bg-slate-950 border border-white/5 rounded-2xl shadow-2xl z-50 max-h-60 overflow-y-auto divide-y divide-white/5 backdrop-blur-xl">
                                            {searchResults.map((emp) => (
                                                <div key={emp.emp_code} onClick={() => { setSelectedEmp(emp); setSearchQuery(emp.emp_name); setShowDropdown(false); }} className="px-4 py-4 hover:bg-white/5 transition-colors cursor-pointer flex justify-between items-center">
                                                    <div>
                                                        <div className="font-black text-slate-200 text-xs">{emp.emp_name}</div>
                                                        <div className="text-[10px] text-slate-500 font-bold uppercase mt-0.5">{emp.branch_name} &bull; {emp.business_unit}</div>
                                                    </div>
                                                    <span className="text-[10px] font-black text-amber-400 bg-amber-500/10 px-2.5 py-1.5 rounded-xl border border-amber-500/20">{emp.emp_code}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                {selectedEmp && (
                                    <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4 animate-fade-in">
                                        <div className="text-[9px] font-black text-emerald-400 uppercase tracking-widest mb-1 flex items-center gap-1.5"><i className="fas fa-check-circle"></i> Profile Matched</div>
                                        <div className="text-xs font-black text-slate-200 uppercase">{selectedEmp.emp_name} ({selectedEmp.emp_code})</div>
                                    </div>
                                )}
                                <button onClick={() => selectedEmp && pin && onLogin(selectedEmp.emp_code, selectedEmp, pin)} className="w-full bg-gradient-to-r from-amber-600 to-yellow-600 hover:from-amber-500 hover:to-yellow-500 text-slate-950 rounded-xl h-14 font-extrabold text-base transition-all active:scale-[0.98] shadow-lg shadow-amber-500/10 flex items-center justify-center gap-2 mt-6 uppercase tracking-wider">
                                    <span>Enter Classroom</span>
                                    <i className="fas fa-door-open text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ empDetails, assignmentDay }) => (
            <div className="animate-fade-in flex flex-col gap-6 mt-2">
                <div className="text-center md:text-left bg-white/5 backdrop-blur-xl p-6 sm:p-8 rounded-3xl sm:rounded-[32px] border border-white/5 shadow-xl space-y-4">
                    <div className="w-16 h-16 sm:w-20 sm:h-20 bg-amber-500/10 text-amber-500 border border-amber-500/20 rounded-2xl sm:rounded-3xl flex items-center justify-center text-2xl sm:text-3xl mx-auto md:mx-0 shadow-inner"><i className="fas fa-id-badge"></i></div>
                    <div>
                        <h2 className="font-outfit font-black text-2xl sm:text-3xl text-white leading-tight">Welcome, {empDetails?.emp_name?.split(' ')[0] || 'Executive'}</h2>
                        <p className="text-[10px] sm:text-[11px] text-slate-400 font-black uppercase tracking-widest mt-1">{empDetails?.role || 'Executive'} &bull; {empDetails?.branch_name}</p>
                    </div>
                    <div className="bg-white/[0.02] p-4 rounded-xl sm:rounded-2xl border border-white/5 text-center md:text-left">
                        <p className="text-xs text-slate-300 font-bold leading-relaxed">Stay tuned to the main screen. Your Socratic Trainer will begin the live module shortly.</p>
                    </div>
                </div>
                <div className="bg-gradient-to-br from-amber-500/10 via-amber-500/5 to-transparent border-l-8 sm:border-l-[12px] border-amber-500 rounded-[2rem] p-6 sm:p-8 shadow-xl border border-white/5 relative overflow-hidden flex flex-col justify-center min-h-[160px] sm:min-h-[180px]">
                    <div className="absolute -top-4 -right-4 opacity-[0.03] rotate-12 text-[100px] sm:text-[120px] text-amber-500"><i className="fas fa-book-open"></i></div>
                    <span className="text-[9px] sm:text-[10px] font-black text-amber-400 bg-amber-500/10 border border-amber-500/20 w-fit px-3 py-1.5 rounded-full uppercase tracking-widest mb-3 sm:mb-4">Live Module Status</span>
                    <h4 className="font-outfit font-black text-lg sm:text-xl text-white">{assignmentDay?.toUpperCase() || 'GENERAL'} REFRESHER SESSION</h4>
                    <p className="text-xs text-slate-300 mt-2 font-bold flex items-center gap-2"><span className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span> Cloud Link Active</p>
                </div>
            </div>
        );

        const Confetti = () => {
            const colors = ['#d97706', '#f59e0b', '#10b981', '#fbbf24', '#f59e0b', '#f8fafc'];
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden z-40">
                    {Array.from({ length: 40 }).map((_, i) => (
                        <div key={i} className="absolute rounded-sm animate-fall" style={{ width: `${Math.random()*8+6}px`, height: `${Math.random()*8+6}px`, backgroundColor: colors[i % 6], left: `${Math.random()*100}%`, top: `-20px`, animationDelay: `${Math.random()*2}s`, animationDuration: `${Math.random()*3+2}s`, opacity: Math.random()*0.7+0.3 }} />
                    ))}
                </div>
            );
        };

        const Quiz = ({type, empId, pin, question, options, correctIndex, assignmentDay, translations, activeLanguage, setActiveLanguage, counts, onScoreSubmit}) => {
            const [selected, setSelected] = useState(null);
            const [submitted, setSubmitted] = useState(false);
            const [scoreInfo, setScoreInfo] = useState(null);
            const [feedbackSubmitted, setFeedbackSubmitted] = useState(false);
            const [understanding, setUnderstanding] = useState('Fully Clear');
            const [manpowerSaved, setManpowerSaved] = useState('Yes, much faster!');
            
            const qText = cleanQuestionText((translations?.[activeLanguage]?.question) || question || (fallbackQuestions[assignmentDay]?.question) || fallbackQuestions['zero day'].question);
            const qOpts = ((translations?.[activeLanguage]?.options) || (options?.length ? options : (fallbackQuestions[assignmentDay]?.options || fallbackQuestions['zero day'].options))).map(cleanOptionText);
            const qCorrect = correctIndex !== null ? correctIndex : (fallbackQuestions[assignmentDay]?.correctIndex || 1);
            
            useEffect(() => {
                socket.on('score_confirmation', (data) => setScoreInfo(data));
                return () => socket.off('score_confirmation');
            }, []);

            useEffect(() => { setSelected(null); setSubmitted(false); setScoreInfo(null); setFeedbackSubmitted(false); }, [question]);

            const submitAnswer = () => {
                if(selected === null) return;
                setSubmitted(true);
                socket.emit('submit_vote', {pin, emp_id: empId, answer_idx: selected});
                const isCorrect = selected === qCorrect;
                onScoreSubmit(100, isCorrect);
                fetch('/api/assessments/submit', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emp_code: empId, module_id: 1, assignment_day: assignmentDay, session_id: pin, correct_count: isCorrect ? counts.correctCount + 1 : counts.correctCount, wrong_count: !isCorrect ? counts.wrongCount + 1 : counts.wrongCount, unattempted_count: counts.unattemptedCount, total_questions: counts.totalQuestions, [type === 'Pre-Test' ? 'pre_test_score' : 'post_test_score']: 100 })
                });
            };
            
            return (
                <div className="bg-slate-900/40 backdrop-blur-xl flex-1 flex flex-col overflow-hidden relative border border-white/5 shadow-2xl rounded-[2rem] mb-4 animate-fade-in">
                    {submitted && scoreInfo?.is_correct && <Confetti />}
                    <div className="px-6 py-5 border-b border-white/5 flex items-center justify-between bg-slate-950/40 shrink-0">
                        <div className="flex items-center gap-2.5">
                            <span className="w-3 h-3 bg-rose-500 rounded-full animate-pulse"></span>
                            <span className="font-outfit font-black text-[13px] tracking-widest text-slate-200 uppercase">{type}</span>
                        </div>
                        <span className="text-[10px] font-black text-amber-400 bg-amber-500/10 px-3 py-1.5 border border-amber-500/20 rounded-xl uppercase tracking-widest">{assignmentDay}</span>
                    </div>
                    <div className="px-6 py-4 bg-slate-950/20 border-b border-white/5 flex items-center gap-3 shrink-0 overflow-x-auto no-scrollbar">
                        <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest shrink-0"><i className="fas fa-language mr-1"></i> Lang:</span>
                        {['en', 'hindi', 'hinglish', 'punjabi', 'bengali', 'marathi', 'telugu', 'tamil', 'gujarati', 'kannada'].map(l => (
                            <button key={l} onClick={() => setActiveLanguage(l)} className={`px-4 py-1.5 rounded-full text-[10px] font-black border transition-all whitespace-nowrap ${activeLanguage === l ? 'bg-amber-500 border-amber-500 text-slate-950 font-extrabold shadow-lg shadow-amber-500/25' : 'bg-white/5 border-white/5 text-slate-400 hover:bg-white/10'}`}>{l.toUpperCase()}</button>
                        ))}
                    </div>
                    <div className="p-6 md:p-8 flex-1 overflow-y-auto no-scrollbar">
                        {submitted ? (
                            <div className="h-full flex flex-col items-center justify-center text-center p-4 animate-fade-in w-full max-w-xl mx-auto space-y-8">
                                {!scoreInfo ? (
                                    <div className="space-y-4"><div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto"></div><h4 className="font-black text-sm text-slate-400 animate-pulse uppercase tracking-widest">Evaluating response...</h4></div>
                                ) : (
                                    <div className="space-y-8 w-full">
                                        <div className={`w-24 h-24 rounded-[32px] flex items-center justify-center text-5xl mx-auto shadow-xl ${scoreInfo.is_correct ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 animate-bounce' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}`}><i className={`fas ${scoreInfo.is_correct ? 'fa-check-circle' : 'fa-times-circle'}`}></i></div>
                                        <div className="space-y-2">
                                            <h4 className={`font-outfit font-black text-3xl tracking-tight ${scoreInfo.is_correct ? 'text-emerald-400' : 'text-rose-400'}`}>{scoreInfo.is_correct ? 'CORRECT!' : 'INCORRECT'}</h4>
                                            <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">{scoreInfo.is_correct ? 'Institutional Knowledge Verified' : 'Concept Needs Trainer Review'}</p>
                                        </div>
                                        <div className="bg-white/5 rounded-3xl p-6 border border-white/5 flex justify-between items-center"><span className="text-xs font-black text-slate-400 uppercase tracking-widest">Current Accuracy</span><span className="font-outfit font-black text-2xl text-white">{scoreInfo.total_score} PTS</span></div>
                                    </div>
                                )}
                                {type === 'Post-Test' && (
                                    <div className="w-full pt-8 border-t border-white/5 animate-fade-in">
                                        {feedbackSubmitted ? <div className="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-3xl text-emerald-400 font-black text-sm uppercase tracking-widest shadow-inner"><i className="fas fa-heart mr-2"></i> Feedback Received</div> : (
                                            <div className="space-y-6 text-left">
                                                <h5 className="font-outfit font-black text-white uppercase tracking-widest text-xs border-l-4 border-amber-500 pl-3">Session Feedback</h5>
                                                <div className="grid grid-cols-3 gap-3">{['Fully Clear', 'Partially', 'Need Help'].map(l => (
                                                    <button key={l} onClick={() => setUnderstanding(l)} className={`p-4 rounded-2xl text-[10px] font-black border-2 transition-all ${understanding===l?'border-amber-500 bg-amber-500/10 text-amber-400':'border-white/5 bg-white/5 text-slate-400 hover:bg-white/10'}`}>{l.toUpperCase()}</button>
                                                ))}</div>
                                                <button onClick={() => { setFeedbackSubmitted(true); fetch('/api/feedback/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({emp_code:empId, session_id:pin, rating:5, understanding, manpower_saved:manpowerSaved, comments:''}) }); }} className="w-full btn-primary h-14 text-sm tracking-widest">SUBMIT FEEDBACK <i className="fas fa-check-circle ml-2"></i></button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="flex flex-col h-full justify-between gap-10">
                                <div className="space-y-8">
                                    <h3 className="text-xl md:text-2xl font-outfit font-black text-white leading-tight text-center md:text-left">{qText}</h3>
                                    <div className="grid grid-cols-1 gap-4">
                                        {qOpts.map((opt, i) => (
                                            <button key={i} onClick={() => setSelected(i)} className={`w-full text-left p-4 sm:p-5 md:p-6 rounded-2xl sm:rounded-[24px] border-2 transition-all active:scale-[0.98] flex items-center gap-4 sm:gap-5 ${selected === i ? 'border-amber-500 bg-amber-500/10 shadow-2xl shadow-amber-500/5' : 'border-white/5 bg-white/5 hover:border-white/10 hover:bg-white/10'}`}>
                                                <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-xl sm:rounded-2xl border-2 flex items-center justify-center text-xs sm:text-sm font-black transition-all shrink-0 ${selected === i ? 'border-amber-500 bg-amber-500 text-slate-950 font-black shadow-lg shadow-amber-500/35' : 'border-white/10 text-slate-400 bg-white/5'}`}>{String.fromCharCode(65 + i)}</div>
                                                <span className={`text-[12px] sm:text-[13px] leading-snug font-bold ${selected === i ? 'text-amber-400 font-extrabold' : 'text-slate-300'}`}>{opt}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="sticky bottom-0 bg-transparent pt-4 pb-[calc(8px+env(safe-area-inset-bottom))]"><button onClick={submitAnswer} disabled={selected === null} className={`w-full h-14 sm:h-16 rounded-2xl sm:rounded-[24px] font-black text-sm sm:text-base tracking-widest transition-all ${selected !== null ? 'btn-primary shadow-xl shadow-amber-500/25' : 'bg-white/5 text-slate-600 border border-white/5 cursor-not-allowed uppercase'}`}>CONFIRM SELECTION <i className="fas fa-bolt ml-2"></i></button></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Training = ({assignmentDay}) => (
            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-8 animate-fade-in">
                <div className="w-24 h-24 bg-amber-50 text-slate-950 rounded-[32px] flex items-center justify-center text-4xl shadow-2xl shadow-amber-500/30 animate-pulse"><i className="fas fa-chalkboard-teacher"></i></div>
                <div className="space-y-2">
                    <h2 className="font-outfit font-black text-3xl text-white uppercase tracking-tighter">Gap Analysis</h2>
                    <p className="text-slate-400 font-bold text-xs uppercase tracking-[0.2em]">Live Training Phase</p>
                </div>
                <div className="bg-white/5 backdrop-blur-xl w-full p-8 border border-white/5 shadow-2xl rounded-[2rem] text-left space-y-4">
                    <div className="text-[10px] font-black text-amber-400 bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-full w-fit uppercase tracking-widest">Key Takeaway</div>
                    <p className="text-base text-slate-200 font-bold leading-relaxed">{assignmentDay === 'zero day' ? "Max LTV 85%. 90% only for CIBIL > 750." : assignmentDay === 'six days' ? "Min CIBIL 750 for 90% LTV." : "ITR strictly mandatory for loans > ₹2L."}</p>
                </div>
                <div className="flex items-center gap-3 text-[10px] font-black text-slate-400 uppercase tracking-widest"><i className="fas fa-circle-notch fa-spin"></i> Awaiting Next Protocol</div>
            </div>
        );

        const Result = ({preScore, postScore, counts, onFinish}) => (
            <div className="flex-1 flex flex-col items-center justify-center p-6 text-center space-y-10 animate-fade-in">
                <div className="w-28 h-28 bg-gradient-to-tr from-amber-500 to-yellow-400 text-[#090D16] rounded-[40px] flex items-center justify-center text-5xl shadow-2xl shadow-amber-500/20 animate-bounce"><i className="fas fa-trophy"></i></div>
                <div className="space-y-2">
                    <h2 className="font-outfit font-black text-3xl text-white tracking-tight">MISSION COMPLETE</h2>
                    <p className="text-slate-400 font-bold text-xs uppercase tracking-[0.3em]">Knowledge Metrics Recorded</p>
                </div>
                <div className="grid grid-cols-3 gap-4 w-full">
                    {[ 
                        {l:'CORRECT', v:counts.correctCount, border:'border-emerald-500/20 text-emerald-400 bg-emerald-500/5'}, 
                        {l:'WRONG', v:counts.wrongCount, border:'border-rose-500/20 text-rose-400 bg-rose-500/5'}, 
                        {l:'UNATTEMPTED', v:counts.unattemptedCount, border:'border-slate-500/20 text-slate-400 bg-slate-500/5'} 
                    ].map(s => (
                        <div key={s.l} className={`p-5 rounded-[32px] border ${s.border} shadow-sm space-y-1`}>
                            <div className="text-[9px] font-black uppercase tracking-widest">{s.l}</div>
                            <div className="text-3xl font-black text-white font-outfit">{s.v}</div>
                        </div>
                    ))}
                </div>
                <button onClick={onFinish} className="w-full h-16 btn-primary shadow-amber-500/25 text-base font-black tracking-widest">DASHBOARD EXIT <i className="fas fa-home ml-2"></i></button>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    {% endraw %}
    </script>
</body>
</html>
