        const AccessMgmtView = ({user}) => {
            const isSuperAdmin = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'superadmin';
            const isLeader = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'leader';
            const [trainers, setTrainers] = useState([]);
            const [tid, setTid] = useState('');
            const [name, setName] = useState('');
            const [password, setPassword] = useState('password123');
            const [zone, setZone] = useState('ALL');
            const [role, setRole] = useState('Trainer');

            // Edit Modal States
            const [showEditModal, setShowEditModal] = useState(false);
            const [editTid, setEditTid] = useState('');
            const [editName, setEditName] = useState('');
            const [editPassword, setEditPassword] = useState('');
            const [editRole, setEditRole] = useState('Trainer');

            const loadTrainers = () => {
                fetch('/api/trainers')
                    .then(res => res.json())
                    .then(data => setTrainers(data))
                    .catch(err => {
                        console.error("Fetch trainers failed, offline fallback:", err);
                        setTrainers(db.get('s_trainers') || []);
                    });
            };

            useEffect(() => { 
                loadTrainers(); 
            }, []);

            const handleToggle = (id, currentStatus) => {
                const newStatus = currentStatus === 'Active' ? 'Revoked' : 'Active';
                fetch(`/api/trainers/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadTrainers();
                    } else {
                        alert("Failed to update trainer status: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Status toggle failed, offline fallback:", err);
                    const updated = trainers.map(t => t.id === id ? {...t, status: newStatus} : t);
                    db.set('s_trainers', updated);
                    loadTrainers();
                });
            };

            const handleDelete = (id) => {
                if(!confirm(`Are you sure you want to permanently delete Trainer '${id}'?`)) return;
                fetch(`/api/trainers/${id}`, {
                    method: 'DELETE'
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadTrainers();
                    } else {
                        alert("Failed to delete trainer: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Trainer deletion failed, offline fallback:", err);
                    const updated = trainers.filter(t => t.id !== id);
                    db.set('s_trainers', updated);
                    loadTrainers();
                });
            };

            const handleCreate = () => {
                if(!tid || !name || !password) return alert("Please enter Trainer ID, Name, and Password");
                
                const payload = { 
                    id: tid.toUpperCase().trim(), 
                    name: name.trim(), 
                    zone: 'ALL', 
                    password: password.trim(),
                    zones: 'ALL',
                    divisions: 'ALL',
                    branches: 'ALL',
                    business_units: 'ALL',
                    role: isSuperAdmin ? role : 'Trainer'
                };
                
                fetch('/api/trainers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Trainer Credential Created Successfully!');
                        setTid(''); 
                        setName('');
                        setPassword('password123');
                        loadTrainers();
                    } else {
                        alert("Failed to create trainer: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Trainer creation failed, offline fallback:", err);
                    const newTrainer = { id: tid.toUpperCase().trim(), name: name.trim(), zone: 'ALL', status: 'Active', password: password.trim() };
                    db.set('s_trainers', [...trainers, newTrainer]);
                    setTid(''); setName(''); setPassword('password123');
                    loadTrainers();
                });
            };

            const handleStartEdit = (tr) => {
                setEditTid(tr.id);
                setEditName(tr.name);
                setEditPassword(tr.plain_password || 'password123');
                setEditRole(tr.role || 'Trainer');
                setShowEditModal(true);
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                if (!editName || !editPassword) return alert("Please fill in Trainer Name and Password");
                
                const payload = {
                    name: editName.trim(),
                    password: editPassword.trim(),
                    zone: 'ALL',
                    zones: 'ALL',
                    divisions: 'ALL',
                    branches: 'ALL',
                    business_units: 'ALL',
                    role: isSuperAdmin ? editRole : 'Trainer'
                };
                
                fetch(`/api/trainers/${editTid}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Trainer profile updated successfully!');
                        setShowEditModal(false);
                        loadTrainers();
                    } else {
                        alert('Failed to update trainer: ' + data.message);

                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('file', file);
                
                fetch('/api/trainers/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        loadTrainers();
                    } else {
                        alert("Bulk Upload failed:\n" + data.message + (data.details ? "\n" + data.details.join('\n') : ''));

                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Socrates_Trainers_Template.csv';
                a.click();

                const pin = prompt("WARNING: This will permanently delete all modules, employee rosters, session histories, and trainer accounts (except Super Admin). Please type 'RESET' to confirm:");
                if (pin !== 'RESET') return;
                
                fetch('/api/admin/reset-database', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('System database has been successfully cleared to pristine state!');
                        loadTrainers();
                    } else {
                        alert("Failed to reset database: " + data.message);
                    }

                .catch(err => {
                    console.error("Reset database failed:", err);
                    alert("Error: Failed to connect to server to reset database.");

                                        </div>
                                        <div>

                                        </div>

                                            <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Password</label>
                                            <input type="text" value={editPassword} onChange={e => setEditPassword(e.target.value)} required className="input-field font-mono" />

                                                    <option value="Leader">Leader</option>
                                                </select>
                                            </div>

                                    <div className="p-5 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 font-semibold">
                                        <button type="button" onClick={() => setShowEditModal(false)} className="btn-outline">Cancel</button>

                                    </div>
                                </form>
                            </div>
                        </div>

                                <h3 className="font-bold text-lg text-socrates-dark tracking-tight">Create Trainer ID</h3>
                            </div>

                                    Wipes all training modules, uploaded employee rosters, assessments, and trainer logs. The default Super Admin credential will be preserved.
                                </p>
                                <button onClick={handleResetDatabase} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 px-4 rounded text-xs transition-colors flex items-center justify-center gap-2 shadow-md hover:shadow-lg">
                                    <i className="fas fa-trash-alt"></i> Clean All Demo Data
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const TravelHubView = ({ user }) => {
            const isSuperAdmin = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'superadmin';
            const isLeader = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'leader';
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showPlanModal, setShowPlanModal] = useState(false);
            
            // Plan form states
            const [branchName, setBranchName] = useState('');
            const [plannedDate, setPlannedDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [purposeTraining, setPurposeTraining] = useState(true);
            const [purposeBusiness, setPurposeBusiness] = useState(false);
            const [businessAgenda, setBusinessAgenda] = useState('');
            const [keyContacts, setKeyContacts] = useState('');
            const [details, setDetails] = useState('');
            
            // Geofence active tracking states
            const [activeCheckinVisit, setActiveCheckinVisit] = useState(null);
            const [isLocating, setIsLocating] = useState(false);
            const [checkinLocation, setCheckinLocation] = useState(null);
            const [checkinResult, setCheckinResult] = useState(null);
            const [managerPin, setManagerPin] = useState('');
            const [verifyResult, setVerifyResult] = useState(null);
            
            const [branchOptions, setBranchOptions] = useState([]);

            // Monthly planning compliance states
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().substring(0, 7)); // YYYY-MM
            const [complianceStats, setComplianceStats] = useState(null);
            const [loadingCompliance, setLoadingCompliance] = useState(false);
            const [showComplianceDetailModal, setShowComplianceDetailModal] = useState(false);

            // Visual Monthly Calendar & Tabs states
            const [activeTab, setActiveTab] = useState('calendar'); // 'calendar' or 'logs'
            const [currentMonthDate, setCurrentMonthDate] = useState(new Date());
            const [showFilters, setShowFilters] = useState(false);

            // Dynamic Report Filters states
            const [filterPeriod, setFilterPeriod] = useState('ALL'); // 'ALL', 'MTD', 'YTD', 'MONTH', 'YEAR'
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().substring(0, 7)); // YYYY-MM
            const [filterZone, setFilterZone] = useState('');
            const [filterDivision, setFilterDivision] = useState('');
            const [filterBranch, setFilterBranch] = useState('');
            const [filterTrainer, setFilterTrainer] = useState('');
            const [filterStatus, setFilterStatus] = useState('');

            const getDaysInMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                return new Date(year, month + 1, 0).getDate();
            };

            const getFirstDayOfMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                return new Date(year, month, 1).getDay(); // 0 = Sun, 6 = Sat
            };

            const handlePrevMonth = () => {
                setCurrentMonthDate(prev => new Date(prev.getFullYear(), prev.getMonth() - 1, 1));
            };

            const handleNextMonth = () => {
                setCurrentMonthDate(prev => new Date(prev.getFullYear(), prev.getMonth() + 1, 1));
            };

            const getFilteredVisits = () => {
                return visits.filter(v => {
                    // 1. Period filter
                    const visitDate = new Date(v.planned_date);
                    const today = new Date();
                    
                    if (filterPeriod === 'MTD') {
                        const isCurrentMonth = visitDate.getMonth() === today.getMonth() && visitDate.getFullYear() === today.getFullYear();
                        const isUpToToday = visitDate.getDate() <= today.getDate();
                        if (!isCurrentMonth || !isUpToToday) return false;
                    } else if (filterPeriod === 'YTD') {
                        const isCurrentYear = visitDate.getFullYear() === today.getFullYear();
                        const isUpToToday = visitDate <= today;
                        if (!isCurrentYear || !isUpToToday) return false;
                    } else if (filterPeriod === 'MONTH') {
                        const monthStr = v.planned_date.substring(0, 7);
                        if (monthStr !== filterMonth) return false;
                    } else if (filterPeriod === 'YEAR') {
                        const yearStr = v.planned_date.substring(0, 4);
                        if (yearStr !== filterYear) return false;
                    }

                    // 2. Zone filter
                    if (filterZone && v.zone !== filterZone) return false;

                    // 3. Division filter
                    if (filterDivision && v.division !== filterDivision) return false;

                    // 4. Branch filter
                    if (filterBranch && v.branch_name !== filterBranch) return false;

                    // 5. Trainer filter
                    if (filterTrainer && v.trainer_name !== filterTrainer) return false;

                    // 6. Status filter
                    if (filterStatus && v.status !== filterStatus) return false;

                    return true;
                });
            };

            const getVisitsForDay = (day) => {
                if (!day) return [];
                const yearStr = currentMonthDate.getFullYear();
                const monthStr = String(currentMonthDate.getMonth() + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const dateKey = `${yearStr}-${monthStr}-${dayStr}`;
                return getFilteredVisits().filter(v => v.planned_date <= dateKey && dateKey <= (v.end_date || v.planned_date));
            };

            const handleDayClick = (day) => {
                if (!day) return;
                const yearStr = currentMonthDate.getFullYear();
                const monthStr = String(currentMonthDate.getMonth() + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const dateKey = `${yearStr}-${monthStr}-${dayStr}`;
                setPlannedDate(dateKey);
                setShowPlanModal(true);
            };

            const handleDeleteVisit = (id) => {
                if(!confirm("Are you sure you want to permanently delete/cancel this planned field visit?")) return;
                
                fetch(`/api/visits/${id}`, {
                    method: 'DELETE'
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert("Itinerary visit deleted successfully!");
                        loadVisits();
                    } else {
                        alert("Failed to delete visit: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Error deleting visit:", err);
                    alert("Network error deleting visit.");
                });
            };

            const loadVisits = () => {
                setLoading(true);
                fetch('/api/visits')
                    .then(res => res.json())
                    .then(data => {
                        setVisits(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Error loading visits:", err);
                        setLoading(false);
                    });
            };

            const loadComplianceStats = (monthStr) => {
                setLoadingCompliance(true);
                fetch(`/api/visits/compliance-stats?month=${monthStr}`)
                    .then(res => res.json())
                    .then(data => {
                        setComplianceStats(data);
                        setLoadingCompliance(false);
                    })
                    .catch(err => {
                        console.error("Error loading compliance stats:", err);
                        setLoadingCompliance(false);
                    });
            };

            const handleExportCalendar = () => {
                let url = `/api/visits/export?period=${filterPeriod}`;
                if (filterPeriod === 'MONTH' && filterMonth) url += `&month=${filterMonth}`;
                if (filterPeriod === 'YEAR' && filterYear) url += `&year=${filterYear}`;
                if (filterZone) url += `&zone=${encodeURIComponent(filterZone)}`;
                if (filterDivision) url += `&division=${encodeURIComponent(filterDivision)}`;
                if (filterBranch) url += `&branch=${encodeURIComponent(filterBranch)}`;
                if (filterTrainer) url += `&trainer=${encodeURIComponent(filterTrainer)}`;
                if (filterStatus) url += `&status=${encodeURIComponent(filterStatus)}`;
                window.open(url, '_blank');
            };

            const handleExportMasterReport = () => {
                // Bypass all UI filters to export complete historical database for all trainers
                window.open('/api/visits/export?period=ALL', '_blank');
            };

            useEffect(() => {
                loadVisits();
                // Load roster filters to get branch list options
                fetch('/api/roster/filters')
                    .then(res => res.json())
                    .then(data => {
                        if (data.branches_meta) {
                            setBranchOptions(data.branches_meta);
                        }
                    })
                    .catch(err => console.error("Error loading roster branches:", err));
            }, []);

            useEffect(() => {
                loadComplianceStats(selectedMonth);
            }, [selectedMonth]);


            const handlePlanSubmit = (e) => {
                e.preventDefault();
                if (!branchName || !plannedDate) return alert("Please select branch and planned date.");
                
                const purposes = [];
                if (purposeTraining) purposes.push("Training");
                if (purposeBusiness) purposes.push("Business Discussion");
                
                if (purposes.length === 0) return alert("Please select at least one purpose (Training or Business Discussion).");
                
                let purposeText = purposes.join(" & ");
                if (purposeBusiness && businessAgenda) {
                    purposeText += ` (Agenda: ${businessAgenda.trim()})`;
                }

                fetch('/api/visits/plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        branch_name: branchName,
                        planned_date: plannedDate,
                        end_date: endDate || plannedDate,
                        purpose: purposeText,
                        key_contacts: keyContacts.trim(),
                        details: details.trim()
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setShowPlanModal(false);
                        setBranchName('');
                        setPlannedDate('');
                        setEndDate('');
                        setPurposeTraining(true);
                        setPurposeBusiness(false);
                        setBusinessAgenda('');
                        setKeyContacts('');
                        setDetails('');
                        loadVisits();
                    } else {
                        alert("❌ Error: " + data.message);
                    }
                })
                .catch(err => console.error("Error planning visit:", err));
            };

            const triggerGPSCheckin = (visit) => {
                setActiveCheckinVisit(visit);
                setCheckinResult(null);
                setVerifyResult(null);
                setManagerPin('');
                setIsLocating(true);
                
                if (!navigator.geolocation) {
                    setIsLocating(false);
                    alert("❌ Geolocation is not supported by your browser.");
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        setCheckinLocation({ latitude: lat, longitude: lon });
                        
                        fetch('/api/visits/checkin', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                visit_id: visit.id,
                                latitude: lat,
                                longitude: lon
                            })
                        })
                        .then(res => res.json())
                        .then(data => {
                            setIsLocating(false);
                            if (data.status === 'success') {
                                setCheckinResult({
                                    status: 'success',
                                    message: data.message,
                                    co_presence: data.co_presence
                                });
                                loadVisits();
                            } else {
                                setCheckinResult({
                                    status: 'error',
                                    message: data.message
                                });
                            }
                        })
                        .catch(err => {
                            setIsLocating(false);
                            setCheckinResult({
                                status: 'error',
                                message: "Failed to communicate with check-in location server."
                            });
                        });
                    },
                    (error) => {
                        setIsLocating(false);
                        setCheckinResult({
                            status: 'error',
                            message: "❌ Geolocation access denied or unavailable. Please enable location permissions."
                        });
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            };

            const handleManagerPINVerify = (e) => {
                e.preventDefault();
                if (!managerPin) return;
                
                fetch('/api/visits/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visit_id: activeCheckinVisit.id,
                        manager_pin: managerPin
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setVerifyResult({ status: 'success', message: data.message });
                        setManagerPin('');
                        loadVisits();
                        setTimeout(() => setActiveCheckinVisit(null), 2500);
                    } else {
                        setVerifyResult({ status: 'error', message: data.message });
                    }
                })
                .catch(err => console.error("Error verifying PIN:", err));
            };

            // Derived filter options based on visits list
            const uniqueZones = [...new Set(visits.map(v => v.zone))].filter(Boolean);
            const uniqueDivisions = [...new Set(visits.map(v => v.division))].filter(Boolean);
            const uniqueBranches = [...new Set(visits.map(v => v.branch_name))].filter(Boolean);
            const uniqueTrainers = [...new Set(visits.map(v => v.trainer_name))].filter(Boolean);
            const uniqueYears = [...new Set(visits.map(v => v.planned_date ? v.planned_date.substring(0, 4) : ''))].filter(Boolean).sort().reverse();

            // Calculate overall compliance (Plan vs Actual) from filtered list
            const filteredVisits = getFilteredVisits();
            const verifiedCount = filteredVisits.filter(v => v.status === 'VERIFIED').length;
            const geofencedCount = filteredVisits.filter(v => v.status === 'GEOFENCED').length;
            const totalPlanned = filteredVisits.length;
            const complianceRate = totalPlanned > 0 ? ((verifiedCount / totalPlanned) * 100).toFixed(1) : '0.0';

            return (
                <div className="space-y-6">
                    {/* Header Controls Block */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-5 rounded-2xl border border-socrates-border shadow-sm gap-4 animate-fade-in">
                        <div>
                            <h3 className="font-bold text-socrates-dark text-lg font-outfit">Socratic Travel Hub</h3>
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Planner • Check-in • Compliance</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setShowFilters(!showFilters)} className={`btn-outline flex items-center gap-2 py-2.5 px-4 font-black text-[10px] rounded-xl transition-all uppercase tracking-widest ${showFilters ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700'}`}>
                                <i className={`fas fa-${showFilters ? 'times' : 'filter'}`}></i> {showFilters ? 'Hide Filters' : 'Adjust Filters'}
                            </button>
                            {isSuperAdmin && (
                                <button onClick={handleExportMasterReport} className="btn-outline flex items-center gap-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 py-2.5 px-4 font-black text-[10px] rounded-xl transition-all shadow-sm uppercase tracking-widest">
                                    <i className="fas fa-file-invoice text-sm text-emerald-600"></i> Master Report
                                </button>
                            )}
                            <button onClick={() => setShowPlanModal(true)} className="btn-primary flex items-center gap-2 shadow-lg bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-2.5 px-6 font-bold text-xs rounded-xl transition-all">
                                <i className="fas fa-calendar-plus text-sm"></i> Plan Visit
                            </button>
                        </div>
                    </div>

                    {/* Collapsible Filter Console */}
                    {showFilters && (
                        <div className="card p-6 border border-socrates-border bg-slate-50 shadow-inner rounded-2xl animate-slide-down">
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 items-end">
                                <div className="space-y-1.5">
                                    <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Time Horizon</label>
                                    <select value={filterPeriod} onChange={e => setFilterPeriod(e.target.value)} className="input-field bg-white text-[11px] font-bold">
                                        <option value="ALL">All Time</option>
                                        <option value="MTD">MTD</option>
                                        <option value="YTD">YTD</option>
                                        <option value="MONTH">Specific Month</option>
                                        <option value="YEAR">Specific Year</option>
                                    </select>
                                </div>
                                {filterPeriod === 'MONTH' && (
                                    <div className="space-y-1.5 animate-fade-in">
                                        <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Month</label>
                                        <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="input-field bg-white text-[11px] font-bold" />
                                    </div>
                                )}
                                <div className="space-y-1.5">
                                    <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Trainer</label>
                                    <select value={filterTrainer} onChange={e => setFilterTrainer(e.target.value)} className="input-field bg-white text-[11px] font-bold">
                                        <option value="">All Trainers</option>
                                        {uniqueTrainers.map(tr => <option key={tr} value={tr}>{tr}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Zone</label>
                                    <select value={filterZone} onChange={e => setFilterZone(e.target.value)} className="input-field bg-white text-[11px] font-bold">
                                        <option value="">All Zones</option>
                                        {uniqueZones.map(zn => <option key={zn} value={zn}>{zn}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Division</label>
                                    <select value={filterDivision} onChange={e => setFilterDivision(e.target.value)} className="input-field bg-white text-[11px] font-bold">
                                        <option value="">All Divisions</option>
                                        {uniqueDivisions.map(div => <option key={div} value={div}>{div}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Branch</label>
                                    <select value={filterBranch} onChange={e => setFilterBranch(e.target.value)} className="input-field bg-white text-[11px] font-bold">
                                        <option value="">All Branches</option>
                                        {uniqueBranches.map(br => <option key={br} value={br}>{br}</option>)}
                                    </select>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleExportCalendar} className="flex-1 btn-outline bg-white border-slate-200 py-2.5 text-[10px] font-black uppercase tracking-widest">Export CSV</button>
                                    <button onClick={() => { setFilterPeriod('ALL'); setFilterZone(''); setFilterDivision(''); setFilterBranch(''); setFilterTrainer(''); setFilterStatus(''); }} className="btn-outline bg-white border-slate-200 py-2.5 px-3 text-[10px] font-black uppercase tracking-widest"><i className="fas fa-undo"></i></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Compact Horizontal Summary Strip */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 animate-fade-in">
                        <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-base"><i className="fas fa-route"></i></div>
                            <div>
                                <div className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Planned</div>
                                <div className="text-lg font-black text-socrates-dark">{totalPlanned} Journeys</div>
                            </div>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-base"><i className="fas fa-check-double"></i></div>
                            <div>
                                <div className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Verified</div>
                                <div className="text-lg font-black text-socrates-dark">{verifiedCount} Audits</div>
                            </div>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                            <div className="w-10 h-10 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center text-base"><i className="fas fa-chart-line"></i></div>
                            <div>
                                <div className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Compliance</div>
                                <div className="text-lg font-black text-socrates-dark">{complianceRate}%</div>
                            </div>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-2xl shadow-lg flex items-center justify-between group cursor-pointer" onClick={() => setShowComplianceDetailModal(true)}>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-white/10 text-white rounded-xl flex items-center justify-center text-base"><i className="fas fa-users-cog"></i></div>
                                <div>
                                    <div className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Roster Status</div>
                                    <div className="text-xs font-black text-white">View Details &rarr;</div>
                                </div>
                            </div>
                            <div className="text-right">
                                <div className="text-xl font-black text-blue-400">{complianceStats?.updated_count || 0}/{complianceStats?.total_active_trainers || 0}</div>
                                <div className="text-[8px] text-slate-500 font-black uppercase tracking-tighter">Trainers Planned</div>
                            </div>
                        </div>
                    </div>

                    {/* Divided Main Content: Calendar (Left) | Widgets (Right) */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                        
                        {/* LEFT: COMPACT CALENDAR (2/3 width) */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="flex border-b border-slate-200 bg-slate-50/50 p-1 rounded-xl gap-2 w-fit">
                                <button onClick={() => setActiveTab('calendar')} className={`px-4 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all flex items-center gap-1.5 ${activeTab === 'calendar' ? 'bg-white shadow-sm text-blue-600 border border-slate-200' : 'text-slate-500'}`}>
                                    <i className="fas fa-calendar-alt"></i> Calendar
                                </button>
                                <button onClick={() => setActiveTab('logs')} className={`px-4 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all flex items-center gap-1.5 ${activeTab === 'logs' ? 'bg-white shadow-sm text-blue-600 border border-slate-200' : 'text-slate-500'}`}>
                                    <i className="fas fa-list"></i> Table Logs
                                </button>
                            </div>

                            {activeTab === 'calendar' ? (() => {
                                const daysInMonth = getDaysInMonth(currentMonthDate);
                                const firstDayIndex = getFirstDayOfMonth(currentMonthDate);
                                const days = [];
                                for (let i = 0; i < firstDayIndex; i++) days.push(null);
                                for (let d = 1; d <= daysInMonth; d++) days.push(d);

                                return (
                                    <div className="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden p-6 animate-fade-in">
                                        <div className="flex justify-between items-center mb-6 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                            <button onClick={handlePrevMonth} className="w-8 h-8 rounded-xl bg-white border border-slate-200 text-slate-600 flex items-center justify-center hover:bg-slate-50 transition-all"><i className="fas fa-chevron-left text-xs"></i></button>
                                            <h4 className="font-black text-socrates-dark text-sm uppercase tracking-widest">{currentMonthDate.toLocaleString('default', { month: 'long', year: 'numeric' })}</h4>
                                            <button onClick={handleNextMonth} className="w-8 h-8 rounded-xl bg-white border border-slate-200 text-slate-600 flex items-center justify-center hover:bg-slate-50 transition-all"><i className="fas fa-chevron-right text-xs"></i></button>
                                        </div>

                                        <div className="grid grid-cols-7 gap-1 sm:gap-1.5">
                                            {['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].map(d => <div key={d} className="text-center font-black text-[9px] text-slate-400 py-2"><span className="hidden sm:inline">{d}</span><span className="sm:hidden">{d[0]}</span></div>)}
                                            {days.map((day, idx) => {
                                                const isToday = day && new Date().getDate() === day && new Date().getMonth() === currentMonthDate.getMonth() && new Date().getFullYear() === currentMonthDate.getFullYear();
                                                const dayVisits = getVisitsForDay(day);
                                                return (

            const isSuperAdmin = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'superadmin';

            const [tab, setTab] = useState('executive');
            const [loading, setLoading] = useState(true);
            const [analytics, setAnalytics] = useState(null);
            
            // Cascading dynamic filters
            const [selectedZone, setSelectedZone] = useState('');
            const [selectedDiv, setSelectedDiv] = useState('');
            const [selectedBranch, setSelectedBranch] = useState('');
            const [selectedEmp, setSelectedEmp] = useState('');
            const [selectedBU, setSelectedBU] = useState('');
            const [selectedProduct, setSelectedProduct] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [filterOptions, setFilterOptions] = useState({
                zones: [],
                divisions: [],
                branches: [],
                executives: [],
                business_units: [],
                products: []
            });

            // Phase 9 States
            const [expandedBucket, setExpandedBucket] = useState(null);
            const [campaignRunning, setCampaignRunning] = useState(false);
            const [campaignMessage, setCampaignMessage] = useState('');
            const [trainersPerf, setTrainersPerf] = useState([]);
            const [loadingTrainers, setLoadingTrainers] = useState(false);

            const loadAnalytics = () => {
                setLoading(true);
                let url = '/api/analytics?';
                if (selectedZone) url += `zone=${encodeURIComponent(selectedZone)}&`;
                if (selectedDiv) url += `division=${encodeURIComponent(selectedDiv)}&`;
                if (selectedBranch) url += `branch=${encodeURIComponent(selectedBranch)}&`;
                if (selectedEmp) url += `emp_code=${encodeURIComponent(selectedEmp)}&`;
                if (selectedBU) url += `business_unit=${encodeURIComponent(selectedBU)}&`;
                if (selectedProduct) url += `product_name=${encodeURIComponent(selectedProduct)}&`;
                if (startDate) url += `start_date=${encodeURIComponent(startDate)}&`;
                if (endDate) url += `end_date=${encodeURIComponent(endDate)}&`;
                
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        setAnalytics(data);
                        if (data.filter_options) {
                            setFilterOptions(data.filter_options);
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Failed to load live analytics:", err);
                        setLoading(false);
                    });
            };

            const loadTrainerPerformance = () => {
                setLoadingTrainers(true);
                fetch('/api/trainers/performance')
                    .then(res => res.json())
                    .then(data => {
                        setTrainersPerf(data);
                        setLoadingTrainers(false);
                    })
                    .catch(err => {
                        console.error("Failed to load trainer performance:", err);
                        setLoadingTrainers(false);
                    });
            };

            useEffect(() => {
                loadAnalytics();
            }, [selectedZone, selectedDiv, selectedBranch, selectedEmp, selectedBU, selectedProduct, startDate, endDate]);

            useEffect(() => {
                if (tab === 'trainer') {
                    loadTrainerPerformance();
                }
            }, [tab]);

            const handlePushRefresherCampaign = (empCodes) => {
                if (!empCodes || empCodes.length === 0) return;
                setCampaignRunning(true);
                setCampaignMessage('');
                fetch('/api/refresher/campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emp_codes: empCodes })
                })
                .then(res => res.json())
                .then(data => {
                    setCampaignRunning(false);
                    if (data.status === 'success') {
                        setCampaignMessage(data.message);
                        loadAnalytics();
                        setTimeout(() => setCampaignMessage(''), 5000);
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(err => {
                    setCampaignRunning(false);
                    console.error("Failed to push campaign:", err);
                });
            };

            const copyAnalyticalEmailReport = () => {
                if (!analytics) {
                    alert("⚠️ No analytics data loaded yet. Please wait or verify connection.");
                    return;
                }
                
                const temporal = analytics.temporal || {};
                const belowCount = analytics.score_distribution?.below_60?.length || 0;
                const midCount = analytics.score_distribution?.['60_80']?.length || 0;
                const highCount = analytics.score_distribution?.above_80?.length || 0;
                const totalParticipants = belowCount + midCount + highCount;
                
                const belowPct = totalParticipants > 0 ? ((belowCount / totalParticipants) * 100).toFixed(1) : '0.0';
                const midPct = totalParticipants > 0 ? ((midCount / totalParticipants) * 100).toFixed(1) : '0.0';
                const highPct = totalParticipants > 0 ? ((highCount / totalParticipants) * 100).toFixed(1) : '0.0';

                // Calculate learning growth delta (Day 20 post score vs Zero Day pre score)
                const zeroDayPre = temporal['ZERO DAY']?.pre || 0;
                const day20Post = temporal['TWENTY DAYS']?.post || 0;
                const overallGrowth = (day20Post - zeroDayPre).toFixed(1);

                // Build filter scope string
                const filtersUsed = [];
                if (selectedZone) filtersUsed.push(`Zone: ${selectedZone}`);
                if (selectedDiv) filtersUsed.push(`Division: ${selectedDiv}`);
