<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates Admin Portal</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        socrates: {
                            primary: '#2563EB', primaryHover: '#1D4ED8', dark: '#0F172A',
                            light: '#F8FAFC', accent: '#10B981', border: '#E2E8F0', text: '#334155'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Lock scroll to internal flex containers */
            background-color: #F8FAFC;
            color: #0F172A;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }
        .card { background: white; border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.02); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { border-color: rgba(37, 99, 235, 0.2); shadow-md: 0 20px 25px -5px rgba(15, 23, 42, 0.04); }
        
        .btn-primary { 
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); 
            color: white; 
            border-radius: 14px; 
            padding: 11px 24px; 
            font-weight: 800; 
            font-size: 14px; 
            transition: all 0.25s ease; 
            cursor: pointer; 
            box-shadow: 0 4px 10px -1px rgba(37,99,235,0.2); 
            border: none; 
            outline: none; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            letter-spacing: 0.01em;
        }
        .btn-primary:active { transform: scale(0.98); }
        
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #64748B; font-weight: 700; font-size: 13px; border-radius: 14px; transition: all 0.25s ease; cursor: pointer; margin-bottom: 4px; }
        .nav-link:hover { background: #F1F5F9; color: #0F172A; }
        .nav-link.active { background: #EFF6FF; border-left: 5px solid #2563EB; color: #2563EB; }
        
        .input-field { border: 1.5px solid #E2E8F0; border-radius: 14px; padding: 12px 16px; font-size: 14px; width: 100%; outline: none; transition: all 0.2s ease; background: #F8FAFC; }
        .input-field:focus { border-color: #2563EB; background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.06); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        
        /* Institutional auto-set fix */
        .vh-lock { height: 100dvh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    {% raw %}
        const { useState, useEffect } = React;
        const socket = io();

        const cleanQuestionText = (text) => {
            if (typeof text !== 'string') return text;
            return text.replace(/^\[[^\]]+\]\s*/g, '').trim();
        };

        const cleanOptionText = (opt) => {
            if (typeof opt !== 'string') return opt;
            return opt.replace(/^(Option\s+[A-D][:.-]?\s*|[A-D][:.-]\s*)/i, '').trim();
        };

        // MOCK OFFLINE DATABASE USING LOCALSTORAGE
        const db = {
            get: (key) => JSON.parse(localStorage.getItem(key) || '[]'),
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            init: () => {
                if(!localStorage.getItem('s_trainers')) {
                    db.set('s_trainers', [
                        { id: 'TR-1001', name: 'Sanjay Verma', zone: 'North Zone', status: 'Active', password: 'password123' },
                        { id: 'TR-1002', name: 'Priya Desai', zone: 'West Zone', status: 'Active', password: 'password123' },
                        { id: 'TR-1003', name: 'Arun Kumar', zone: 'South Zone', status: 'Active', password: 'password123' }
                    ]);
                }
                if(!localStorage.getItem('s_modules')) {
                    const sampleQuestions = [
                        "What is the maximum Loan-to-Value (LTV) ratio allowed for Tier 1 cities?",
                        "Which of the following documents is NOT accepted as valid address proof?",
                        "What is the minimum CIBIL score required for a standard 2-wheeler loan approval?",
                        "How many days is the standard grace period for the first EMI payment?",
                        "Under the new AML policy, transactions above what amount require mandatory PAN card verification?",
                        "What is the maximum tenure for a commercial vehicle loan?",
                        "Who is the final approving authority for a loan deviation of 5% in the interest rate?",
                        "In case of a bounced cheque, what is the standard bounce charge levied on the customer?",
                        "Is physical verification mandatory for repeat customers with a clean track record?",
                        "What is the processing fee percentage for two-wheeler loans under the festive offer?",
                        "Which mobile application should the executive use to upload the customer's KYC documents?",
                        "What is the maximum allowed gap between the date of invoice and loan disbursement?",
                        "If a customer requests prepayment within 6 months, what is the foreclosure charge?",
                        "Which insurance cover is mandatory before disbursing the vehicle loan?",
                        "What is the TAT (Turn Around Time) for credit approval after complete document submission?"
                    ];
                    db.set('s_modules', [
                        { id: 1, title: 'Two-Wheeler Product Policy V2', questions: 15, date: '2 days ago', qList: [...sampleQuestions] },
                        { id: 2, title: 'AML & KYC Compliance 2026', questions: 15, date: '1 week ago', qList: [...sampleQuestions] }
                    ]);
                }
                if(!localStorage.getItem('s_roster')) {
                    db.set('s_roster', [
                        { emp_code: 'SF-1001', emp_name: 'Rahul Singh', branch_name: 'DELHI RF', zone: 'North Zone', business_unit: '2-Wheeler Personal Loan' },
                        { emp_code: 'SF-1002', emp_name: 'Neha Sharma', branch_name: 'AHMEDABAD RF', zone: 'West Zone', business_unit: '2-Wheeler Personal Loan' },
                        { emp_code: 'SF-1003', emp_name: 'Karthik Iyer', branch_name: 'CHANDIGARH RF', zone: 'North Zone', business_unit: '2-Wheeler Personal Loan' },
                        { emp_code: 'SF-1004', emp_name: 'Amit Patel', branch_name: 'KOLKATA RF', zone: 'East Zone', business_unit: '2-Wheeler Personal Loan' },
                        { emp_code: 'SF-1005', emp_name: 'Sneha Gupta', branch_name: 'MUMBAI RF', zone: 'West Zone', business_unit: '2-Wheeler Personal Loan' }
                    ]);
                }
            }
        };
        db.init();

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null); 
            const [trainersList, setTrainersList] = useState([]);
            const [impersonatedTrainer, setImpersonatedTrainer] = useState(null);
            const [dbDiag, setDbDiag] = useState({ database_type: 'Checking...', connection_status: 'Checking...', connection_error: null, database_url: '' });
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const activeTrainer = impersonatedTrainer || user;
            const isSuperAdmin = user?.role?.toLowerCase().replace(/\s/g, '') === 'superadmin';

            const handleLogout = () => {
                fetch('/api/admin/logout', { method: 'POST' })
                    .finally(() => {
                        localStorage.removeItem('socrates_active_module');
                        setUser(null);
                        setImpersonatedTrainer(null);
                        setView('login');
                    });
            };

            useEffect(() => {
                fetch('/api/admin/me')
                    .then(res => {
                        if (res.ok) return res.json();
                        throw new Error("No active session");
                    })
                    .then(data => {
                        if (data.status === 'success') {
                            setUser({ id: data.user.trainer_id, name: data.user.name, role: data.user.role });
                            setView('dashboard');
                        }
                    })
                    .catch(err => console.log("Session restore: prompting login."));
            }, []);

            useEffect(() => {
                if (activeTrainer) {
                    fetch('/api/admin/diagnostics')
                        .then(res => res.json())
                        .then(data => setDbDiag(data))
                        .catch(err => setDbDiag({ database_type: 'Unknown', connection_status: 'Failed to fetch', connection_error: err.message, database_url: '' }));
                }
            }, [activeTrainer]);

            useEffect(() => {
                if (isSuperAdmin) {
                    fetch('/api/trainers')
                        .then(res => res.json())
                        .then(data => setTrainersList(data))
                        .catch(err => console.error("Error loading switcher trainers:", err));
                } else {
                    setImpersonatedTrainer(null);
                }
            }, [user]);

            useEffect(() => {
                if (view !== 'live_session') {
                    localStorage.removeItem('socrates_active_module');
                }
            }, [view]);

            const renderContent = () => {
                switch(view) {
                    case 'dashboard': return <AdminDashboard onNav={setView} user={activeTrainer} dbDiag={dbDiag} />;
                    case 'live_session': return <LiveSession onClose={() => setView('dashboard')} user={activeTrainer} />;
                    case 'roster': return <RosterView user={activeTrainer} />;
                    case 'library': return <LibraryView user={activeTrainer} />;
                    case 'analytics': return <AnalyticsView user={activeTrainer} />;
                    case 'access_mgmt': return <AccessMgmtView user={activeTrainer} />;
                    case 'travel_hub': return <TravelHubView user={activeTrainer} />;
                    default: return <AdminDashboard onNav={setView} user={activeTrainer} dbDiag={dbDiag} />;
                }
            };

            const downloadTemplate = () => {
                const csvData = "Employee Code,Employee Name,Branch Name,Zone,Division,Business Unit,Role,Product Name\nSF-1001,RAHUL SINGH,DELHI RF,NORTH ZONE,DELHI DIVISION,TWO-WHEELER,PL EXE,SPLENDOR V2\nSF-1002,NEHA SHARMA,AHMEDABAD RF,WEST ZONE,GUJARAT DIVISION,TWO-WHEELER,PL EXE,ACTIVA 6G\nSF-1003,AMIT PATEL,CHANDIGARH RF,NORTH ZONE,PUNJAB DIVISION,TWO-WHEELER,PL EXE,ACTIVA 6G\nSF-1004,PRIYA DAS,KOLKATA RF,EAST ZONE,BENGAL DIVISION,TWO-WHEELER,PL EXE,ACTIVA 6G";
                const blob = new Blob([csvData], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Socrates_Roster_Template.csv';
                a.click();
            };

            const handleLogin = (id, pwd) => {
                fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trainer_id: id.toUpperCase().trim(), password: pwd })
                })
                .then(res => {
                    if (res.ok) {
                        return res.json();
                    } else {
                        return res.text().then(text => {
                            let msg = 'Invalid Credentials';
                            try {
                                const err = JSON.parse(text);
                                msg = err.message || msg;
                            } catch(e) {}
                            throw new Error(msg);
                        });
                    }
                })
                .then(data => {
                    setUser({ id: id.toUpperCase().trim(), name: data.name, role: data.role });
                    setView('dashboard');
                })
                .catch(err => {
                    console.error("Login failure:", err);
                    alert("❌ Login Failed: " + err.message);
                });
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="card w-full max-w-sm p-8 border-t-4 border-socrates-primary">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-socrates-primary text-3xl shadow-sm border border-blue-100"><i className="fas fa-brain"></i></div>
                            </div>
                            <h1 className="text-2xl font-bold text-center text-socrates-dark mb-2 tracking-tight">Socrates Admin</h1>
                            <p className="text-sm text-center text-slate-500 mb-8 font-medium">Training Operations Console</p>
                            
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Trainer / Admin ID</label>
                                    <input type="text" id="loginId" placeholder="e.g. ADMIN or TRAINER1" className="input-field font-medium" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Password</label>
                                    <input type="password" id="loginPwd" placeholder="••••••••" className="input-field" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('loginId').value, document.getElementById('loginPwd').value)} className="w-full btn-primary mt-6">Secure Login</button>
                            </div>

                            {/* Database Diagnostics Badge */}
                            <div className="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center">
                                <div className="flex items-center gap-1.5 text-xs font-semibold text-slate-500">
                                    <span className={`w-2 h-2 rounded-full ${
                                        dbDiag.connection_status === 'Connected' ? 'bg-emerald-500' : 'bg-rose-500'
                                    }`}></span>
                                    <span>System Database Status:</span>
                                </div>
                                <div className="mt-2 text-xs flex flex-wrap justify-center gap-2">
                                    <span className={`px-2.5 py-0.5 rounded-full font-semibold border ${
                                        dbDiag.connection_status === 'Connected' 
                                            ? 'bg-emerald-50 text-emerald-700 border-emerald-200' 
                                            : dbDiag.connection_status === 'Checking...'
                                                ? 'bg-amber-50 text-amber-700 border-amber-200 animate-pulse'
                                                : 'bg-rose-50 text-rose-700 border-rose-200'
                                    }`}>
                                        <i className={`fas ${dbDiag.database_type === 'PostgreSQL' ? 'fa-database' : 'fa-folder-open'} mr-1`}></i>
                                        {dbDiag.database_type} ({dbDiag.connection_status})
                                    </span>
                                </div>
                                {dbDiag.connection_error && (
                                    <div className="mt-2.5 p-2 bg-rose-50 border border-rose-100 rounded-lg text-[10px] text-rose-600 font-semibold text-center max-w-xs break-all">
                                        Connection Error: {dbDiag.connection_error}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-[100dvh] w-full overflow-hidden bg-slate-100 animate-fade-in">
                    <div className="w-64 bg-white border-r border-slate-200 flex flex-col z-10 hidden md:flex shrink-0 shadow-sm">
                        <div className="p-6 border-b border-slate-200">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center text-white text-sm shadow-md"><i className="fas fa-brain"></i></div>
                                <span className="font-bold text-xl tracking-tight text-socrates-dark font-outfit">Socrates</span>
                            </div>
                            <p className="text-[10px] text-slate-400 mt-2 uppercase font-black tracking-widest leading-none">{user?.role} OPERATIONS</p>
                            {/* Role Debug for Troubleshooting */}
                            {false && <p className="text-[8px] text-rose-400 font-mono">DEBUG: |{user?.role}|</p>}
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto">
                            <div onClick={() => setView('dashboard')} className={`nav-link ${view==='dashboard'?'active':''}`}><i className="fas fa-layer-group w-5"></i> Dashboard</div>
                            <div onClick={() => { localStorage.removeItem('socrates_active_module'); setView('live_session'); }} className={`nav-link ${view==='live_session'?'active':''}`}><i className="fas fa-satellite-dish w-5"></i> Live Session</div>
                            <div onClick={() => setView('library')} className={`nav-link ${view==='library'?'active':''}`}><i className="fas fa-robot w-5"></i> AI Library</div>
                            <div onClick={() => setView('roster')} className={`nav-link ${view==='roster'?'active':''}`}><i className="fas fa-users-cog w-5"></i> Master Roster</div>
                            <div onClick={() => setView('analytics')} className={`nav-link ${view==='analytics'?'active':''}`}><i className="fas fa-chart-pie w-5"></i> Analytics Hub</div>
                            <div onClick={() => setView('travel_hub')} className={`nav-link ${view==='travel_hub'?'active':''}`}><i className="fas fa-map-marked-alt w-5"></i> Travel Hub</div>
                            
                            {isSuperAdmin && (
                                <div onClick={() => setView('access_mgmt')} className={`nav-link ${view==='access_mgmt'?'active':''} mt-6 border-t border-slate-100 pt-6`}><i className="fas fa-user-shield w-5 text-purple-600"></i> Access Control</div>
                            )}
                        </div>
                        <div className="p-4 border-t border-slate-100 bg-slate-50/50">
                            <div className="flex items-center gap-3 p-2 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                <div className="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-sm font-black text-socrates-primary border border-blue-200 uppercase">{user?.name?.substring(0,2)}</div>
                                <div className="min-w-0 flex-1">
                                    <div className="font-bold text-xs text-socrates-dark truncate">{user?.name}</div>
                                    <div className="text-[10px] text-slate-400 font-bold cursor-pointer hover:text-red-600 transition-colors uppercase tracking-wider" onClick={handleLogout}>Sign Out</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex flex-col min-w-0 bg-slate-50/50">
                        {/* Desktop & Tablet Top Bar */}
                        <div className="h-16 md:h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 md:px-8 flex flex-row justify-between items-center sticky top-0 z-30 shadow-sm shrink-0">
                            <div className="flex items-center gap-3 min-w-0">
                                <button 
                                    onClick={() => setIsMobileMenuOpen(true)}
                                    className="md:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-xl shrink-0"
                                >
                                    <i className="fas fa-bars text-lg"></i>
                                </button>
                                <h1 className="text-base md:text-xl font-black text-slate-900 capitalize tracking-tight font-outfit truncate">{view.replace('_', ' ')}</h1>
                                {isSuperAdmin && (
                                    <div className="flex items-center gap-2 bg-purple-50 border border-purple-100 rounded-xl px-3 py-1.5 shrink-0 ml-2 hidden sm:flex">
                                        <i className="fas fa-user-shield text-purple-600 text-[10px]"></i>
                                        <span className="font-black text-purple-800 text-[9px] uppercase tracking-widest">View As:</span>
                                        <select 
                                            value={impersonatedTrainer ? impersonatedTrainer.id : ''}
                                            onChange={(e) => {
                                                const selectedId = e.target.value;
                                                if (!selectedId) setImpersonatedTrainer(null);
                                                else {
                                                    const matched = trainersList.find(t => t.id === selectedId);
                                                    setImpersonatedTrainer(matched || null);
                                                }
                                            }}
                                            className="bg-transparent text-purple-900 font-black outline-none cursor-pointer text-[10px] max-w-[120px] truncate"
                                        >
                                            <option value="">Full Admin</option>
                                            {trainersList.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                        </select>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-2 md:gap-4 shrink-0">
                                {view === 'roster' && (
                                    <button onClick={downloadTemplate} className="h-10 px-4 rounded-xl border border-slate-200 bg-white text-slate-600 font-bold text-xs hover:border-blue-400 transition-all flex items-center gap-2 shadow-sm">
                                        <i className="fas fa-download text-blue-600"></i>
                                        <span className="hidden lg:inline">Get CSV Template</span>
                                    </button>
                                )}
                                <button className="h-10 px-4 md:px-6 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-black text-xs md:text-sm tracking-wider shadow-lg shadow-blue-500/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2" onClick={() => { localStorage.removeItem('socrates_active_module'); setView('live_session'); }}>
                                    <i className="fas fa-play text-[10px]"></i>
                                    <span>LIVE SESSION</span>
                                </button>
                            </div>
                        </div>

                        {/* Main Content Area - Scrollable */}
                        <div className="flex-1 overflow-y-auto no-scrollbar p-4 md:p-8">
                            <div className="max-w-[1600px] mx-auto w-full pb-20 md:pb-4">
                                {renderContent()}
                            </div>
                        </div>
                    </div>

                    {/* Bottom Mobile Navigation Bar (Visible only on mobile screen widths) */}
                    <div className="md:hidden bg-white/95 backdrop-blur-md border-t border-slate-200/80 fixed bottom-0 left-0 right-0 z-40 flex justify-around py-3 shadow-[0_-8px_20px_rgba(0,0,0,0.05)] px-2">
                        {[
                            { id: 'dashboard', icon: 'layer-group', label: 'Home' },
                            { id: 'live_session', icon: 'satellite-dish', label: 'Live' },
                            { id: 'library', icon: 'robot', label: 'AI Library' },
                            { id: 'roster', icon: 'users-cog', label: 'Roster' },
                            { id: 'analytics', icon: 'chart-pie', label: 'Data' }
                        ].map(item => (
                            <button 
                                key={item.id}
                                onClick={() => {
                                    if (item.id === 'live_session') localStorage.removeItem('socrates_active_module');
                                    setView(item.id);
                                }} 
                                className={`flex flex-col items-center gap-1.5 px-3 py-1 transition-all rounded-xl ${
                                    view === item.id ? 'text-blue-600' : 'text-slate-400 opacity-80'
                                }`}
                            >
                                <i className={`fas fa-${item.icon} text-lg ${view === item.id ? 'animate-pulse' : ''}`}></i>
                                <span className="text-[9px] font-black uppercase tracking-tighter">{item.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Mobile Sidebar Navigation Drawer Overlay */}
                    {isMobileMenuOpen && (
                        <div 
                            className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 transition-opacity md:hidden animate-fade-in"
                            onClick={() => setIsMobileMenuOpen(false)}
                        >
                            {/* Slide-over Content Drawer */}
                            <div 
                                className="w-64 max-w-xs h-full bg-white shadow-2xl flex flex-col transform translate-x-0 transition-transform duration-300 ease-out"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="p-6 border-b border-socrates-border flex justify-between items-center bg-slate-50/50">
                                    <div className="flex items-center gap-2.5">
                                        <div className="w-7 h-7 bg-socrates-primary rounded-lg flex items-center justify-center text-white text-xs shadow-md"><i className="fas fa-brain"></i></div>
                                        <span className="font-bold text-lg tracking-tight text-socrates-dark">Socrates</span>
                                    </div>
                                    <button 
                                        onClick={() => setIsMobileMenuOpen(false)}

                if (divVal) url += `division=${encodeURIComponent(divVal)}&`;
                if (branchVal) url += `branch=${encodeURIComponent(branchVal)}&`;
                if (searchVal) url += `q=${encodeURIComponent(searchVal)}&`;
                
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        setEmps(data);
                        setFilteredCount(data.length);
                        if (!zoneVal && !divVal && !branchVal && !searchVal) {
                            setTotalCount(data.length);

                    .catch(err => {
                        console.log("Using offline fallback", err);
                        const fallbackData = db.get('s_roster') || [];
                        setEmps(fallbackData);

                                                    <td className="px-6 py-4 font-medium text-socrates-dark">{e.emp_name}</td>
                                                    <td className="px-6 py-4 font-medium text-slate-700">{e.role || 'N/A'}</td>
                                                    <td className="px-6 py-4 text-slate-600">{e.branch_name}</td>
                                                    <td className="px-6 py-4 text-slate-600">{e.zone}</td>
                                                    <td className="px-6 py-4 text-slate-600">{e.business_unit}</td>
                                                    <td className="px-6 py-4 text-slate-600 font-semibold text-xs text-socrates-primary">{e.product_name || 'N/A'}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-widest ${e.status === 'ACTIVE' || !e.status ? 'bg-emerald-100 text-emerald-700 shadow-sm' : 'bg-rose-100 text-rose-700 shadow-sm'}`}>{e.status || 'ACTIVE'}</span>
                                                        <div className="text-[10px] text-slate-500 mt-1 italic max-w-[150px] truncate" title={e.change_detail}>{e.change_detail || 'ADDED MANUALLY'}</div>
                                                    </td>
                                                    <td className="px-6 py-4 text-right flex items-center justify-end gap-2">
                                                        <button onClick={() => handleStartEdit(e)} className="text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center gap-1 bg-blue-50/50 hover:bg-blue-100/50 border border-blue-100 rounded px-2.5 py-1 transition-all">
                                                            <i className="fas fa-edit text-[10px]"></i> Edit
                                                        </button>
                                                        <button onClick={() => handleDeleteEmp(e.emp_code)} className="text-xs text-red-600 hover:text-red-800 font-bold flex items-center gap-1 bg-red-50/50 hover:bg-red-100/50 border border-red-100 rounded px-2.5 py-1 transition-all">
                                                            <i className="fas fa-trash-alt text-[10px]"></i> Delete
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Right / Side Column: Historical Assessments Import Engine */}
                        <div className="lg:col-span-1 space-y-6">
                            <div className="card p-6 border border-slate-200 shadow-sm bg-white">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 shadow-inner border border-indigo-100">
                                        <i className="fas fa-history text-lg"></i>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-socrates-dark text-base">Historical Import Engine</h3>
                                        <p className="text-[10px] text-indigo-500 uppercase tracking-widest font-extrabold mt-0.5">Retroactive assessment sync</p>
                                    </div>
                                </div>
                                <p className="text-xs text-slate-500 leading-relaxed mb-5">
                                    Upload offline pre-test and post-test data conducted in February, March, and April to retroactively generate training sessions, calculate Socratic deltas, and populate historical performance metrics automatically.
                                </p>
                                
                                <div className="space-y-3.5">
                                    <button 
                                        type="button"
                                        onClick={downloadAssessmentTemplate} 
                                        className="w-full btn-outline py-2.5 px-4 text-xs font-bold flex items-center justify-center gap-2 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/20 text-slate-700 transition-all rounded-xl shadow-sm"
                                    >
                                        <i className="fas fa-file-csv text-indigo-600 text-sm"></i> Get Assessment Template
                                    </button>
                                    
                                    <div className="relative overflow-hidden w-full">
                                        <button type="button" className="w-full btn-primary py-2.5 px-4 text-xs font-bold flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-xl shadow-md hover:shadow-indigo-200/50">
                                            <i className="fas fa-cloud-upload-alt text-sm"></i> Upload Historical CSV
                                        </button>
                                        <input type="file" accept=".csv" onChange={handleAssessmentUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                    </div>
                                </div>
                                
                                <div className="mt-6 pt-5 border-t border-slate-100 bg-slate-50/50 rounded-xl p-3 border border-slate-100">
                                    <h4 className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2.5 flex items-center gap-1.5">
                                        <i className="fas fa-info-circle text-indigo-500"></i> Standard Import Protocol
                                    </h4>
                                    <ul className="text-[10px] text-slate-500 space-y-2 leading-relaxed">
                                        <li className="flex items-start gap-1.5">
                                            <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mt-1.5 shrink-0"></span>
                                            <span>Roster profiles must exist in the Master Roster first.</span>
                                        </li>
                                        <li className="flex items-start gap-1.5">
                                            <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mt-1.5 shrink-0"></span>
                                            <span>Scores must be clean numeric percentages (0-100).</span>
                                        </li>
                                        <li className="flex items-start gap-1.5">
                                            <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mt-1.5 shrink-0"></span>
                                            <span>Accepts Date formats: YYYY-MM-DD or YYYY-MM.</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        const LibraryView = ({user}) => {
            const isSuperAdmin = user?.role?.toLowerCase().replace(/\s/g, '') === 'superadmin';
            const [status, setStatus] = useState('idle'); // idle, loading, generating, review
            const [modules, setModules] = useState([]);
            const [title, setTitle] = useState('');
            const [qCount, setQCount] = useState(15);
            const [selectedFile, setSelectedFile] = useState(null);
            const [trainers, setTrainers] = useState([]);
            const [assignedAuditor, setAssignedAuditor] = useState('');
            const [difficulty, setDifficulty] = useState('Medium');
            const [reviewDifficulty, setReviewDifficulty] = useState('Medium');
            const [genLanguage, setGenLanguage] = useState('en');
            const [pastedText, setPastedText] = useState('');
            
            // Auditor review states
            const [reviewModuleId, setReviewModuleId] = useState(null);
            const [reviewTitle, setReviewTitle] = useState('');
            const [reviewQuestions, setReviewQuestions] = useState([]);
            const [activeEditIdx, setActiveEditIdx] = useState(null);

            const loadModules = () => {
                const trId = user?.id || 'ADMIN';
                fetch(`/api/modules?trainer_id=${encodeURIComponent(trId)}`)
                    .then(res => res.json())
                    .then(data => setModules(data))
                    .catch(err => {
                        console.error("Using offline fallback modules:", err);
                        setModules(db.get('s_modules') || []);
                    });
            };
            
            useEffect(() => { 
                loadModules(); 
                fetch('/api/trainers')
                    .then(res => res.json())
                    .then(data => setTrainers(data || []))
                    .catch(err => console.error("Error loading trainers:", err));
            }, []);

            const handleDelete = (id) => {
                if(confirm('Are you sure you want to delete this module?')) {
                    fetch(`/api/modules/${id}`, { method: 'DELETE' })
                        .then(res => res.json())
                        .then(() => {
                            loadModules();
                        })
                        .catch(err => {
                            console.error("Offline delete fallback:", err);
                            const updated = modules.filter(m => m.id !== id);
                            db.set('s_modules', updated);
                            loadModules();
                        });
                }
            };

            const handleExport = (mod) => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(mod, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `${mod.title.toLowerCase().replace(/[^a-z0-9]+/g, '_')}_module.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            };

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (!parsed.title || (!parsed.questions && !parsed.questions_count)) {
                            alert("❌ Invalid Socrates module format. Missing title or questions.");
                            return;
                        }
                        
                        const payload = {
                            title: parsed.title,
                            difficulty: parsed.difficulty || 'Medium',
                            trainer_id: user?.id || 'ADMIN',
                            audited_by: parsed.audited_by || 'Super Admin',
                            questions: (parsed.questions || []).map(q => ({
                                question_text: q.question_text || q.question,
                                options: [q.option_a, q.option_b, q.option_c, q.option_d] || q.options,
                                correctIndex: q.correct_index !== undefined ? q.correct_index : q.correctIndex,
                                approved: q.approved !== undefined ? q.approved : 1,
                                translations: q.translations || {}
                            }))
                        };
                        
                        fetch('/api/modules/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === 'success') {
                                alert(`✓ Module "${parsed.title}" imported successfully!`);
                                loadModules();
                            } else {
                                alert("Import failed: " + data.message);
                            }
                        })
                        .catch(err => {
                            console.error("Import API crash:", err);
                            alert("Error saving imported module to database.");
                        });
                    } catch (err) {
                        alert("❌ Failed to parse JSON file. Make sure it is a valid JSON module.");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reset input
            };

            const startGenerator = () => {
                if(!title) return alert("Please enter a Module Title.");
                
                setStatus('loading');
                const formData = new FormData();
                formData.append('title', title);
                formData.append('count', qCount);
                formData.append('trainer_id', user?.id || 'ADMIN');
                formData.append('difficulty', difficulty);
                formData.append('language', genLanguage);
                if (selectedFile) {
                    formData.append('file', selectedFile);
                }
                if (pastedText) {
                    formData.append('text', pastedText);
                }
                
                fetch('/api/modules/generate', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Open the Auditor panel with generated draft questions
                        setReviewModuleId(null);
                        setReviewTitle(data.title);
                        setReviewDifficulty(data.difficulty || 'Medium');
                        // Map each question to have default approved=0 for auditor to audit
                        const mappedQs = data.questions.map(q => ({
                            question_text: q.question,
                            option_a: q.options[0],
                            option_b: q.options[1],
                            option_c: q.options[2],
                            option_d: q.options[3],
                            correct_index: q.correctIndex,
                            approved: 0,
                            translations: q.translations
                        }));
                        setReviewQuestions(mappedQs);
                        setActiveEditIdx(null);
                        setStatus('review');
                        setTitle('');
                        setSelectedFile(null);
                    } else {
                        alert("AI Generation failed: " + data.message);
                        setStatus('idle');
                    }
                })
                .catch(err => {
                    console.error("AI generator fetch crash:", err);
                    alert("System error. Running offline fallback draft.");
                    setStatus('idle');
                });
            };

            const handleResumeAudit = (mod) => {
                setActiveEditIdx(null);
                setReviewModuleId(mod.id);
                setReviewTitle(mod.title);
                setReviewDifficulty(mod.difficulty || 'Medium');
                // Map from database questions structure back to auditor draft
                const mappedQs = mod.questions.map(q => ({
                    id: q.id,
                    question_text: q.question_text,
                    option_a: q.option_a,
                    option_b: q.option_b,
                    option_c: q.option_c,
                    option_d: q.option_d,
                    correct_index: q.correct_index,
                    approved: q.approved,
                    translations: q.translations
                }));
                setReviewQuestions(mappedQs);
                setStatus('review');
            };

            const toggleQuestionApproval = (idx) => {
                const updated = [...reviewQuestions];
                updated[idx].approved = updated[idx].approved === 1 ? 0 : 1;
                setReviewQuestions(updated);
            };

            const updateQuestionField = (idx, field, value) => {
                const updated = [...reviewQuestions];
                updated[idx][field] = value;
                setReviewQuestions(updated);
            };

            const commitModuleToDb = (isFinalize) => {
                const pendingCount = reviewQuestions.filter(q => q.approved === 0).length;
                
                if (isFinalize && pendingCount > 0) {
                    alert(`⚠️ Cannot Finalize Module. There are still ${pendingCount} questions pending trainer approval. Please audit all questions or click 'Save Draft Progress' instead.`);
                    return;
                }
                
                const payload = {
                    title: reviewTitle,
                    trainer_id: user?.id || 'ADMIN',
                    audited_by: assignedAuditor || 'Awaiting Audit',
                    module_id: reviewModuleId,
                    difficulty: reviewDifficulty,
                    questions: reviewQuestions.map(q => ({
                        question: q.question_text,
                        options: [q.option_a, q.option_b, q.option_c, q.option_d],
                        correctIndex: q.correct_index,
                        approved: q.approved,
                        translations: q.translations
                    }))
                };
                
                fetch('/api/modules/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        setStatus('idle');
                        loadModules();
                    } else {
                        alert("Error saving: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Save failed:", err);
                    alert("Database save error occurred.");
                });
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 relative">
                    
                    {/* MAKER-CHECKER AUDIT WIZARD MODAL */}
                    {status === 'review' && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col border border-slate-200 overflow-hidden transform transition-all">
                                <div className="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-lg text-socrates-dark flex items-center gap-2">
                                            <i className="fas fa-user-shield text-socrates-primary"></i>
                                            Trainer Auditor Console
                                        </h3>
                                        <p className="text-xs text-socrates-primary font-bold tracking-widest uppercase mt-0.5">{reviewTitle}</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs font-bold bg-amber-50 border border-amber-200 text-amber-800 px-3 py-1 rounded-full">
                                            Audited: {reviewQuestions.filter(q => q.approved === 1).length} / {reviewQuestions.length}
                                        </span>
                                        <button onClick={() => setStatus('idle')} className="text-slate-400 hover:text-slate-700 text-xl"><i className="fas fa-times"></i></button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
                                    {reviewQuestions.map((q, idx) => {
                                        const isApproved = q.approved === 1;
                                        return (
                                            <div 
                                                key={idx} 
                                                className={`p-6 rounded-xl border bg-white transition-all shadow-sm ${isApproved ? 'border-emerald-300 shadow-[0_0_10px_rgba(16,185,129,0.05)]' : 'border-amber-300 shadow-[0_0_10px_rgba(245,158,11,0.05)]'}`}
                                            >
                                                <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                                                    <span className="text-sm font-bold text-slate-800">Socratic Question {idx + 1}</span>
                                                    
                                                    {/* Pending Approval vs Approved Glow Badge */}
                                                    <button 
                                                        onClick={() => toggleQuestionApproval(idx)}
                                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all flex items-center gap-1.5 shadow-sm ${
                                                            isApproved 
                                                                ? 'bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100' 
                                                                : 'bg-amber-50 text-amber-800 border border-amber-200 hover:bg-amber-100'
                                                        }`}
                                                    >
                                                        {isApproved ? (
                                                            <><i className="fas fa-check-circle"></i> ✓ Audited & Approved</>
                                                        ) : (
                                                            <><i className="fas fa-exclamation-circle animate-pulse"></i> ⚠️ Pending Trainer Approval</>
                                                        )}
                                                    </button>
                                                </div>
                                                
                                                {activeEditIdx === idx ? (
                                                    <div className="space-y-4 animate-fade-in">
                                                        <div>
                                                            <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide">Question Dialogue Text</label>
                                                            <textarea 
                                                                value={q.question_text} 
                                                                onChange={(e) => updateQuestionField(idx, 'question_text', e.target.value)}
                                                                className="input-field min-h-[60px]"
                                                            />
                                                        </div>
                                                        
                                                        <div className="grid grid-cols-2 gap-4">
                                                            {['a', 'b', 'c', 'd'].map((ch, i) => (
                                                                <div key={ch} className="relative">
                                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wide">Option {ch.toUpperCase()}</label>
                                                                    <input 
                                                                        type="text" 
                                                                        value={q[`option_${ch}`]} 
                                                                        onChange={(e) => updateQuestionField(idx, `option_${ch}`, e.target.value)}
                                                                        className="input-field pr-12 font-medium"
                                                                    />
                                                                    <button
                                                                        onClick={() => updateQuestionField(idx, 'correct_index', i)}
                                                                        className={`absolute right-2 top-6 w-7 h-7 rounded-md flex items-center justify-center text-xs font-bold transition-all ${
                                                                            q.correct_index === i 
                                                                                ? 'bg-emerald-500 text-white shadow-sm' 
                                                                                : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                                                        }`}
                                                                        title="Set as Correct"
                                                                    >
                                                                        {ch.toUpperCase()}
                                                                    </button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        
                                                        <div className="flex justify-end pt-2">
                                                            <button 
                                                                onClick={() => setActiveEditIdx(null)}
                                                                className="btn-primary py-1.5 px-4 rounded-xl text-xs font-bold bg-slate-800 border-slate-800 hover:bg-slate-900 text-white flex items-center gap-1.5 shadow-sm transition-all"
                                                            >
                                                                <i className="fas fa-check"></i> Done Editing
                                                            </button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="space-y-4 animate-fade-in">
                                                        <p className="text-slate-800 font-bold text-sm sm:text-base leading-relaxed">
                                                            {cleanQuestionText(q.question_text)}
                                                        </p>
                                                        
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                                                            {['a', 'b', 'c', 'd'].map((ch, i) => {
                                                                const optVal = q[`option_${ch}`];
                                                                const isCorrect = q.correct_index === i;
                                                                return (
                                                                    <div 
                                                                        key={ch} 
                                                                        className={`p-3 rounded-xl border flex items-center gap-3 transition-all ${
                                                                            isCorrect 
                                                                                ? 'border-emerald-500 bg-emerald-50/40 text-emerald-950 font-bold shadow-sm' 
                                                                                : 'border-slate-100 bg-slate-50/50 text-slate-600 font-semibold'
                                                                        }`}
                                                                    >
                                                                        <div className={`w-6 h-6 rounded-lg border flex items-center justify-center text-xs font-extrabold shrink-0 ${
                                                                            isCorrect 
                                                                                ? 'border-emerald-500 bg-emerald-500 text-white' 
                                                                                : 'border-slate-200 text-slate-400 bg-white'
                                                                        }`}>
                                                                            {ch.toUpperCase()}
                                                                        </div>
                                                                        <span className="text-xs leading-normal">{cleanOptionText(optVal)}</span>
                                                                        {isCorrect && (
                                                                            <i className="fas fa-check-circle text-emerald-500 ml-auto text-xs shrink-0"></i>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                        
                                                        <div className="flex justify-end pt-3 border-t border-slate-100 mt-2">
                                                            <button 
                                                                onClick={() => setActiveEditIdx(idx)}
                                                                className="btn-outline py-1.5 px-3.5 rounded-xl border-slate-200 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5 text-xs transition-all"
                                                            >
                                                                <i className="fas fa-edit text-slate-400"></i> Edit Question
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="p-5 border-t border-slate-200 bg-slate-50 flex justify-between items-center rounded-b-2xl">
                                    <button onClick={() => setStatus('idle')} className="btn-outline">Cancel</button>
                                    
                                    {/* Socratic Difficulty selector in auditor console */}
                                    <div className="flex items-center gap-2">
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Difficulty:</label>
                                        <select 
                                            value={reviewDifficulty} 
                                            onChange={(e) => setReviewDifficulty(e.target.value)} 
                                            className="px-3 py-1.5 rounded-lg border border-slate-300 bg-white text-xs font-bold text-slate-700 focus:outline-none focus:border-socrates-primary shadow-sm"
                                        >
                                            <option value="Easy">Easy (Low Complexity)</option>
                                            <option value="Medium">Medium (Standard Policy)</option>
                                            <option value="Hard">Hard (Exceptions/Deviations)</option>
                                        </select>
                                    </div>

                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => commitModuleToDb(false)} 
                                            className="btn-outline bg-amber-50/50 border-amber-300 text-amber-700 hover:bg-amber-50"
                                            title="Saves your audited progress to resume later"
                                        >
                                            <i className="fas fa-save mr-1.5"></i> Save Progress as Draft
                                        </button>
                                        <button 
                                            onClick={() => commitModuleToDb(true)} 
                                            className="btn-primary shadow-lg flex items-center gap-1.5"
                                        >
                                            <i className="fas fa-check-double"></i> Finalize & Save Module
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* GENERATOR SETUP */}
                    <div className="card p-8">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="w-10 h-10 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center shadow-sm border border-purple-100"><i className="fas fa-magic text-xl"></i></div>
                            <h3 className="font-bold text-xl text-socrates-dark tracking-tight">AI Module Generator</h3>
                        </div>
                        <p className="text-sm text-slate-500 mb-8 leading-relaxed">Upload a training program PDF or paste text policy. The system will extract it and generate customized MCQs.</p>
                        
                        {status === 'loading' ? (
                            <div className="py-20 text-center space-y-4">
                                <div className="w-16 h-16 border-4 border-socrates-primary border-t-transparent rounded-full fa-spin mx-auto"></div>
                                <h4 className="font-bold text-base text-slate-800 animate-pulse">Socrates AI is generating Socratic questions...</h4>
                                <p className="text-xs text-slate-400 max-w-xs mx-auto">Analyzing policy clauses, generating multiple options, and mapping correct answer structures.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">

                                        <select

                                            className="input-field bg-white shadow-sm border-slate-300 py-2.5 text-xs font-semibold text-socrates-dark focus:border-socrates-primary focus:ring-2 focus:ring-blue-100"
                                        >
                                            <option value="en">English Only (Super Fast)</option>

                                            <option value="hindi">Hindi</option>
                                            <option value="hinglish">Hinglish</option>
                                            <option value="punjabi">Punjabi</option>
                                            <option value="bengali">Bengali</option>
                                            <option value="marathi">Marathi</option>
                                            <option value="telugu">Telugu</option>
                                            <option value="tamil">Tamil</option>
                                            <option value="gujarati">Gujarati</option>
                                            <option value="kannada">Kannada</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Upload Training PDF</label>
                                        <div className="relative">
                                            <input 
                                                type="file" 
                                                accept=".pdf"
                                                onChange={(e) => setSelectedFile(e.target.files[0])}
                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"

                                            <div className="input-field bg-slate-50 shadow-sm border-slate-300 py-2.5 px-4 text-center hover:bg-slate-100 transition-colors flex items-center justify-center gap-2 cursor-pointer overflow-hidden text-ellipsis whitespace-nowrap">
                                                <i className="fas fa-file-pdf text-red-500 text-sm"></i>
                                                <span className="text-xs font-semibold text-slate-600 truncate">
                                                    {selectedFile ? selectedFile.name : "Choose PDF..."}
                                                </span>
                                            </div>

                                    </div>
                                </div>
                                
                                <div className="relative">
                                    <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                                    <div className="relative flex justify-center text-xs"><span className="bg-white px-2 text-slate-400 font-bold uppercase">OR</span></div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Paste Training Material</label>
                                    <textarea value={pastedText} onChange={(e) => setPastedText(e.target.value)} className="input-field h-24 resize-none" placeholder="Paste policy changes here..."></textarea>
                                </div>
                                
                                <button onClick={startGenerator} className="w-full btn-primary py-3 flex items-center justify-center gap-2 text-base shadow-md mt-2">
                                    <i className="fas fa-robot"></i> Auto-Generate Test
                                </button>
                            </div>
                        )}
                    </div>

                    {/* MANAGE LIBRARY MODULES */}
                    <div className="card overflow-hidden flex flex-col">
                        <div className="px-6 py-5 border-b border-socrates-border bg-slate-50 flex justify-between items-center">
                            <h3 className="font-bold text-socrates-dark text-lg">Manage Modules</h3>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={() => document.getElementById('socrates-import-input').click()} 
                                    className="btn-outline border-blue-200 text-blue-700 bg-blue-50 hover:bg-blue-100 py-1.5 px-2.5 rounded-lg text-[10px] font-bold flex items-center gap-1 shadow-sm transition-all"
                                    title="Import Module JSON file"
                                >
                                    <i className="fas fa-file-import"></i> Import Module
                                </button>
                                <input 
                                    type="file" 
                                    id="socrates-import-input" 
                                    onChange={handleImportFile} 
                                    accept=".json" 
                                    className="hidden"
