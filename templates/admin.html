                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Number of Questions</label>
                                        <select 
                                            value={qCount} 
                                            onChange={(e) => setQCount(parseInt(e.target.value))} 
                                            className="input-field bg-white py-3 text-sm font-semibold"
                                        >
                                            <option value="5">5 Questions</option>
                                            <option value="10">10 Questions</option>
                                            <option value="15">15 Questions</option>
                                            <option value="20">20 Questions</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Upload Training File</label>
                                        <div className="relative">
                                            <input 
                                                type="file" 
                                                accept=".pdf"
                                                onChange={(e) => setSelectedFile(e.target.files[0])}
                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" 
                                            />
                                            <div className="border border-slate-300 rounded-xl py-2.5 text-center bg-slate-50 hover:bg-slate-100 transition-colors flex items-center justify-center gap-2 cursor-pointer pr-10 overflow-hidden text-ellipsis whitespace-nowrap">
                                                <i className="fas fa-file-pdf text-red-500 text-sm"></i>
                                                <span className="text-xs font-bold text-slate-600">
                                                    {selectedFile ? selectedFile.name : "Choose PDF..."}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="relative">
                                    <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                                    <div className="relative flex justify-center text-xs"><span className="bg-white px-2 text-slate-400 font-bold uppercase">OR</span></div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Paste Training Material</label>
                                    <textarea className="input-field h-24 resize-none" placeholder="Paste policy changes here..."></textarea>
                                </div>
                                
                                <button onClick={startGenerator} className="w-full btn-primary py-3 flex items-center justify-center gap-2 text-base shadow-md mt-2">
                                    <i className="fas fa-robot"></i> Auto-Generate Test
                                </button>
                            </div>
                        )}
                    </div>

                    {/* MANAGE LIBRARY MODULES */}
                    <div className="card overflow-hidden flex flex-col">
                        <div className="px-6 py-5 border-b border-socrates-border bg-slate-50 flex justify-between items-center">
                            <h3 className="font-bold text-socrates-dark text-lg">Manage Modules</h3>
                            <span className="text-xs font-bold bg-blue-100 text-socrates-primary px-2 py-1 rounded-md">{modules.length} Available</span>
                        </div>
                        <div className="p-6 flex-1 space-y-4 overflow-y-auto bg-white max-h-[460px]">
                            {modules.map((mod) => {
                                const approvedCount = mod.questions ? mod.questions.filter(q => q.approved === 1).length : 0;
                                const isReady = mod.status === 'Ready';
                                return (
                                    <div key={mod.id} className={`p-5 border rounded-xl transition-all group relative border-slate-200 hover:border-socrates-primary hover:shadow-sm`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h4 className={`font-bold text-base text-socrates-dark group-hover:text-socrates-primary transition-colors`}>{mod.title}</h4>
                                                <div className="flex flex-wrap gap-2 mt-1.5">
                                                    <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-slate-50 border border-slate-200 text-slate-500 text-[10px] font-bold">
                                                        <i className="fas fa-magic text-[9px] text-purple-500"></i>
                                                        Maker: {mod.created_by || 'ADMIN'}
                                                    </span>
                                                    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold border ${
                                                        isReady 
                                                            ? 'bg-emerald-50 text-emerald-700 border-emerald-100' 
                                                            : 'bg-amber-50 text-amber-700 border-amber-100'
                                                    }`}>
                                                        <i className={`fas ${isReady ? 'fa-user-check' : 'fa-user-shield'} text-[9px]`}></i>
                                                        {isReady ? `Audited by: ${mod.audited_by || 'Super Admin'}` : `Auditor: ${mod.audited_by || 'Awaiting Audit'}`}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                {!isReady && (
                                                    <button 
                                                        onClick={() => handleResumeAudit(mod)} 
                                                        className="btn-outline py-1 px-2.5 text-xs text-amber-700 bg-amber-50 border-amber-300 hover:bg-amber-100 flex items-center gap-1"
                                                        title="Complete Question Audits"
                                                    >
                                                        <i className="fas fa-clipboard-check"></i> Resume Audit
                                                    </button>
                                                )}
                                                <button onClick={() => handleDelete(mod.id)} className="text-slate-400 hover:text-red-500 transition-colors p-1" title="Delete Module"><i className="fas fa-trash-alt"></i></button>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center justify-between mt-4 pt-3 border-t border-slate-100">
                                            <div className="flex items-center gap-3 text-xs text-slate-500 font-medium">
                                                <span><i className="fas fa-list-ol mr-1"></i> {mod.questions_count || (mod.questions ? mod.questions.length : 0)} Qs</span>
                                                <span>&bull;</span>
                                                <span>{mod.created_at || 'Just Now'}</span>
                                            </div>
                                            
                                            {/* Status Badge with progress info */}
                                            <span className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${
                                                isReady 
                                                    ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' 
                                                    : 'bg-amber-50 text-amber-800 border border-amber-200 shadow-sm'
                                            }`}>
                                                {isReady ? (
                                                    '✓ Ready'
                                                ) : (
                                                    `⚠️ Audit (${approvedCount}/${mod.questions_count || 15} Approved)`
                                                )}
                                            </span>
                                        </div>
                                    </div>
                                );
                            })}
                            {modules.length === 0 && (
                                <p className="text-center text-xs text-slate-400 py-10 italic">No modules available. Upload a policy above to generate one.</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const AccessMgmtView = () => {
            const [trainers, setTrainers] = useState([]);
            const [tid, setTid] = useState('');
            const [name, setName] = useState('');
            const [password, setPassword] = useState('password123');
            const [zone, setZone] = useState('ALL');

            // Multi-select scope states for trainer creation
            const [selBUs, setSelBUs] = useState(['ALL']);
            const [selZones, setSelZones] = useState(['ALL']);
            const [selDivisions, setSelDivisions] = useState(['ALL']);
            const [selBranches, setSelBranches] = useState(['ALL']);

            // Dynamic option lists loaded from metadata API
            const [metaOptions, setMetaOptions] = useState({ business_units: [], zones: [], divisions: [], branches: [] });

            // Edit Modal States
            const [showEditModal, setShowEditModal] = useState(false);
            const [editTid, setEditTid] = useState('');
            const [editName, setEditName] = useState('');
            const [editPassword, setEditPassword] = useState('');
            const [editBUs, setEditBUs] = useState([]);
            const [editZones, setEditZones] = useState([]);
            const [editDivisions, setEditDivisions] = useState([]);
            const [editBranches, setEditBranches] = useState([]);

            const loadTrainers = () => {
                fetch('/api/trainers')
                    .then(res => res.json())
                    .then(data => setTrainers(data))
                    .catch(err => {
                        console.error("Fetch trainers failed, offline fallback:", err);
                        setTrainers(db.get('s_trainers') || []);
                    });
            };

            const loadMetadata = () => {
                fetch('/api/metadata')
                    .then(res => res.json())
                    .then(data => setMetaOptions(data))
                    .catch(err => console.error("Error fetching dynamic scopes metadata:", err));
            };

            useEffect(() => { 
                loadTrainers(); 
                loadMetadata();
            }, []);

            const handleToggle = (id, currentStatus) => {
                const newStatus = currentStatus === 'Active' ? 'Revoked' : 'Active';
                fetch(`/api/trainers/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadTrainers();
                    } else {
                        alert("Failed to update trainer status: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Status toggle failed, offline fallback:", err);
                    const updated = trainers.map(t => t.id === id ? {...t, status: newStatus} : t);
                    db.set('s_trainers', updated);
                    loadTrainers();
                });
            };

            const handleDelete = (id) => {
                if(!confirm(`Are you sure you want to permanently delete Trainer '${id}'?`)) return;
                fetch(`/api/trainers/${id}`, {
                    method: 'DELETE'
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadTrainers();
                    } else {
                        alert("Failed to delete trainer: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Trainer deletion failed, offline fallback:", err);
                    const updated = trainers.filter(t => t.id !== id);
                    db.set('s_trainers', updated);
                    loadTrainers();
                });
            };

            const handleCreate = () => {
                if(!tid || !name || !password) return alert("Please enter Trainer ID, Name, and Password");
                
                const payload = { 
                    id: tid.toUpperCase().trim(), 
                    name: name.trim(), 
                    zone: selZones[0] || 'ALL', 
                    password: password.trim(),
                    zones: selZones.join(','),
                    divisions: selDivisions.join(','),
                    branches: selBranches.join(','),
                    business_units: selBUs.join(',')
                };
                
                fetch('/api/trainers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Trainer Credential Created Successfully in SQLite Database!');
                        setTid(''); 
                        setName('');
                        setPassword('password123');
                        setSelBUs(['ALL']);
                        setSelZones(['ALL']);
                        setSelDivisions(['ALL']);
                        setSelBranches(['ALL']);
                        loadTrainers();
                    } else {
                        alert("Failed to create trainer: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Trainer creation failed, offline fallback:", err);
                    const newTrainer = { id: tid.toUpperCase().trim(), name: name.trim(), zone: selZones[0] || 'ALL', status: 'Active', password: password.trim() };
                    db.set('s_trainers', [...trainers, newTrainer]);
                    setTid(''); setName(''); setPassword('password123');
                    loadTrainers();
                });
            };

            const handleStartEdit = (tr) => {
                setEditTid(tr.id);
                setEditName(tr.name);
                setEditPassword(tr.password || 'password123');
                setEditBUs(tr.business_units ? tr.business_units.split(',').map(x => x.trim()) : ['ALL']);
                setEditZones(tr.zones ? tr.zones.split(',').map(x => x.trim()) : ['ALL']);
                setEditDivisions(tr.divisions ? tr.divisions.split(',').map(x => x.trim()) : ['ALL']);
                setEditBranches(tr.branches ? tr.branches.split(',').map(x => x.trim()) : ['ALL']);
                setShowEditModal(true);
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                if (!editName || !editPassword) return alert("Please fill in Trainer Name and Password");
                
                const payload = {
                    name: editName.trim(),
                    password: editPassword.trim(),
                    zone: editZones[0] || 'ALL',
                    zones: editZones.join(','),
                    divisions: editDivisions.join(','),
                    branches: editBranches.join(','),
                    business_units: editBUs.join(',')
                };
                
                fetch(`/api/trainers/${editTid}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Trainer scopes updated successfully!');
                        setShowEditModal(false);
                        loadTrainers();
                    } else {
                        alert('Failed to update trainer: ' + data.message);
                    }
                })
                .catch(err => console.error("Edit trainer error:", err));
            };

            const handleBulkUploadTrainers = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('file', file);
                
                fetch('/api/trainers/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        loadTrainers();
                    } else {
                        alert("Bulk Upload failed:\n" + data.message + (data.details ? "\n" + data.details.join('\n') : ''));
                    }
                })
                .catch(err => {
                    console.error("Bulk upload trainers failed:", err);
                    alert("System error uploading trainers CSV.");
                });
            };

            const downloadTrainerTemplate = () => {
                const csvData = "Trainer ID,Trainer Name,Password,Business Units,Zones,Divisions,Branches\nTR-1002,AMIT SHARMA,pass123,Two-Wheeler,AMD_BU,GUJARAT DIVISION,AHMEDABAD\nTR-1003,PRIYA GUPTA,pass456,ALL,ALL,ALL,ALL";
                const blob = new Blob([csvData], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Socrates_Trainers_Template.csv';
                a.click();
            };

            const handleResetDatabase = () => {
                const pin = prompt("WARNING: This will permanently delete all modules, employee rosters, session histories, and trainer accounts (except Super Admin). Please type 'RESET' to confirm:");
                if (pin !== 'RESET') return;
                
                fetch('/api/admin/reset-database', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('System database has been successfully cleared to pristine state!');
                        loadTrainers();
                    } else {
                        alert("Failed to reset database: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Reset database failed:", err);
                    alert("Error: Failed to connect to server to reset database.");
                });
            };

            const renderCheckboxGroup = (title, options, selected, setSelected) => {
                const isAllSelected = selected.includes('ALL');
                
                const toggleOption = (opt) => {
                    if (opt === 'ALL') {
                        if (isAllSelected) {
                            setSelected([]);
                        } else {
                            setSelected(['ALL']);
                        }
                    } else {
                        let updated = selected.filter(x => x !== 'ALL');
                        if (updated.includes(opt)) {
                            updated = updated.filter(x => x !== opt);
                        } else {
                            updated.push(opt);
                        }
                        setSelected(updated);
                    }
                };

                return (
                    <div className="space-y-1">
                        <div className="flex justify-between items-center">
                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider">{title}</label>
                            <div className="flex gap-2">
                                <button type="button" onClick={() => setSelected(['ALL'])} className="text-[9px] text-socrates-primary font-bold hover:underline">Select All</button>
                                <button type="button" onClick={() => setSelected([])} className="text-[9px] text-red-500 font-bold hover:underline">Clear</button>
                            </div>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-lg p-2.5 max-h-32 overflow-y-auto space-y-1.5 shadow-inner">
                            <label className="flex items-center gap-2 text-xs font-semibold text-slate-700 cursor-pointer">
                                <input type="checkbox" checked={isAllSelected} onChange={() => toggleOption('ALL')} className="rounded border-slate-350 text-socrates-primary focus:ring-blue-100" />
                                <span className={isAllSelected ? "text-socrates-primary font-bold" : ""}>ALL (Full Access)</span>
                            </label>
                            {options.map(opt => (
                                <label key={opt} className="flex items-center gap-2 text-xs text-slate-600 cursor-pointer">
                                    <input type="checkbox" checked={selected.includes(opt) || isAllSelected} disabled={isAllSelected} onChange={() => toggleOption(opt)} className="rounded border-slate-350 text-socrates-primary focus:ring-blue-100 disabled:opacity-50" />
                                    <span>{opt}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in">
                    {/* Edit Trainer Modal */}
                    {showEditModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg border border-slate-200 overflow-hidden transform transition-all">
                                <div className="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-lg text-socrates-dark">Edit Trainer Scopes</h3>
                                        <p className="text-xs text-slate-500 mt-0.5">Modify permissions and scopes for Trainer: {editTid}</p>
                                    </div>
                                    <button onClick={() => setShowEditModal(false)} className="text-slate-400 hover:text-slate-700 text-xl"><i className="fas fa-times"></i></button>
                                </div>
                                <form onSubmit={handleEditSubmit}>
                                    <div className="p-6 space-y-4 max-h-[500px] overflow-y-auto">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wide">Trainer ID (Read Only)</label>
                                            <input type="text" value={editTid} disabled className="input-field bg-slate-50 font-bold cursor-not-allowed border-slate-200 text-slate-400" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Trainer Name</label>
                                            <input type="text" value={editName} onChange={e => setEditName(e.target.value)} required className="input-field" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Password</label>
                                            <input type="text" value={editPassword} onChange={e => setEditPassword(e.target.value)} required className="input-field font-mono" />
                                        </div>
                                        
                                        {/* Multi-select check lists in edit form */}
                                        {renderCheckboxGroup("Business Units Access", metaOptions.business_units, editBUs, setEditBUs)}
                                        {renderCheckboxGroup("Zones Access", metaOptions.zones, editZones, setEditZones)}
                                        {renderCheckboxGroup("Divisions Access", metaOptions.divisions, editDivisions, setEditDivisions)}
                                        {renderCheckboxGroup("Branches Access", metaOptions.branches, editBranches, setEditBranches)}
                                    </div>
                                    <div className="p-5 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 font-semibold">
                                        <button type="button" onClick={() => setShowEditModal(false)} className="btn-outline">Cancel</button>
                                        <button type="submit" className="btn-primary shadow-md">Save Permissions</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="lg:col-span-2 card overflow-hidden">
                        <div className="px-6 py-5 border-b border-socrates-border bg-white flex flex-wrap justify-between items-center gap-4">
                            <div>
                                <h3 className="font-bold text-socrates-dark text-lg">Trainer Accounts</h3>
                                <p className="text-xs text-slate-500">Manage who has access to conduct live training sessions.</p>
                            </div>

        const AnalyticsView = () => {
            const [tab, setTab] = useState('executive');
            const [loading, setLoading] = useState(true);
            const [analytics, setAnalytics] = useState(null);
            
            // Cascading dynamic filters
            const [selectedZone, setSelectedZone] = useState('');
            const [selectedDiv, setSelectedDiv] = useState('');
            const [selectedBranch, setSelectedBranch] = useState('');
            const [selectedEmp, setSelectedEmp] = useState('');
            const [selectedBU, setSelectedBU] = useState('');
            const [selectedProduct, setSelectedProduct] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [filterOptions, setFilterOptions] = useState({
                zones: [],
                divisions: [],
                branches: [],
                executives: [],
                business_units: [],
                products: []
            });

            // Phase 9 States
            const [expandedBucket, setExpandedBucket] = useState(null);
            const [campaignRunning, setCampaignRunning] = useState(false);
            const [campaignMessage, setCampaignMessage] = useState('');
            const [trainersPerf, setTrainersPerf] = useState([]);
            const [loadingTrainers, setLoadingTrainers] = useState(false);

            const loadAnalytics = () => {
                setLoading(true);
                let url = '/api/analytics?';
                if (selectedZone) url += `zone=${encodeURIComponent(selectedZone)}&`;
                if (selectedDiv) url += `division=${encodeURIComponent(selectedDiv)}&`;
                if (selectedBranch) url += `branch=${encodeURIComponent(selectedBranch)}&`;
                if (selectedEmp) url += `emp_code=${encodeURIComponent(selectedEmp)}&`;
                if (selectedBU) url += `business_unit=${encodeURIComponent(selectedBU)}&`;
                if (selectedProduct) url += `product_name=${encodeURIComponent(selectedProduct)}&`;
                if (startDate) url += `start_date=${encodeURIComponent(startDate)}&`;
                if (endDate) url += `end_date=${encodeURIComponent(endDate)}&`;
                
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        setAnalytics(data);
                        if (data.filter_options) {
                            setFilterOptions(data.filter_options);
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Failed to load live analytics:", err);
                        setLoading(false);
                    });
            };

            const loadTrainerPerformance = () => {
                setLoadingTrainers(true);
                fetch('/api/trainers/performance')
                    .then(res => res.json())
                    .then(data => {
                        setTrainersPerf(data);
                        setLoadingTrainers(false);
                    })
                    .catch(err => {
                        console.error("Failed to load trainer performance:", err);
                        setLoadingTrainers(false);
                    });
            };

            useEffect(() => {
                loadAnalytics();
            }, [selectedZone, selectedDiv, selectedBranch, selectedEmp, selectedBU, selectedProduct, startDate, endDate]);

            useEffect(() => {
                if (tab === 'trainer') {
                    loadTrainerPerformance();
                }
            }, [tab]);

            const handlePushRefresherCampaign = (empCodes) => {
                if (!empCodes || empCodes.length === 0) return;
                setCampaignRunning(true);
                setCampaignMessage('');
                fetch('/api/refresher/campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emp_codes: empCodes })
                })
                .then(res => res.json())
                .then(data => {
                    setCampaignRunning(false);
                    if (data.status === 'success') {
                        setCampaignMessage(data.message);
                        loadAnalytics();
                        setTimeout(() => setCampaignMessage(''), 5000);
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(err => {
                    setCampaignRunning(false);
                    console.error("Failed to push campaign:", err);
                });
            };

            const copyAnalyticalEmailReport = () => {
                if (!analytics) {
                    alert("⚠️ No analytics data loaded yet. Please wait or verify connection.");
                    return;
                }
                
                const temporal = analytics.temporal || {};
                const belowCount = analytics.score_distribution?.below_60?.length || 0;
                const midCount = analytics.score_distribution?.['60_80']?.length || 0;
                const highCount = analytics.score_distribution?.above_80?.length || 0;
                const totalParticipants = belowCount + midCount + highCount;
                
                const belowPct = totalParticipants > 0 ? ((belowCount / totalParticipants) * 100).toFixed(1) : '0.0';
                const midPct = totalParticipants > 0 ? ((midCount / totalParticipants) * 100).toFixed(1) : '0.0';
                const highPct = totalParticipants > 0 ? ((highCount / totalParticipants) * 100).toFixed(1) : '0.0';

                // Calculate learning growth delta (Day 20 post score vs Zero Day pre score)
                const zeroDayPre = temporal['ZERO DAY']?.pre || 0;
                const day20Post = temporal['TWENTY DAYS']?.post || 0;
                const overallGrowth = (day20Post - zeroDayPre).toFixed(1);

                // Build filter scope string
                const filtersUsed = [];
                if (selectedZone) filtersUsed.push(`Zone: ${selectedZone}`);
                if (selectedDiv) filtersUsed.push(`Division: ${selectedDiv}`);
                if (selectedBranch) filtersUsed.push(`Branch: ${selectedBranch}`);
                if (selectedBU) filtersUsed.push(`Business Unit: ${selectedBU}`);
                if (selectedProduct) filtersUsed.push(`Product: ${selectedProduct}`);
                if (startDate || endDate) filtersUsed.push(`Period: ${startDate || 'Start'} to ${endDate || 'End'}`);
                const scopeStr = filtersUsed.length > 0 ? filtersUsed.join(" | ") : "All Organization Branches";

                // Extract summary metrics
                const summaryMetrics = analytics.summary_metrics || {};
                const branchesCount = summaryMetrics.branches_count || 0;
                const employeesCount = summaryMetrics.employees_count || 0;
                const roleWiseMap = summaryMetrics.role_wise || {};

                // Format role-wise trained penetration list
                let roleWiseStr = "";
                if (Object.keys(roleWiseMap).length > 0) {
                    roleWiseStr = Object.entries(roleWiseMap).map(([role, count]) => `   • ${role}: ${count} trained`).join("\n");
                } else {
                    roleWiseStr = "   • No role-specific metrics recorded in this selection.";
                }

                // Format critical pain areas
                let painAreasStr = "";
                if (analytics.critical_pain_areas && analytics.critical_pain_areas.length > 0) {
                    painAreasStr = analytics.critical_pain_areas.map(p => `   • ${p.branch_name} (Post-Test: ${p.post}%, Growth: ${p.growth}%, Evaluated: ${p.count})`).join("\n");
                } else {
                    painAreasStr = "   • None identified! All branches meeting the standard performance thresholds.";
                }

                // Format topic knowledge gaps
                let topicGapsStr = "";
                if (analytics.topic_knowledge_gaps && analytics.topic_knowledge_gaps.length > 0) {
                    topicGapsStr = analytics.topic_knowledge_gaps.map(g => `   • ${g.milestone} (${g.topic}): Avg Post-Test: ${g.avg_post}% | Gap Failure Rate: ${g.failure_rate}%`).join("\n");
                } else {
                    topicGapsStr = "   • None identified! Topic milestones showing complete policy compliance.";
                }

                // Format trainer comparative matrix
                let trainerPerfStr = "";
                if (trainersPerf && trainersPerf.length > 0) {
                    trainerPerfStr = trainersPerf.map(t => `   • ${t.name} (${t.trainer_id}) | Star Rating: ${t.rating}★ | NPS: ${t.nps}% | Growth Delta: +${t.growth}%`).join("\n");
                } else {
                    trainerPerfStr = "   • No trainer logs recorded in current period.";
                }

                // Socratic AI Custom Diagnostic Recommendations
                let aiRecs = [];
                const activeScopeDesc = selectedBU ? `Business Unit ${selectedBU}` : selectedProduct ? `Product Line ${selectedProduct}` : selectedBranch ? `Branch ${selectedBranch}` : selectedDiv ? `Division ${selectedDiv}` : selectedZone ? `Zone ${selectedZone}` : 'Global Organization';
                
                if (parseFloat(belowPct) > 20) {
                    aiRecs.push(`🚨 HIGH-ALERT [${activeScopeDesc}]: An elevated risk threshold is active. ${belowPct}% of employees scored below 60%. Highly recommend pushing an automated AI Socratic refresher campaign immediately to stabilize compliance.`);
                } else if (parseFloat(belowPct) > 0) {
                    aiRecs.push(`⚠️ SPECIAL ATTENTION [${activeScopeDesc}]: Minor knowledge regressions detected. ${belowPct}% of employees need refresher training. Monitor progress for the ${belowCount} identified underperforming employees.`);
                } else {
                    aiRecs.push(`✓ EXCELLENT PERFORMANCE [${activeScopeDesc}]: 100% Policy safety achieved. Zero candidates flagged below the 60% compliance threshold. Maintain existing training cadence.`);
                }
                
                if (analytics.critical_pain_areas && analytics.critical_pain_areas.length > 0) {
                    const topPainBranches = analytics.critical_pain_areas.map(p => p.branch_name).slice(0, 3).join(", ");
                    aiRecs.push(`📍 REGIONAL INTERVENTION: Focus Socratic diagnostic reinforcement on the following top flagged branches: ${topPainBranches}.`);
                }
                
                if (branchesCount > 5) {
                    aiRecs.push(`🌐 SCALE METRIC: Socratic penetration is strong across ${branchesCount} branches. Recommend cross-branch performance peer reviews.`);
                } else if (branchesCount > 0 && branchesCount <= 2) {
                    aiRecs.push(`🔍 MICRO-GROUP INSIGHT: High density training focus observed on a select group of ${branchesCount} branch(es). Recommend expanding the Socratic cohort size to capture standard deviation gains.`);
                }

                // Role-wise prescriptive recommendations
                const rolesTrained = Object.keys(roleWiseMap);
                if (rolesTrained.length > 0) {
                    const dominantRole = Object.entries(roleWiseMap).reduce((a, b) => a[1] > b[1] ? a : b)[0];
                    aiRecs.push(`👥 ROLE DISTRIBUTION INSIGHT: Dominant training participation observed in '${dominantRole}' roles. Recommend focused Socratic outreach to ensure parallel alignment in all other active roles: ${rolesTrained.filter(r => r !== dominantRole).join(", ") || 'None pending'}.`);
                }

                const aiRecsStr = aiRecs.map((r, i) => `${i + 1}. ${r}`).join("\n");

                const emailBody = `Subject: REPORT: Socrates AI Socratic Training Performance & Action Plan\n\n` +
`Dear Leadership Team,\n\n` +
`Please find below the comprehensive, highly analytical training performance and policy compliance report compiled dynamically from our Socrates AI Socratic Training Platform.\n\n` +
`========================================= \n` +
`1. EXECUTIVE SUMMARY & TRAINING SCOPE \n` +
`=========================================\n` +
`• Scope of Review: ${scopeStr}\n` +
`• Total Branches Visited (Trained): ${branchesCount}\n` +
`• Total Trained Employees: ${employeesCount}\n` +
`• Overall Policy Mastery Growth (Learning Delta): +${overallGrowth}% \n\n` +
`=========================================\n` +
`2. ROLE-WISE TRAINING PENETRATION \n` +
`=========================================\n` +
`${roleWiseStr}\n\n` +
`=========================================\n` +
`3. KEY PERFORMANCE TRAINEE BUCKETS \n` +
`=========================================\n` +
`• 🟢 Above 80% (High Policy Mastery) : ${highCount} employees (${highPct}%) -> Certified Safe & Compliant\n` +
`• 🟡 60% to 80% (Monitoring Phase)    : ${midCount} employees (${midPct}%) -> Scheduled for periodic tracking\n` +
`• 🔴 Below 60% (Refresher Candidates) : ${belowCount} employees (${belowPct}%) -> Tagged for mandatory refresher retraining\n\n` +
`=========================================\n` +
`4. SOCRATIC TEMPORAL LEARNING PROGRESSION\n` +
`=========================================\n` +
`• ZERO DAY (Tenure & LTV Ratios)  :\n` +
`   - Pre-Test Score: ${temporal['ZERO DAY']?.pre || 0}% | Post-Test Score: ${temporal['ZERO DAY']?.post || 0}% | Growth: +${((temporal['ZERO DAY']?.post || 0) - (temporal['ZERO DAY']?.pre || 0)).toFixed(1)}%\n` +
`• SIX DAYS (CIBIL & Approval Limits) :\n` +
`   - Pre-Test Score: ${temporal['SIX DAYS']?.pre || 0}% | Post-Test Score: ${temporal['SIX DAYS']?.post || 0}% | Growth: +${((temporal['SIX DAYS']?.post || 0) - (temporal['SIX DAYS']?.pre || 0)).toFixed(1)}%\n` +
`• TWENTY DAYS (Self-Employed Docs)  :\n` +
`   - Pre-Test Score: ${temporal['TWENTY DAYS']?.pre || 0}% | Post-Test Score: ${temporal['TWENTY DAYS']?.post || 0}% | Growth: +${((temporal['TWENTY DAYS']?.post || 0) - (temporal['TWENTY DAYS']?.pre || 0)).toFixed(1)}%\n\n` +
`=========================================\n` +
`5. CRITICAL REGIONAL PAIN AREAS FLAGGED\n` +
`=========================================\n` +
`${painAreasStr}\n\n` +
`=========================================\n` +
`6. TOP POLICY KNOWLEDGE GAPS IDENTIFIED\n` +
`=========================================\n` +
`${topicGapsStr}\n\n` +
`=========================================\n` +
`7. TRAINER QUALITY COMPARATIVE MATRIX\n` +
`=========================================\n` +
`${trainerPerfStr}\n\n` +
`=========================================\n` +
`8. SOCRATES AI PRESCRIPTIVE DIAGNOSTIC RECOMMENDATIONS\n` +
`=========================================\n` +
`${aiRecsStr}\n\n` +
`This report has been compiled dynamically based on active filters and real-time Socratic learning indicators. Please let us know if you require any specific drill-downs or custom analytical exports.\n\n` +
`Best regards,\n` +
`Socrates AI Training Platform Manager`;

                navigator.clipboard.writeText(emailBody);
                alert("✨ Premium Dynamic Socratic AI Leadership Email Report successfully compiled and copied to clipboard! You can now paste (Ctrl+V/Cmd+V) directly into your email body to share with leadership.");
            };

            // Cascading lists filters
            const filteredDivisions = filterOptions.divisions.filter(d => !selectedZone || d.zone === selectedZone);
            const filteredBranches = filterOptions.branches.filter(b => 
                (!selectedZone || b.zone === selectedZone) && 
                (!selectedDiv || b.division === selectedDiv)
            );
            const filteredExecutives = filterOptions.executives.filter(e => !selectedBranch || e.branch === selectedBranch);

            const resetFilters = () => {
                setSelectedZone('');
                setSelectedDiv('');
                setSelectedBranch('');
                setSelectedEmp('');
                setSelectedBU('');
                setSelectedProduct('');
                setStartDate('');
                setEndDate('');
            };

            const temporal = analytics?.temporal || {
                'ZERO DAY': { pre: 40.0, post: 65.0, count: 0 },
                'SIX DAYS': { pre: 50.0, post: 80.0, count: 0 },
                'TWENTY DAYS': { pre: 60.0, post: 90.0, count: 0 }
            };

            const hasLive = analytics?.has_live_data;

            // Compute delta and memory decay retention metrics
            const zeroDayGrowth = Math.round(temporal['ZERO DAY'].post - temporal['ZERO DAY'].pre);
            const sixDayGrowth = Math.round(temporal['SIX DAYS'].post - temporal['SIX DAYS'].pre);
            const twentyDayGrowth = Math.round(temporal['TWENTY DAYS'].post - temporal['TWENTY DAYS'].pre);
            const memoryDecay = Math.round(temporal['TWENTY DAYS'].post - temporal['ZERO DAY'].post);

            return (

                                                    className="btn-outline flex-1 py-2 text-xs font-bold bg-white text-slate-600 border-slate-300 hover:bg-slate-50 shadow-sm flex items-center justify-center gap-1.5"
                                                    title="Copy join link, QR code, and PIN"
                                                >
                                                    <i className="fas fa-copy"></i> Copy Invite
                                                </button>
                                                <button 
                                                    onClick={() => {
                                                        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(window.location.origin + '/?pin=' + sessionId)}`;
                                                        const text = `*Socrates AI Training Session Invite* 🧠\n\n1. *Click to Join Instantly*:\n${window.location.origin}/?pin=${sessionId}\n\n2. *Or Scan QR Code to Join*:\n${qrUrl}\n\n3. *Session PIN*: ${sessionId}`;
                                                        const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
                                                        window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
                                                    }}
                                                    className="btn-primary py-2 px-4 text-xs font-bold shadow-md hover:bg-emerald-600 bg-emerald-500 border-emerald-600 flex items-center justify-center gap-1.5 text-white"
                                                    title="Share session invite (Link + QR + PIN) on WhatsApp"
                                                >
                                                    <i className="fab fa-whatsapp text-sm"></i> Share PIN
                                                </button>
                                            </div>
                                        </div>

                                        {activeModule ? (
                                            <div className="text-xs font-bold text-purple-700 bg-purple-50 border border-purple-100 px-3 py-1.5 rounded-xl mb-4">
                                                Active Quiz: <strong>{activeModule.title}</strong> ({activeModule.questions ? activeModule.questions.length : 0} Qs)
                                            </div>
                                        ) : (
                                            <div className="text-xs font-bold text-rose-700 bg-rose-50 border border-rose-100 px-3 py-3 rounded-xl mb-4 flex flex-col gap-1.5 items-center text-center animate-pulse">
                                                <span>⚠️ No training module is currently active!</span>
                                                <span className="text-[10px] text-rose-600 font-semibold normal-case">Please close this live session, select a module from the Module Library, and click "Launch Live Session" to begin.</span>
                                            </div>
                                        )}
                                        <div className="text-xs text-slate-500 font-semibold flex items-center justify-center gap-2">
                                            <i className="fas fa-spinner fa-spin text-socrates-primary"></i> 
                                            <span>Executives Connected: {users.length}</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* pretest/posttest stage */}
                            {(stage === 'pretest' || stage === 'posttest') && (
                                <div className="w-full max-w-3xl animate-fade-in flex flex-col">
                                    
                                    {/* Active Question Controller Toolbar */}
                                    <div className="bg-white p-4 rounded-2xl shadow-md border border-slate-100 flex justify-between items-center mb-6 w-full animate-fade-in">
                                        <div className="flex items-center gap-3">
                                            <span className="w-8 h-8 rounded-full bg-purple-50 text-purple-700 flex items-center justify-center font-bold text-xs border border-purple-100 shadow-sm">
                                                <i className="fas fa-list-ol"></i>
                                            </span>
                                            <div>
                                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Active Controller</div>
                                                <div className="text-sm font-extrabold text-socrates-dark">Question {activeQIdx + 1} of {currentQ.totalQs}</div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex gap-3">
                                            <button 
                                                onClick={() => navigateToQuestion(activeQIdx - 1)}
                                                disabled={activeQIdx === 0}
                                                className="btn-outline border-slate-200 text-slate-600 hover:bg-slate-50 px-4 py-2 text-xs font-bold flex items-center gap-1.5 disabled:opacity-40 disabled:hover:bg-transparent"
                                            >
                                                <i className="fas fa-chevron-left"></i> Back Question
                                            </button>
                                            
                                            <button 
                                                onClick={() => navigateToQuestion(activeQIdx + 1)}
                                                disabled={activeQIdx >= currentQ.totalQs - 1}
                                                className="btn-primary bg-gradient-to-r from-socrates-primary to-blue-600 border-none text-white px-6 py-2 text-xs font-bold flex items-center gap-1.5 shadow-md hover:shadow-lg disabled:opacity-40"
                                            >
                                                Next Question <i className="fas fa-chevron-right"></i>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    {/* Tabs for toggling chart vs leaderboard */}
                                    <div className="flex bg-slate-200/60 p-1 rounded-xl mb-6 self-center border border-slate-200">
                                        <button 
                                            onClick={() => setActiveTab('chart')} 
                                            className={`px-6 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2 ${
                                                activeTab === 'chart' 
                                                    ? 'bg-white text-socrates-primary shadow-sm' 
                                                    : 'text-slate-500 hover:text-slate-800'
                                            }`}
                                        >
                                            <i className="fas fa-chart-bar"></i> Votes Distribution
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab('leaderboard')} 
                                            className={`px-6 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2 ${
                                                activeTab === 'leaderboard' 
                                                    ? 'bg-white text-purple-600 shadow-sm' 
                                                    : 'text-slate-500 hover:text-slate-800'
                                            }`}
                                        >
                                            <i className="fas fa-list-ol"></i> Live Leaderboard ({leaderboard.length})
                                        </button>
                                    </div>
                                    
                                    {activeTab === 'chart' ? (
                                        <div className="bg-white p-10 rounded-2xl shadow-md border border-slate-100 animate-fade-in w-full text-left">
                                            <div className="flex justify-between items-center mb-6 border-b pb-4">
                                                <span className="text-xs font-extrabold uppercase text-socrates-primary tracking-widest bg-blue-50 border border-blue-100 px-3 py-1 rounded-md">
                                                    {activeModule ? `${activeModule.title} (Q${activeQIdx + 1})` : `${assignmentDay} (Q${activeQIdx + 1})`} - {stage === 'pretest' ? 'Pre-Test' : 'Post-Test'}
                                                </span>
                                                <span className="text-xs font-semibold text-slate-500">Votes Counted: {totalVotes}</span>
                                            </div>
                                            <h3 className="text-2xl font-bold text-socrates-dark mb-10 leading-tight">
                                                {currentQ.question}
                                            </h3>
                                            <div className="space-y-6">
                                                {currentQ.options.map((opt, i) => {
                                                    const pct = totalVotes === 0 ? 0 : Math.round((votes[i]/totalVotes)*100);
                                                    const isCorrect = i === currentQ.correctIndex;
                                                    return (
                                                        <div key={i} className="flex items-center gap-6">
                                                            <div className={`w-36 text-right font-bold text-sm ${isCorrect ? 'text-emerald-600 flex items-center justify-end gap-1.5 font-extrabold' : 'text-socrates-dark'}`}>
                                                                {isCorrect && <i className="fas fa-check-circle text-emerald-500 text-xs"></i>}
                                                                {opt}
                                                            </div>
                                                            <div className={`flex-1 h-12 bg-slate-100 rounded-md overflow-hidden border ${isCorrect ? 'border-emerald-300 shadow-[0_0_8px_rgba(16,185,129,0.15)]' : 'border-slate-200'} shadow-inner relative flex items-center`}>
                                                                <div className={`h-full ${isCorrect ? 'bg-socrates-accent' : 'bg-socrates-primary'} transition-all duration-700 flex items-center justify-end pr-4 text-white font-bold`} style={{width: `${pct}%`, minWidth: pct>0?'3rem':'0'}}>
                                                                    {pct > 5 && `${pct}%`}
                                                                </div>
                                                                {isCorrect && (
                                                                    <div className="absolute left-3 text-emerald-600 text-xs font-bold bg-white border border-emerald-300 px-2 py-0.5 rounded shadow-sm flex items-center gap-1">
                                                                        <i className="fas fa-check text-[10px]"></i> Correct Option
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden animate-fade-in w-full text-left">
                                            <div className="px-6 py-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                                                <h4 className="font-bold text-socrates-dark text-sm">Real-Time Rankings</h4>
                                                <span className="text-[10px] font-bold uppercase tracking-wider bg-purple-50 text-purple-700 px-2.5 py-1 rounded border border-purple-100">Speed points active</span>
                                            </div>
                                            <div className="max-h-[380px] overflow-y-auto divide-y divide-slate-100">
                                                {leaderboard.length === 0 ? (
                                                    <div className="py-12 text-center text-xs text-slate-400 italic">No responses recorded yet for this question round.</div>
                                                ) : (
                                                    leaderboard.map((tr, idx) => {
                                                        const isTop3 = idx < 3;
                                                        const badge = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx + 1}`;
                                                        return (
                                                            <div key={tr.emp_code} className="px-6 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                                                                <div className="flex items-center gap-4">
                                                                    <span className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm ${isTop3 ? 'bg-amber-50 text-base shadow-sm border border-amber-200' : 'text-slate-400'}`}>
                                                                        {badge}
                                                                    </span>
                                                                    <div>
                                                                        <div className="font-bold text-socrates-dark text-sm">{tr.emp_name}</div>
                                                                        <div className="text-[10px] text-slate-400 font-semibold uppercase mt-0.5">{tr.emp_code}</div>
                                                                    </div>
                                                                </div>
                                                                <div className="flex items-center gap-6">
                                                                    {tr.last_speed > 0 && (
                                                                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 bg-slate-100 text-slate-600 border border-slate-200`}>
                                                                            <i className="fas fa-bolt text-amber-500"></i> {tr.last_speed}s
                                                                        </span>
                                                                    )}
                                                                    <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                                                                        tr.last_correct 
                                                                            ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' 
                                                                            : 'bg-red-50 text-red-600 border border-red-200'
                                                                    }`}>
                                                                        {tr.last_correct ? 'Correct' : 'Incorrect'}
                                                                    </span>
                                                                    <span className="font-extrabold text-socrates-dark text-base font-mono w-16 text-right">{tr.score} pts</span>
                                                                </div>
                                                            </div>
                                                        )
                                                    })
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Socratic Gap analysis stage */}
                            {stage === 'training' && (
                                <div className="animate-fade-in max-w-2xl bg-white p-12 rounded-3xl shadow-lg border border-slate-100">
                                    <div className="w-24 h-24 bg-blue-50 text-socrates-primary rounded-2xl flex items-center justify-center text-4xl mx-auto mb-8 shadow-sm border border-blue-100"><i className="fas fa-chalkboard-teacher"></i></div>
                                    <h3 className="text-3xl font-extrabold mb-4 text-socrates-dark tracking-tight">Socratic Gap Analysis</h3>
                                    <p className="text-slate-500 font-medium text-sm leading-relaxed mb-6">Review the Pre-Test answers with the trainees. Engage them in dialogue regarding key criteria before initiating the Post-Test.</p>
                                    <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl text-left text-xs text-amber-800 font-medium leading-relaxed">
                                        <i className="fas fa-lightbulb mr-1"></i> <strong>Socratic Tip:</strong> Ask executives why incorrect options were chosen rather than simply stating the correct one.
                                    </div>
                                </div>
                            )}
                        </div>
                        
                        {/* SIDEBAR MASTER CONTROL */}
                        <div className="w-80 flex flex-col bg-white">
                            <div className="p-6 border-b border-slate-200 bg-slate-50">
                                <h4 className="font-bold text-xs mb-4 uppercase text-slate-500 tracking-widest flex items-center gap-2"><i className="fas fa-gamepad text-socrates-primary"></i> Master Control</h4>
                                
                                {activeModule && activeModule.questions && activeModule.questions.length > 0 ? (
                                    <div className="mb-6 bg-white p-4 rounded-xl border border-slate-200 shadow-sm animate-fade-in">
                                        <label className="block text-[10px] font-extrabold text-slate-500 mb-2 uppercase tracking-widest flex items-center gap-1">
                                            <i className="fas fa-list-ol text-purple-600"></i> Active Question Index
                                        </label>
                                        <select 
                                            value={activeQIdx} 
                                            onChange={(e) => {
                                                setActiveQIdx(parseInt(e.target.value));
                                                setVotes({0:0, 1:0, 2:0, 3:0});
                                                setActiveTab('chart');
                                                
                                                // If already in a quiz stage, auto-broadcast the selected question immediately
                                                if (stage === 'pretest' || stage === 'posttest') {
                                                    navigateToQuestion(parseInt(e.target.value));
                                                }
                                            }} 
                                            className="input-field bg-white py-2 text-xs font-bold text-socrates-dark focus:border-purple-600 focus:ring-purple-100 animate-fade-in"
                                        >
                                            {activeModule.questions.map((q, idx) => (
                                                <option key={idx} value={idx}>
                                                    Q{idx + 1}: {q.question_text.length > 25 ? `${q.question_text.substring(0, 25)}...` : q.question_text}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                ) : (
                                    <div className="animate-fade-in text-center p-4 bg-slate-50 border border-slate-200 rounded-xl mb-6 shadow-sm">
                                        <i className="fas fa-exclamation-circle text-rose-500 text-lg mb-2"></i>
                                        <div className="text-[10px] font-extrabold text-slate-700 mb-1 uppercase tracking-wider">No Module Active</div>
                                        <p className="text-[9px] text-slate-400 font-semibold leading-relaxed">
                                            Please select a module from the library first. Fallback milestone questions have been disabled.
                                        </p>
                                    </div>
                                )}
 
                                <div className="space-y-3">
                                    <button 
                                        disabled={!activeModule} 
                                        onClick={() => pushView('pretest')} 
                                        className={`w-full py-3 shadow-sm ${stage==='pretest'?'btn-primary':'btn-outline'} disabled:opacity-40`}
                                    >
                                        1. Push Pre-Test
                                    </button>
                                    <button 
                                        disabled={!activeModule} 
                                        onClick={() => pushView('training')} 
                                        className={`w-full py-3 shadow-sm ${stage==='training'?'btn-primary':'btn-outline'} disabled:opacity-40`}
                                    >
                                        2. Training Lock Screen
                                    </button>
                                    <button 
                                        disabled={!activeModule} 
                                        onClick={() => pushView('posttest')} 
                                        className={`w-full py-3 shadow-sm ${stage==='posttest'?'btn-primary':'btn-outline'} disabled:opacity-40`}
                                    >
                                        3. Push Post-Test
                                    </button>
                                    <div className="pt-2 border-t border-slate-200 mt-2">
                                        <button 
                                            disabled={!activeModule} 
                                            onClick={triggerFinalPodium} 
                                            className="w-full btn-primary bg-gradient-to-r from-amber-500 to-amber-600 border-amber-400 py-3 shadow-md flex items-center justify-center gap-1.5 hover:from-amber-600 hover:to-amber-700 disabled:opacity-40"
                                        >
                                            <i className="fas fa-crown"></i> 4. Show Final Podium
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="p-6 flex-1 overflow-y-auto divide-y divide-slate-100">
                                <h5 className="font-bold text-xs text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-1.5"><i className="fas fa-users text-slate-400"></i> Trainees Joined ({users.length})</h5>
                                {users.map(u => (
                                    <div key={u} className="py-2.5 flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-socrates-accent shadow-[0_0_6px_rgba(16,185,129,0.5)]"></span>
                                        <span className="text-xs font-bold text-slate-700">{u}</span>
                                    </div>
                                ))}
                                {users.length === 0 && (
                                    <p className="text-xs text-slate-400 py-4 italic">Waiting for trainees to connect...</p>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    {% endraw %}
    </script>
</body>
</html>
