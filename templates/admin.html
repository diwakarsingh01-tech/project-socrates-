                            </div>
                        </div>
                        <div className="p-6 flex-1 space-y-4 overflow-y-auto bg-white max-h-[460px]">
                            {modules.map((mod) => {
                                const approvedCount = mod.questions ? mod.questions.filter(q => q.approved === 1).length : 0;
                                const isReady = mod.status === 'Ready';
                                return (
                                    <div key={mod.id} className={`p-5 border rounded-xl transition-all group relative border-slate-200 hover:border-socrates-primary hover:shadow-sm`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h4 className={`font-bold text-base text-socrates-dark group-hover:text-socrates-primary transition-colors`}>
                                                    {mod.title} module creator {mod.creator_name || mod.created_by || 'Super Admin'}
                                                </h4>
                                                <div className="flex flex-wrap gap-2 mt-1.5">
                                                    <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-slate-50 border border-slate-200 text-slate-500 text-[10px] font-bold">
                                                        <i className="fas fa-magic text-[9px] text-purple-500"></i>
                                                        Maker: {mod.creator_name ? `${mod.creator_name} (${mod.created_by})` : (mod.created_by === 'ADMIN' ? 'Super Admin (ADMIN)' : mod.created_by)}
                                                    </span>
                                                    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold border ${
                                                        isReady 
                                                            ? 'bg-emerald-50 text-emerald-700 border-emerald-100' 
                                                            : 'bg-amber-50 text-amber-700 border-amber-100'
                                                    }`}>
                                                        <i className={`fas ${isReady ? 'fa-user-check' : 'fa-user-shield'} text-[9px]`}></i>
                                                        {isReady ? `Audited by: ${mod.audited_by || 'Super Admin'}` : `Auditor: ${mod.audited_by || 'Awaiting Audit'}`}
                                                    </span>
                                                    {/* Glowing trainer-only difficulty badge */}
                                                    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold border shadow-[0_0_8px_rgba(var(--badge-glow))] ${
                                                        mod.difficulty === 'Easy' 
                                                            ? 'bg-emerald-50 text-emerald-700 border-emerald-200' 
                                                            : mod.difficulty === 'Hard' 
                                                                ? 'bg-rose-50 text-rose-700 border-rose-200' 
                                                                : 'bg-blue-50 text-blue-700 border-blue-200'
                                                    }`}
                                                    style={{
                                                        '--badge-glow': mod.difficulty === 'Easy' ? '16,185,129,0.15' : mod.difficulty === 'Hard' ? '244,63,94,0.15' : '59,130,246,0.15'
                                                    }}>
                                                        <i className="fas fa-signal text-[9px]"></i>
                                                        {mod.difficulty || 'Medium'}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                {!isReady && (
                                                    <button 
                                                        onClick={() => handleResumeAudit(mod)} 
                                                        className="btn-outline py-1 px-2.5 text-xs text-amber-700 bg-amber-50 border-amber-300 hover:bg-amber-100 flex items-center gap-1"
                                                        title="Complete Question Audits"
                                                    >
                                                        <i className="fas fa-clipboard-check"></i> Resume Audit
                                                    </button>
                                                )}
                                                <button onClick={() => handleExport(mod)} className="text-slate-400 hover:text-blue-500 transition-colors p-1" title="Export Module JSON"><i className="fas fa-file-export"></i></button>
                                                <button onClick={() => handleDelete(mod.id)} className="text-slate-400 hover:text-red-500 transition-colors p-1" title="Delete Module"><i className="fas fa-trash-alt"></i></button>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center justify-between mt-4 pt-3 border-t border-slate-100">
                                            <div className="flex items-center gap-3 text-xs text-slate-500 font-medium">
                                                <span><i className="fas fa-list-ol mr-1"></i> {mod.questions_count || (mod.questions ? mod.questions.length : 0)} Qs</span>
                                                <span>&bull;</span>
                                                <span>{mod.created_at || 'Just Now'}</span>
                                            </div>
                                            
                                            {/* Status Badge with progress info */}
                                            <span className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${
                                                isReady 
                                                    ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' 
                                                    : 'bg-amber-50 text-amber-800 border border-amber-200 shadow-sm'
                                            }`}>
                                                {isReady ? (
                                                    '✓ Ready'
                                                ) : (
                                                    `⚠️ Audit (${approvedCount}/${mod.questions_count || 15} Approved)`
                                                )}
                                            </span>
                                        </div>
                                    </div>
                                );
                            })}
                            {modules.length === 0 && (
                                <p className="text-center text-xs text-slate-400 py-10 italic">No modules available. Upload a policy above to generate one.</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const AccessMgmtView = ({user}) => {
            const isSuperAdmin = user?.role?.toLowerCase().replace(/\s/g, '') === 'superadmin';
            const [trainers, setTrainers] = useState([]);
            const [tid, setTid] = useState('');
            const [name, setName] = useState('');
            const [password, setPassword] = useState('password123');
            const [zone, setZone] = useState('ALL');

            // Multi-select scope states for trainer creation
            const [selBUs, setSelBUs] = useState(['ALL']);
            const [selZones, setSelZones] = useState(['ALL']);
            const [selDivisions, setSelDivisions] = useState(['ALL']);
            const [selBranches, setSelBranches] = useState(['ALL']);

            // Dynamic option lists loaded from metadata API
            const [metaOptions, setMetaOptions] = useState({ business_units: [], zones: [], divisions: [], branches: [] });

            // Edit Modal States
            const [showEditModal, setShowEditModal] = useState(false);
            const [editTid, setEditTid] = useState('');
            const [editName, setEditName] = useState('');
            const [editPassword, setEditPassword] = useState('');
            const [editBUs, setEditBUs] = useState([]);
            const [editZones, setEditZones] = useState([]);
            const [editDivisions, setEditDivisions] = useState([]);
            const [editBranches, setEditBranches] = useState([]);

            const loadTrainers = () => {
                fetch('/api/trainers')
                    .then(res => res.json())
                    .then(data => setTrainers(data))
                    .catch(err => {
                        console.error("Fetch trainers failed, offline fallback:", err);
                        setTrainers(db.get('s_trainers') || []);
                    });
            };

            const loadMetadata = () => {
                fetch('/api/metadata')
                    .then(res => res.json())
                    .then(data => setMetaOptions(data))
                    .catch(err => console.error("Error fetching dynamic scopes metadata:", err));
            };

            useEffect(() => { 
                loadTrainers(); 
                loadMetadata();
            }, []);

            const handleToggle = (id, currentStatus) => {
                const newStatus = currentStatus === 'Active' ? 'Revoked' : 'Active';
                fetch(`/api/trainers/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadTrainers();
                    } else {
                        alert("Failed to update trainer status: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Status toggle failed, offline fallback:", err);
                    const updated = trainers.map(t => t.id === id ? {...t, status: newStatus} : t);
                    db.set('s_trainers', updated);
                    loadTrainers();
                });
            };

            const handleDelete = (id) => {
                if(!confirm(`Are you sure you want to permanently delete Trainer '${id}'?`)) return;
                fetch(`/api/trainers/${id}`, {
                    method: 'DELETE'
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadTrainers();
                    } else {
                        alert("Failed to delete trainer: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Trainer deletion failed, offline fallback:", err);
                    const updated = trainers.filter(t => t.id !== id);
                    db.set('s_trainers', updated);
                    loadTrainers();
                });
            };

            const handleCreate = () => {
                if(!tid || !name || !password) return alert("Please enter Trainer ID, Name, and Password");
                
                const payload = { 
                    id: tid.toUpperCase().trim(), 
                    name: name.trim(), 
                    zone: selZones[0] || 'ALL', 
                    password: password.trim(),
                    zones: selZones.join(','),
                    divisions: selDivisions.join(','),
                    branches: selBranches.join(','),
                    business_units: selBUs.join(',')
                };
                
                fetch('/api/trainers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Trainer Credential Created Successfully in SQLite Database!');
                        setTid(''); 
                        setName('');
                        setPassword('password123');
                        setSelBUs(['ALL']);
                        setSelZones(['ALL']);
                        setSelDivisions(['ALL']);
                        setSelBranches(['ALL']);
                        loadTrainers();
                    } else {
                        alert("Failed to create trainer: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Trainer creation failed, offline fallback:", err);
                    const newTrainer = { id: tid.toUpperCase().trim(), name: name.trim(), zone: selZones[0] || 'ALL', status: 'Active', password: password.trim() };
                    db.set('s_trainers', [...trainers, newTrainer]);
                    setTid(''); setName(''); setPassword('password123');
                    loadTrainers();
                });
            };

            const handleStartEdit = (tr) => {
                setEditTid(tr.id);
                setEditName(tr.name);
                setEditPassword(tr.plain_password || 'password123');
                setEditBUs(tr.business_units ? tr.business_units.split(',').map(x => x.trim()) : ['ALL']);
                setEditZones(tr.zones ? tr.zones.split(',').map(x => x.trim()) : ['ALL']);
                setEditDivisions(tr.divisions ? tr.divisions.split(',').map(x => x.trim()) : ['ALL']);
                setEditBranches(tr.branches ? tr.branches.split(',').map(x => x.trim()) : ['ALL']);
                setShowEditModal(true);
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                if (!editName || !editPassword) return alert("Please fill in Trainer Name and Password");
                
                const payload = {
                    name: editName.trim(),
                    password: editPassword.trim(),
                    zone: editZones[0] || 'ALL',
                    zones: editZones.join(','),
                    divisions: editDivisions.join(','),
                    branches: editBranches.join(','),
                    business_units: editBUs.join(',')
                };
                
                fetch(`/api/trainers/${editTid}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Trainer scopes updated successfully!');
                        setShowEditModal(false);
                        loadTrainers();
                    } else {
                        alert('Failed to update trainer: ' + data.message);
                    }
                })
                .catch(err => console.error("Edit trainer error:", err));
            };

            const handleBulkUploadTrainers = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('file', file);
                
                fetch('/api/trainers/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        loadTrainers();
                    } else {
                        alert("Bulk Upload failed:\n" + data.message + (data.details ? "\n" + data.details.join('\n') : ''));
                    }
                })
                .catch(err => {
                    console.error("Bulk upload trainers failed:", err);
                    alert("System error uploading trainers CSV.");
                });
            };

            const downloadTrainerTemplate = () => {
                const csvData = "Trainer ID,Trainer Name,Password,Business Units,Zones,Divisions,Branches\nTR-1002,AMIT SHARMA,pass123,TWO-WHEELER,WEST ZONE,GUJARAT DIVISION,AHMEDABAD RF\nTR-1003,PRIYA GUPTA,pass456,ALL,ALL,ALL,ALL";
                const blob = new Blob([csvData], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Socrates_Trainers_Template.csv';
                a.click();
            };

            const handleResetDatabase = () => {
                const pin = prompt("WARNING: This will permanently delete all modules, employee rosters, session histories, and trainer accounts (except Super Admin). Please type 'RESET' to confirm:");
                if (pin !== 'RESET') return;
                
                fetch('/api/admin/reset-database', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('System database has been successfully cleared to pristine state!');
                        loadTrainers();
                    } else {
                        alert("Failed to reset database: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Reset database failed:", err);
                    alert("Error: Failed to connect to server to reset database.");
                });
            };

            const renderCheckboxGroup = (title, options, selected, setSelected) => {
                const isAllSelected = selected.includes('ALL');
                
                const toggleOption = (opt) => {
                    if (opt === 'ALL') {
                        if (isAllSelected) {
                            setSelected([]);
                        } else {
                            setSelected(['ALL']);
                        }
                    } else {
                        let updated = selected.filter(x => x !== 'ALL');
                        if (updated.includes(opt)) {
                            updated = updated.filter(x => x !== opt);
                        } else {
                            updated.push(opt);
                        }
                        setSelected(updated);
                    }
                };

                return (
                    <div className="space-y-1">
                        <div className="flex justify-between items-center">
                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider">{title}</label>
                            <div className="flex gap-2">
                                <button type="button" onClick={() => setSelected(['ALL'])} className="text-[9px] text-socrates-primary font-bold hover:underline">Select All</button>
                                <button type="button" onClick={() => setSelected([])} className="text-[9px] text-red-500 font-bold hover:underline">Clear</button>
                            </div>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-lg p-2.5 max-h-32 overflow-y-auto space-y-1.5 shadow-inner">
                            <label className="flex items-center gap-2 text-xs font-semibold text-slate-700 cursor-pointer">
                                <input type="checkbox" checked={isAllSelected} onChange={() => toggleOption('ALL')} className="rounded border-slate-350 text-socrates-primary focus:ring-blue-100" />
                                <span className={isAllSelected ? "text-socrates-primary font-bold" : ""}>ALL (Full Access)</span>
                            </label>
                            {options.map(opt => (
                                <label key={opt} className="flex items-center gap-2 text-xs text-slate-600 cursor-pointer">
                                    <input type="checkbox" checked={selected.includes(opt) || isAllSelected} disabled={isAllSelected} onChange={() => toggleOption(opt)} className="rounded border-slate-350 text-socrates-primary focus:ring-blue-100 disabled:opacity-50" />
                                    <span>{opt}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in">
                    {/* Edit Trainer Modal */}
                    {showEditModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg border border-slate-200 overflow-hidden transform transition-all">
                                <div className="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-lg text-socrates-dark">Edit Trainer Scopes</h3>
                                        <p className="text-xs text-slate-500 mt-0.5">Modify permissions and scopes for Trainer: {editTid}</p>
                                    </div>
                                    <button onClick={() => setShowEditModal(false)} className="text-slate-400 hover:text-slate-700 text-xl"><i className="fas fa-times"></i></button>
                                </div>
                                <form onSubmit={handleEditSubmit}>
                                    <div className="p-6 space-y-4 max-h-[500px] overflow-y-auto">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wide">Trainer ID (Read Only)</label>
                                            <input type="text" value={editTid} disabled className="input-field bg-slate-50 font-bold cursor-not-allowed border-slate-200 text-slate-400" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Trainer Name</label>
                                            <input type="text" value={editName} onChange={e => setEditName(e.target.value)} required className="input-field" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Password</label>
                                            <input type="text" value={editPassword} onChange={e => setEditPassword(e.target.value)} required className="input-field font-mono" />
                                        </div>
                                        
                                        {/* Multi-select check lists in edit form */}
                                        {renderCheckboxGroup("Business Units Access", metaOptions.business_units, editBUs, setEditBUs)}
                                        {renderCheckboxGroup("Zones Access", metaOptions.zones, editZones, setEditZones)}
                                        {renderCheckboxGroup("Divisions Access", metaOptions.divisions, editDivisions, setEditDivisions)}
                                        {renderCheckboxGroup("Branches Access", metaOptions.branches, editBranches, setEditBranches)}
                                    </div>

                                                            <div className={`w-4 h-4 rounded-full bg-white shadow-sm transition-all duration-300 transform ${tr.status === 'Active' ? 'translate-x-4' : 'translate-x-0'}`}></div>

                    </div>

                    <div className="space-y-6">
                        <div className="card p-6 h-fit bg-slate-50 border-socrates-primary border-t-4 shadow-sm">
                            <div className="flex items-center gap-3 mb-6">

                                {/* Dynamic Multi-select checklists in Creation Panel */}

                                {renderCheckboxGroup("Zones Access", metaOptions.zones, selZones, setSelZones)}
                                {renderCheckboxGroup("Divisions Access", metaOptions.divisions, selDivisions, setSelDivisions)}

                                <button onClick={handleCreate} className="w-full btn-primary mt-6 shadow-md font-bold py-2.5"><i className="fas fa-plus mr-2"></i> Onboard Trainer</button>

                        <div className="card p-6 h-fit bg-red-50/50 border-red-500 border-t-4 shadow-sm">

                                    <i className="fas fa-exclamation-triangle text-lg"></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-base text-red-900 tracking-tight">System Reset</h3>

                                </div>

                            <p className="text-xs text-red-700 mb-4 leading-relaxed">
                                Wipes all training modules, uploaded employee rosters, assessments, and trainer logs. The default Super Admin credential will be preserved.
                            </p>
                            <button onClick={handleResetDatabase} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 px-4 rounded text-xs transition-colors flex items-center justify-center gap-2 shadow-md hover:shadow-lg">
                                <i className="fas fa-trash-alt"></i> Clean All Demo Data
                            </button>

                </div>
            );
        };

        const TravelHubView = ({ user }) => {
            const isSuperAdmin = user?.role?.toLowerCase().replace(/\s/g, '') === 'superadmin';
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showPlanModal, setShowPlanModal] = useState(false);
            
            // Plan form states
            const [branchName, setBranchName] = useState('');
            const [plannedDate, setPlannedDate] = useState('');
            const [purposeTraining, setPurposeTraining] = useState(true);
            const [purposeBusiness, setPurposeBusiness] = useState(false);
            const [businessAgenda, setBusinessAgenda] = useState('');
            const [keyContacts, setKeyContacts] = useState('');
            const [details, setDetails] = useState('');
            
            // Geofence active tracking states
            const [activeCheckinVisit, setActiveCheckinVisit] = useState(null);
            const [isLocating, setIsLocating] = useState(false);
            const [checkinLocation, setCheckinLocation] = useState(null);
            const [checkinResult, setCheckinResult] = useState(null);
            const [managerPin, setManagerPin] = useState('');
            const [verifyResult, setVerifyResult] = useState(null);
            
            const [branchOptions, setBranchOptions] = useState([]);

            // Monthly planning compliance states
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().substring(0, 7)); // YYYY-MM
            const [complianceStats, setComplianceStats] = useState(null);
            const [loadingCompliance, setLoadingCompliance] = useState(false);
            const [showComplianceDetailModal, setShowComplianceDetailModal] = useState(false);

            // Visual Monthly Calendar & Tabs states
            const [activeTab, setActiveTab] = useState('calendar'); // 'calendar' or 'logs'
            const [currentMonthDate, setCurrentMonthDate] = useState(new Date());

            // Dynamic Report Filters states
            const [filterPeriod, setFilterPeriod] = useState('ALL'); // 'ALL', 'MTD', 'YTD', 'MONTH', 'YEAR'
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().substring(0, 7)); // YYYY-MM
            const [filterZone, setFilterZone] = useState('');
            const [filterDivision, setFilterDivision] = useState('');
            const [filterBranch, setFilterBranch] = useState('');
            const [filterTrainer, setFilterTrainer] = useState('');
            const [filterStatus, setFilterStatus] = useState('');

            const getDaysInMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                return new Date(year, month + 1, 0).getDate();
            };

            const getFirstDayOfMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                return new Date(year, month, 1).getDay(); // 0 = Sun, 6 = Sat
            };

            const handlePrevMonth = () => {
                setCurrentMonthDate(prev => new Date(prev.getFullYear(), prev.getMonth() - 1, 1));
            };

            const handleNextMonth = () => {
                setCurrentMonthDate(prev => new Date(prev.getFullYear(), prev.getMonth() + 1, 1));
            };

            const getFilteredVisits = () => {
                return visits.filter(v => {
                    // 1. Period filter
                    const visitDate = new Date(v.planned_date);
                    const today = new Date();
                    
                    if (filterPeriod === 'MTD') {
                        const isCurrentMonth = visitDate.getMonth() === today.getMonth() && visitDate.getFullYear() === today.getFullYear();
                        const isUpToToday = visitDate.getDate() <= today.getDate();
                        if (!isCurrentMonth || !isUpToToday) return false;
                    } else if (filterPeriod === 'YTD') {
                        const isCurrentYear = visitDate.getFullYear() === today.getFullYear();
                        const isUpToToday = visitDate <= today;
                        if (!isCurrentYear || !isUpToToday) return false;
                    } else if (filterPeriod === 'MONTH') {
                        const monthStr = v.planned_date.substring(0, 7);
                        if (monthStr !== filterMonth) return false;
                    } else if (filterPeriod === 'YEAR') {
                        const yearStr = v.planned_date.substring(0, 4);
                        if (yearStr !== filterYear) return false;
                    }

                    // 2. Zone filter
                    if (filterZone && v.zone !== filterZone) return false;

                    // 3. Division filter
                    if (filterDivision && v.division !== filterDivision) return false;

                    // 4. Branch filter
                    if (filterBranch && v.branch_name !== filterBranch) return false;

                    // 5. Trainer filter
                    if (filterTrainer && v.trainer_name !== filterTrainer) return false;

                    // 6. Status filter
                    if (filterStatus && v.status !== filterStatus) return false;

                    return true;
                });
            };

            const getVisitsForDay = (day) => {
                if (!day) return [];
                const yearStr = currentMonthDate.getFullYear();
                const monthStr = String(currentMonthDate.getMonth() + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const dateKey = `${yearStr}-${monthStr}-${dayStr}`;
                return getFilteredVisits().filter(v => v.planned_date === dateKey);
            };

            const handleDayClick = (day) => {
                if (!day) return;
                const yearStr = currentMonthDate.getFullYear();
                const monthStr = String(currentMonthDate.getMonth() + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const dateKey = `${yearStr}-${monthStr}-${dayStr}`;
                setPlannedDate(dateKey);
                setShowPlanModal(true);
            };

            const loadVisits = () => {
                setLoading(true);
                fetch('/api/visits')
                    .then(res => res.json())
                    .then(data => {
                        setVisits(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Error loading visits:", err);
                        setLoading(false);
                    });
            };

            const loadComplianceStats = (monthStr) => {
                setLoadingCompliance(true);
                fetch(`/api/visits/compliance-stats?month=${monthStr}`)
                    .then(res => res.json())
                    .then(data => {
                        setComplianceStats(data);
                        setLoadingCompliance(false);
                    })
                    .catch(err => {
                        console.error("Error loading compliance stats:", err);
                        setLoadingCompliance(false);
                    });
            };

            const handleExportCalendar = () => {
                let url = `/api/visits/export?period=${filterPeriod}`;
                if (filterPeriod === 'MONTH' && filterMonth) url += `&month=${filterMonth}`;
                if (filterPeriod === 'YEAR' && filterYear) url += `&year=${filterYear}`;
                if (filterZone) url += `&zone=${encodeURIComponent(filterZone)}`;
                if (filterDivision) url += `&division=${encodeURIComponent(filterDivision)}`;
                if (filterBranch) url += `&branch=${encodeURIComponent(filterBranch)}`;
                if (filterTrainer) url += `&trainer=${encodeURIComponent(filterTrainer)}`;
                if (filterStatus) url += `&status=${encodeURIComponent(filterStatus)}`;
                window.open(url, '_blank');
            };

            useEffect(() => {
                loadVisits();
                // Load roster filters to get branch list options
                fetch('/api/roster/filters')
                    .then(res => res.json())
                    .then(data => {
                        if (data.branches_meta) {
                            setBranchOptions(data.branches_meta);
                        }
                    })
                    .catch(err => console.error("Error loading roster branches:", err));
            }, []);

            useEffect(() => {
                loadComplianceStats(selectedMonth);
            }, [selectedMonth]);


            const handlePlanSubmit = (e) => {
                e.preventDefault();
                if (!branchName || !plannedDate) return alert("Please select branch and planned date.");
                
                const purposes = [];
                if (purposeTraining) purposes.push("Training");
                if (purposeBusiness) purposes.push("Business Discussion");
                
                if (purposes.length === 0) return alert("Please select at least one purpose (Training or Business Discussion).");
                
                let purposeText = purposes.join(" & ");
                if (purposeBusiness && businessAgenda) {
                    purposeText += ` (Agenda: ${businessAgenda.trim()})`;
                }

                fetch('/api/visits/plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        branch_name: branchName,
                        planned_date: plannedDate,
                        purpose: purposeText,
                        key_contacts: keyContacts.trim(),
                        details: details.trim()
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setShowPlanModal(false);
                        setBranchName('');
                        setPlannedDate('');
                        setPurposeTraining(true);
                        setPurposeBusiness(false);
                        setBusinessAgenda('');
                        setKeyContacts('');
                        setDetails('');
                        loadVisits();
                    } else {
                        alert("❌ Error: " + data.message);
                    }
                })
                .catch(err => console.error("Error planning visit:", err));
            };

            const triggerGPSCheckin = (visit) => {
                setActiveCheckinVisit(visit);
                setCheckinResult(null);
                setVerifyResult(null);
                setManagerPin('');
                setIsLocating(true);
                
                if (!navigator.geolocation) {
                    setIsLocating(false);
                    alert("❌ Geolocation is not supported by your browser.");
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        setCheckinLocation({ latitude: lat, longitude: lon });
                        
                        fetch('/api/visits/checkin', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                visit_id: visit.id,
                                latitude: lat,
                                longitude: lon
                            })
                        })
                        .then(res => res.json())
                        .then(data => {
                            setIsLocating(false);
                            if (data.status === 'success') {
                                setCheckinResult({
                                    status: 'success',
                                    message: data.message,
                                    co_presence: data.co_presence
                                });
                                loadVisits();
                            } else {
                                setCheckinResult({
                                    status: 'error',
                                    message: data.message
                                });
                            }
                        })
                        .catch(err => {
                            setIsLocating(false);
                            setCheckinResult({
                                status: 'error',
                                message: "Failed to communicate with check-in location server."
                            });
                        });
                    },
                    (error) => {
                        setIsLocating(false);
                        setCheckinResult({
                            status: 'error',
                            message: "❌ Geolocation access denied or unavailable. Please enable location permissions."
                        });
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            };

            const handleManagerPINVerify = (e) => {
                e.preventDefault();
                if (!managerPin) return;
                
                fetch('/api/visits/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visit_id: activeCheckinVisit.id,
                        manager_pin: managerPin
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setVerifyResult({ status: 'success', message: data.message });
                        setManagerPin('');
                        loadVisits();
                        setTimeout(() => setActiveCheckinVisit(null), 2500);
                    } else {
                        setVerifyResult({ status: 'error', message: data.message });
                    }
                })
                .catch(err => console.error("Error verifying PIN:", err));
            };

            // Derived filter options based on visits list
            const uniqueZones = [...new Set(visits.map(v => v.zone))].filter(Boolean);
            const uniqueDivisions = [...new Set(visits.map(v => v.division))].filter(Boolean);
            const uniqueBranches = [...new Set(visits.map(v => v.branch_name))].filter(Boolean);
            const uniqueTrainers = [...new Set(visits.map(v => v.trainer_name))].filter(Boolean);
            const uniqueYears = [...new Set(visits.map(v => v.planned_date ? v.planned_date.substring(0, 4) : ''))].filter(Boolean).sort().reverse();

            // Calculate overall compliance (Plan vs Actual) from filtered list
            const filteredVisits = getFilteredVisits();
            const verifiedCount = filteredVisits.filter(v => v.status === 'VERIFIED').length;
            const geofencedCount = filteredVisits.filter(v => v.status === 'GEOFENCED').length;
            const totalPlanned = filteredVisits.length;
            const complianceRate = totalPlanned > 0 ? ((verifiedCount / totalPlanned) * 100).toFixed(1) : '0.0';

            return (
                <div className="space-y-6">
                    {/* Header Controls Block */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-6 rounded-2xl border border-socrates-border shadow-sm gap-4 animate-fade-in">
                        <div>
                            <h3 className="font-bold text-socrates-dark text-lg font-outfit">Socratic Travel Hub & FVSE</h3>
                            <p className="text-xs text-slate-500 mt-1 font-medium">Pre-visit Travel Planner, Geofenced Check-in, & Socratic Manager Sign-off.</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={handleExportCalendar}
                                className="btn-outline flex items-center gap-2 hover:bg-slate-50 text-slate-700 border border-slate-200/80 py-2.5 px-4 font-bold text-xs rounded-xl transition-all"
                            >
                                <i className="fas fa-file-download text-sm text-blue-600"></i> Export CSV
                            </button>
                            <button 
                                onClick={() => setShowPlanModal(true)}
                                className="btn-primary flex items-center gap-2 shadow-md bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-2.5 px-4 font-bold text-xs rounded-xl transition-all"
                            >
                                <i className="fas fa-calendar-plus text-sm"></i> Plan Field Visit
                            </button>
                        </div>

            const loadAnalytics = () => {
                setLoading(true);
                let url = '/api/analytics?';
                if (selectedZone) url += `zone=${encodeURIComponent(selectedZone)}&`;
                if (selectedDiv) url += `division=${encodeURIComponent(selectedDiv)}&`;
                if (selectedBranch) url += `branch=${encodeURIComponent(selectedBranch)}&`;
                if (selectedEmp) url += `emp_code=${encodeURIComponent(selectedEmp)}&`;
                if (selectedBU) url += `business_unit=${encodeURIComponent(selectedBU)}&`;
                if (selectedProduct) url += `product_name=${encodeURIComponent(selectedProduct)}&`;
                if (startDate) url += `start_date=${encodeURIComponent(startDate)}&`;
                if (endDate) url += `end_date=${encodeURIComponent(endDate)}&`;
                
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        setAnalytics(data);
                        if (data.filter_options) {
                            setFilterOptions(data.filter_options);
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Failed to load live analytics:", err);
                        setLoading(false);

                            <button onClick={() => pushView('posttest')} className={`flex-1 flex flex-col items-center py-2 rounded-2xl ${stage === 'posttest' ? 'text-emerald-600 bg-emerald-50' : 'text-slate-400'}`}>
                                <i className="fas fa-bolt mb-1 text-sm"></i>
                                <span className="text-[8px] font-black uppercase tracking-widest">Post-Test</span>
                            </button>
                            <button onClick={triggerFinalPodium} className="flex-1 flex flex-col items-center py-2 rounded-2xl text-amber-600 bg-amber-50 border border-amber-200 shadow-sm">
                                <i className="fas fa-crown mb-1 text-sm"></i>
                                <span className="text-[8px] font-black uppercase tracking-widest">Podium</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    {% endraw %}
    </script>
</body>
</html>
