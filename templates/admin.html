<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates Admin Portal</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        socrates: {
                            primary: '#2563EB', primaryHover: '#1D4ED8', dark: '#0F172A',
                            light: '#F8FAFC', accent: '#10B981', border: '#E2E8F0', text: '#334155'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F1F5F9; color: #0F172A; }
        .card { background: white; border: 1px solid #E2E8F0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn-primary { background: #2563EB; color: white; border-radius: 8px; padding: 10px 18px; font-weight: 600; font-size: 14px; transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background: #1D4ED8; transform: translateY(-1px); }
        .btn-outline { border: 1px solid #CBD5E1; background: white; color: #475569; border-radius: 8px; padding: 10px 18px; font-weight: 600; font-size: 14px; transition: 0.2s; cursor: pointer; }
        .btn-outline:hover { background: #F8FAFC; border-color: #94A3B8; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #64748B; font-weight: 600; font-size: 14px; border-radius: 8px; transition: 0.2s; cursor: pointer; margin-bottom: 4px; }
        .nav-link:hover { background: #F1F5F9; color: #0F172A; }
        .nav-link.active { background: #EFF6FF; color: #2563EB; }
        .input-field { border: 1px solid #CBD5E1; border-radius: 8px; padding: 10px 16px; font-size: 14px; width: 100%; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }
        .animate-fall {
            animation-name: fall;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    {% raw %}
        const { useState, useEffect } = React;
        const socket = io();

        // MOCK OFFLINE DATABASE USING LOCALSTORAGE
        const db = {
            get: (key) => JSON.parse(localStorage.getItem(key) || '[]'),
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            init: () => {
                if(!localStorage.getItem('s_trainers')) {
                    db.set('s_trainers', [
                        { id: 'TR-1001', name: 'Sanjay Verma', zone: 'North Zone', status: 'Active', password: 'password123' },
                        { id: 'TR-1002', name: 'Priya Desai', zone: 'West Zone', status: 'Active', password: 'password123' },
                        { id: 'TR-1003', name: 'Arun Kumar', zone: 'South Zone', status: 'Active', password: 'password123' }
                    ]);
                }
                if(!localStorage.getItem('s_modules')) {
                    const sampleQuestions = [
                        "What is the maximum Loan-to-Value (LTV) ratio allowed for Tier 1 cities?",
                        "Which of the following documents is NOT accepted as valid address proof?",
                        "What is the minimum CIBIL score required for a standard 2-wheeler loan approval?",
                        "How many days is the standard grace period for the first EMI payment?",
                        "Under the new AML policy, transactions above what amount require mandatory PAN card verification?",
                        "What is the maximum tenure for a commercial vehicle loan?",
                        "Who is the final approving authority for a loan deviation of 5% in the interest rate?",
                        "In case of a bounced cheque, what is the standard bounce charge levied on the customer?",
                        "Is physical verification mandatory for repeat customers with a clean track record?",
                        "What is the processing fee percentage for two-wheeler loans under the festive offer?",
                        "Which mobile application should the executive use to upload the customer's KYC documents?",
                        "What is the maximum allowed gap between the date of invoice and loan disbursement?",
                        "If a customer requests prepayment within 6 months, what is the foreclosure charge?",
                        "Which insurance cover is mandatory before disbursing the vehicle loan?",
                        "What is the TAT (Turn Around Time) for credit approval after complete document submission?"
                    ];
                    db.set('s_modules', [
                        { id: 1, title: 'Two-Wheeler Product Policy V2', questions: 15, date: '2 days ago', qList: [...sampleQuestions] },
                        { id: 2, title: 'AML & KYC Compliance 2026', questions: 15, date: '1 week ago', qList: [...sampleQuestions] }
                    ]);
                }
                if(!localStorage.getItem('s_roster')) {
                    db.set('s_roster', [
                        { emp_code: 'SF-1001', emp_name: 'Rahul Singh', branch_name: 'Delhi South', zone: 'North Zone', business_unit: 'Two-Wheeler' },
                        { emp_code: 'SF-1002', emp_name: 'Neha Sharma', branch_name: 'Mumbai Bandra', zone: 'West Zone', business_unit: 'Two-Wheeler' },
                        { emp_code: 'SF-1003', emp_name: 'Karthik Iyer', branch_name: 'Bangalore Central', zone: 'South Zone', business_unit: 'Commercial' },
                        { emp_code: 'SF-1004', emp_name: 'Amit Patel', branch_name: 'Ahmedabad', zone: 'West Zone', business_unit: 'Two-Wheeler' },
                        { emp_code: 'SF-1005', emp_name: 'Sneha Gupta', branch_name: 'Lucknow', zone: 'North Zone', business_unit: 'Retail' }
                    ]);
                }
            }
        };
        db.init();

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null); 
            const [trainersList, setTrainersList] = useState([]);
            const [impersonatedTrainer, setImpersonatedTrainer] = useState(null);

            const activeTrainer = impersonatedTrainer || user;

            useEffect(() => {
                if (user?.role === 'SuperAdmin') {
                    fetch('/api/trainers')
                        .then(res => res.json())
                        .then(data => setTrainersList(data))
                        .catch(err => console.error("Error loading switcher trainers:", err));
                } else {
                    setImpersonatedTrainer(null);
                }
            }, [user]);

            const renderContent = () => {
                switch(view) {
                    case 'dashboard': return <AdminDashboard onNav={setView} user={activeTrainer} />;
                    case 'live_session': return <LiveSession onClose={() => setView('dashboard')} user={activeTrainer} />;
                    case 'roster': return <RosterView user={activeTrainer} />;
                    case 'library': return <LibraryView user={activeTrainer} />;
                    case 'analytics': return <AnalyticsView user={activeTrainer} />;
                    case 'access_mgmt': return <AccessMgmtView />;
                    default: return <AdminDashboard onNav={setView} user={activeTrainer} />;
                }
            };

            const downloadTemplate = () => {
                const csvData = "Employee Code,Employee Name,Branch Name,Zone,Division,Business Unit,Role,Product Name\nSF-1001,Rahul Singh,Delhi South,North Zone,Delhi Division,Two-Wheeler,PL Exe,Splendor V2\nSF-1002,Neha Sharma,Mumbai Bandra,West Zone,Mumbai Division,Two-Wheeler,PL Exe,Activa 6G";
                const blob = new Blob([csvData], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Socrates_Roster_Template.csv';
                a.click();
            };

            const handleLogin = (id, pwd) => {
                fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trainer_id: id.toUpperCase().trim(), password: pwd })
                })
                .then(res => {
                    if (res.ok) {
                        return res.json();
                    } else {
                        return res.json().then(err => { throw new Error(err.message || 'Invalid Credentials'); });
                    }
                })
                .then(data => {
                    setUser({ id: id.toUpperCase().trim(), name: data.name, role: data.role });
                    setView('dashboard');
                })
                .catch(err => {
                    console.error("Login failure:", err);
                    alert("❌ Login Failed: " + err.message);
                });
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="card w-full max-w-sm p-8 border-t-4 border-socrates-primary">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-socrates-primary text-3xl shadow-sm border border-blue-100"><i className="fas fa-brain"></i></div>
                            </div>
                            <h1 className="text-2xl font-bold text-center text-socrates-dark mb-2 tracking-tight">Socrates Admin</h1>
                            <p className="text-sm text-center text-slate-500 mb-8 font-medium">Training Operations Console</p>
                            
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Trainer / Admin ID</label>
                                    <input type="text" id="loginId" defaultValue="ADMIN" className="input-field font-medium" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Password</label>
                                    <input type="password" id="loginPwd" defaultValue="admin123" className="input-field" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('loginId').value, document.getElementById('loginPwd').value)} className="w-full btn-primary mt-6">Secure Login</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden animate-fade-in">
                    <div className="w-64 bg-white border-r border-socrates-border flex flex-col z-10 hidden md:flex shadow-sm">
                        <div className="p-6 border-b border-socrates-border">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-socrates-primary rounded-lg flex items-center justify-center text-white text-sm shadow-md"><i className="fas fa-brain"></i></div>
                                <span className="font-bold text-xl tracking-tight text-socrates-dark">Socrates</span>
                            </div>
                            <p className="text-[10px] text-slate-500 mt-2 uppercase font-bold tracking-widest">{user?.role} Console</p>
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto">
                            <div onClick={() => setView('dashboard')} className={`nav-link ${view==='dashboard'?'active':''}`}><i className="fas fa-layer-group w-5"></i> Dashboard</div>
                            <div onClick={() => setView('live_session')} className={`nav-link ${view==='live_session'?'active':''}`}><i className="fas fa-satellite-dish w-5"></i> Live Session Control</div>
                            <div onClick={() => setView('library')} className={`nav-link ${view==='library'?'active':''}`}><i className="fas fa-robot w-5"></i> AI Module Library</div>
                            <div onClick={() => setView('roster')} className={`nav-link ${view==='roster'?'active':''}`}><i className="fas fa-users-cog w-5"></i> Employee Roster</div>
                            <div onClick={() => setView('analytics')} className={`nav-link ${view==='analytics'?'active':''}`}><i className="fas fa-chart-pie w-5"></i> Analytics Hub</div>
                            
                            {user?.role === 'SuperAdmin' && (
                                <div onClick={() => setView('access_mgmt')} className={`nav-link ${view==='access_mgmt'?'active':''} mt-4 border-t border-slate-100 pt-4`}><i className="fas fa-user-shield w-5 text-purple-500"></i> Access Control</div>
                            )}
                        </div>
                        <div className="p-4 border-t border-socrates-border bg-slate-50">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-sm font-bold text-socrates-primary border border-blue-200">{user?.name?.substring(0,2)}</div>
                                <div>
                                    <div className="font-semibold text-sm text-socrates-dark">{user?.name}</div>
                                    <div className="text-xs text-slate-500 font-medium cursor-pointer hover:text-socrates-primary transition-colors" onClick={() => {setUser(null); setImpersonatedTrainer(null); setView('login');}}>Log Out</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex flex-col overflow-y-auto bg-slate-50/50">
                        <div className="bg-white border-b border-socrates-border px-8 py-5 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                            <div className="flex items-center gap-4">
                                <h1 className="text-xl font-bold text-socrates-dark capitalize tracking-tight">{view.replace('_', ' ')}</h1>
                                {user?.role === 'SuperAdmin' && (
                                    <div className="flex items-center gap-2 bg-purple-50 border border-purple-100 rounded-lg px-3 py-1.5 text-xs shadow-inner">
                                        <i className="fas fa-user-shield text-purple-600"></i>
                                        <span className="font-bold text-purple-800">View Console As:</span>
                                        <select 
                                            value={impersonatedTrainer ? impersonatedTrainer.id : ''}
                                            onChange={(e) => {
                                                const selectedId = e.target.value;
                                                if (!selectedId) {
                                                    setImpersonatedTrainer(null);
                                                } else {
                                                    const matched = trainersList.find(t => t.id === selectedId);
                                                    setImpersonatedTrainer(matched || null);
                                                }
                                            }}
                                            className="bg-white border border-purple-200 text-purple-900 rounded px-2.5 py-0.5 font-bold outline-none cursor-pointer focus:border-purple-500"
                                        >
                                            <option value="">Super Admin (All Overview)</option>
                                            {trainersList.map(t => <option key={t.id} value={t.id}>{t.name} ({t.id})</option>)}
                                        </select>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-3">
                                {view === 'roster' && <button onClick={downloadTemplate} className="btn-outline text-xs flex items-center shadow-sm hover:border-socrates-primary"><i className="fas fa-download mr-2 text-socrates-primary"></i> Download Template</button>}
                                <button className="btn-primary flex items-center shadow-md" onClick={() => setView('live_session')}><i className="fas fa-play mr-2"></i> Start Session</button>
                            </div>
                        </div>
                        <div className="p-8 max-w-7xl mx-auto w-full">
                            {renderContent()}
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({onNav, user}) => {
            const [modules, setModules] = useState([]);
            const [selectedModId, setSelectedModId] = useState('');
            const [loading, setLoading] = useState(true);
            const [stats, setStats] = useState({
                sessions_count: 12,
                branches_visited: 4,
                execs_trained: 340,
                avg_growth_delta: 42.0,
                modules_count: 0,
                recent_sessions: [],
                top_branches: [],
                pending_audits: []
            });
            
            const loadModules = () => {
                const trId = user?.id || 'ADMIN';
                fetch(`/api/modules?trainer_id=${encodeURIComponent(trId)}`)
                    .then(res => res.json())
                    .then(data => {
                        setModules(data);
                        if (data.length > 0) {
                            setSelectedModId(data[0].id.toString());
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Dashboard fetch modules error:", err);
                        const fallback = db.get('s_modules') || [];
                        setModules(fallback);
                        if (fallback.length > 0) {
                            setSelectedModId(fallback[0].id.toString());
                        }
                        setLoading(false);
                    });
            };

            const loadStats = () => {
                const trId = user?.id || 'ADMIN';
                fetch(`/api/dashboard/stats?trainer_id=${encodeURIComponent(trId)}`)
                    .then(res => res.json())
                    .then(data => setStats(data))
                    .catch(err => console.error("Dashboard fetch stats error:", err));
            };

            useEffect(() => {
                loadModules();
                loadStats();
            }, [user]);
            
            const selectedModule = modules.find(m => m.id.toString() === selectedModId);
            const isPendingAudit = selectedModule && selectedModule.status === 'Pending Audit';
            const approvedCount = selectedModule?.questions ? selectedModule.questions.filter(q => q.approved === 1).length : 0;
            const totalCount = selectedModule?.questions_count || selectedModule?.questions?.length || 15;

            const startSession = () => {
                if(!selectedModId || modules.length === 0) {
                    alert("Please select a module first.");
                    return;
                }
                if (isPendingAudit) {
                    alert(`⚠️ Live launch blocked. Module '${selectedModule.title}' is still pending trainer audit (${approvedCount}/${totalCount} approved). Please complete the audit in the AI Library first.`);
                    return;
                }
                localStorage.setItem('socrates_active_module', JSON.stringify(selectedModule));
                onNav('live_session');
            };

            return (
                <div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 animate-fade-in">
                        {/* Session Stats */}
                        <div className="card p-6 border-l-4 border-l-blue-600 bg-white relative overflow-hidden transition-all duration-300 hover:shadow-md hover:-translate-y-0.5 group">
                            <div className="absolute right-3 top-3 w-10 h-10 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-sm font-semibold opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all"><i className="fas fa-satellite-dish"></i></div>
                            <div className="text-xs text-slate-500 font-bold mb-1 uppercase tracking-wider">Sessions (MTD)</div>
                            <div className="text-3xl font-extrabold text-socrates-dark">{stats.sessions_count}</div>
                            <div className="text-xs text-slate-500 mt-3 font-semibold flex items-center gap-1.5"><i className="fas fa-map-marker-alt text-slate-400"></i> {stats.branches_visited} Branches Visited</div>
                        </div>

                        {/* Growth Delta */}
                        <div className="card p-6 border-l-4 border-l-emerald-500 bg-white relative overflow-hidden transition-all duration-300 hover:shadow-md hover:-translate-y-0.5 group">
                            <div className="absolute right-3 top-3 w-10 h-10 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center text-sm font-semibold opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all"><i className="fas fa-chart-line"></i></div>
                            <div className="text-xs text-slate-500 font-bold mb-1 uppercase tracking-wider">Avg Growth Delta</div>
                            <div className="text-3xl font-extrabold text-emerald-600">+{stats.avg_growth_delta}%</div>
                            <div className="text-xs text-emerald-600 mt-3 font-bold flex items-center gap-1.5"><i className="fas fa-arrow-up"></i> Growth pre vs post test</div>
                        </div>

                        {/* Execs Trained */}
                        <div className="card p-6 border-l-4 border-l-purple-500 bg-white relative overflow-hidden transition-all duration-300 hover:shadow-md hover:-translate-y-0.5 group">
                            <div className="absolute right-3 top-3 w-10 h-10 rounded-lg bg-purple-50 text-purple-600 flex items-center justify-center text-sm font-semibold opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all"><i className="fas fa-users-class"></i></div>
                            <div className="text-xs text-slate-500 font-bold mb-1 uppercase tracking-wider">Execs Trained</div>
                            <div className="text-3xl font-extrabold text-socrates-dark">{stats.execs_trained}</div>
                            <div className="text-xs text-slate-500 mt-3 font-semibold flex items-center gap-1.5"><i className="fas fa-globe"></i> Active across zones</div>
                        </div>

                        {/* AI Modules */}
                        <div className="card p-6 border-l-4 border-l-amber-500 bg-white relative overflow-hidden transition-all duration-300 hover:shadow-md hover:-translate-y-0.5 group cursor-pointer" onClick={() => onNav('library')}>
                            <div className="absolute right-3 top-3 w-10 h-10 rounded-lg bg-amber-50 text-amber-600 flex items-center justify-center text-sm font-semibold opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all"><i className="fas fa-robot"></i></div>
                            <div className="text-xs text-slate-500 font-bold mb-1 uppercase tracking-wider">AI Modules</div>
                            <div className="text-3xl font-extrabold text-socrates-dark">{stats.modules_count || modules.length}</div>
                            <div className="text-xs text-socrates-primary mt-3 font-bold flex items-center gap-1">Manage Library &rarr;</div>
                        </div>
                    </div>

                    {/* Main Content Layout Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-8">
                        {/* Left Columns (Sess Control & History Log) */}
                        <div className="lg:col-span-2 space-y-8">
                            {/* Launch Session Card */}
                            <div className="card p-8 bg-white border border-socrates-border relative overflow-hidden shadow-sm">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-socrates-primary"></div>
                                <div className="flex items-center justify-between mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-xl text-socrates-primary border border-blue-100 shadow-sm"><i className="fas fa-play"></i></div>
                                        <div>
                                            <h2 className="text-lg font-bold text-socrates-dark tracking-tight">Ready to Train?</h2>
                                            <p className="text-xs text-slate-500 font-medium">Select an AI-generated module to launch the live broadcast environment</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                                    <div className="md:col-span-2">
                                        <label className="block text-[11px] font-bold text-slate-600 mb-2 uppercase tracking-wider"><i className="fas fa-book-open mr-1 text-socrates-primary"></i> Select Training Module</label>
                                        {loading ? (
                                            <div className="py-3 flex items-center justify-center gap-2 border border-slate-200 rounded-lg bg-slate-50">
                                                <div className="w-4 h-4 border-2 border-socrates-primary border-t-transparent rounded-full fa-spin"></div>
                                                <span className="text-xs font-semibold text-slate-400">Loading modules...</span>
                                            </div>
                                        ) : (
                                            <select 
                                                value={selectedModId} 
                                                onChange={(e)=>setSelectedModId(e.target.value)} 
                                                className="input-field bg-white shadow-sm border-slate-300 py-3 text-sm font-semibold text-socrates-dark focus:border-socrates-primary focus:ring-2 focus:ring-blue-100"
                                            >
                                                {modules.length === 0 && <option value="">No modules available - Go to AI Library</option>}
                                                {modules.map(m => {
                                                    const appCount = m.questions ? m.questions.filter(q => q.approved === 1).length : 0;
                                                    const totCount = m.questions_count || m.questions?.length || 15;
                                                    const isPending = m.status === 'Pending Audit';
                                                    return (
                                                        <option key={m.id} value={m.id.toString()}>
                                                            {m.title} {isPending ? `⚠️ (Pending Audit - ${appCount}/${totCount} Approved)` : `✓ (Ready - ${totCount} Qs)`}
                                                        </option>
                                                    );
                                                })}
                                            </select>
                                        )}
                                    </div>

                                    <div>
                                        <button 
                                            className={`w-full py-3 text-sm shadow-md flex items-center justify-center gap-2.5 transition-all ${
                                                isPendingAudit || modules.length === 0
                                                    ? 'bg-slate-300 text-slate-500 border border-slate-200 cursor-not-allowed shadow-none rounded-xl' 
                                                    : 'btn-primary'
                                            }`}
                                            onClick={startSession}
                                            disabled={isPendingAudit || modules.length === 0}
                                        >
                                            {isPendingAudit ? (
                                                <><i className="fas fa-ban"></i> Audit Pending</>

        const RosterView = ({user}) => {

            const [errorDetails, setErrorDetails] = useState([]);
            const [successMsg, setSuccessMsg] = useState('');
            const [showManualModal, setShowManualModal] = useState(false);
            
            // Manual form fields
            const [empCode, setEmpCode] = useState('');
            const [empName, setEmpName] = useState('');
            const [branchName, setBranchName] = useState('');
            const [zone, setZone] = useState('AMD_BU');
            const [division, setDivision] = useState('');
            const [bu, setBu] = useState('Two-Wheeler');
            const [role, setRole] = useState('PL Exe');
            const [productName, setProductName] = useState('');
            const [changeDetail, setChangeDetail] = useState('');

            const [selZone, setSelZone] = useState('');
            const [selDiv, setSelDiv] = useState('');
            const [selBranch, setSelBranch] = useState('');
            const [filterOptions, setFilterOptions] = useState({ zones: [], divisions: [], branches: [], divisions_meta: [], branches_meta: [] });

            // Search & counters state
            const [searchQuery, setSearchQuery] = useState('');
            const [totalCount, setTotalCount] = useState(0);
            const [filteredCount, setFilteredCount] = useState(0);

            // Edit form fields & modal
            const [showEditModal, setShowEditModal] = useState(false);
            const [editEmpCode, setEditEmpCode] = useState('');
            const [editEmpName, setEditEmpName] = useState('');
            const [editBranchName, setEditBranchName] = useState('');
            const [editZone, setEditZone] = useState('AMD_BU');
            const [editDivision, setEditDivision] = useState('');
            const [editBu, setEditBu] = useState('Two-Wheeler');
            const [editRole, setEditRole] = useState('PL Exe');
            const [editProductName, setEditProductName] = useState('');
            const [editStatus, setEditStatus] = useState('ACTIVE');
            const [editChangeDetail, setEditChangeDetail] = useState('');

            const loadFilterOptions = () => {
                fetch('/api/roster/filters')
                    .then(res => res.json())
                    .then(data => setFilterOptions(data))
                    .catch(err => console.error("Error loading roster roster filters:", err));
            };

            const loadEmps = (zoneVal = selZone, divVal = selDiv, branchVal = selBranch, searchVal = searchQuery) => {
                let url = '/api/roster?';
                if (zoneVal) url += `zone=${encodeURIComponent(zoneVal)}&`;
                if (divVal) url += `division=${encodeURIComponent(divVal)}&`;
                if (branchVal) url += `branch=${encodeURIComponent(branchVal)}&`;
                if (searchVal) url += `q=${encodeURIComponent(searchVal)}&`;
                
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        setEmps(data);
                        setFilteredCount(data.length);
                        if (!zoneVal && !divVal && !branchVal && !searchVal) {
                            setTotalCount(data.length);
                        }
                    })
                    .catch(err => {
                        console.log("Using offline fallback", err);
                        const fallbackData = db.get('s_roster') || [];
                        setEmps(fallbackData);
                        setFilteredCount(fallbackData.length);
                        if (!zoneVal && !divVal && !branchVal && !searchVal) {
                            setTotalCount(fallbackData.length);
                        }
                    });
            };

            const handleFilterChange = (type, val) => {
                let newZone = selZone;
                let newDiv = selDiv;
                let newBranch = selBranch;
                
                if (type === 'zone') {
                    newZone = val;
                    setSelZone(val);
                    setSelDiv('');
                    setSelBranch('');
                    newDiv = '';
                    newBranch = '';
                } else if (type === 'division') {
                    newDiv = val;
                    setSelDiv(val);
                    setSelBranch('');
                    newBranch = '';
                } else if (type === 'branch') {
                    newBranch = val;
                    setSelBranch(val);
                }
                
                loadEmps(newZone, newDiv, newBranch, searchQuery);
            };

            const handleSearch = (val) => {
                setSearchQuery(val);
                loadEmps(selZone, selDiv, selBranch, val);
            };

            useEffect(() => { 
                loadEmps(); 
                loadFilterOptions();
            }, []);

            // Adaptive Default Filters based on Trainer Scopes
            useEffect(() => {
                if (user && user.role === 'Trainer') {
                    const zonesScope = user.zones && user.zones !== 'ALL' ? user.zones.split(',') : [];
                    const divsScope = user.divisions && user.divisions !== 'ALL' ? user.divisions.split(',') : [];
                    const branchesScope = user.branches && user.branches !== 'ALL' ? user.branches.split(',') : [];
                    
                    let defZone = '';
                    let defDiv = '';
                    let defBranch = '';
                    
                    if (zonesScope.length > 0) defZone = zonesScope[0].trim();
                    if (divsScope.length > 0) defDiv = divsScope[0].trim();
                    if (branchesScope.length > 0) defBranch = branchesScope[0].trim();
                    
                    setSelZone(defZone);
                    setSelDiv(defDiv);
                    setSelBranch(defBranch);
                    
                    loadEmps(defZone, defDiv, defBranch, searchQuery);
                } else if (user && user.role === 'SuperAdmin') {
                    // reset defaults
                    setSelZone('');
                    setSelDiv('');
                    setSelBranch('');
                    loadEmps('', '', '', searchQuery);
                }
            }, [user]);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                
                setErrorMsg('');
                setErrorDetails([]);
                setSuccessMsg('');

                const formData = new FormData();
                formData.append('file', file);

                fetch('/api/roster/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setSuccessMsg(data.message);
                        loadEmps();
                        loadFilterOptions();
                    } else {
                        setErrorMsg(data.message);
                        setErrorDetails(data.details || []);
                    }
                })
                .catch(err => {
                    setErrorMsg("Server error uploading file. Duplicacy or network check failed.");
                });
            };

            const handleManualSubmit = (e) => {
                e.preventDefault();
                setErrorMsg('');
                setErrorDetails([]);
                setSuccessMsg('');

                const payload = {
                    emp_code: empCode.toUpperCase().trim(),
                    emp_name: empName.trim(),
                    branch_name: branchName.trim(),
                    zone: zone,
                    division: division.trim(),
                    business_unit: bu,
                    role: role.trim(),
                    product_name: productName.trim(),
                    change_detail: changeDetail.trim()
                };

                fetch('/api/roster/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setSuccessMsg(data.message);
                        setShowManualModal(false);
                        // Reset form
                        setEmpCode('');
                        setEmpName('');
                        setBranchName('');
                        setDivision('');
                        setRole('PL Exe');
                        setZone('AMD_BU');
                        setProductName('');
                        setChangeDetail('');
                        loadEmps();
                        loadFilterOptions();
                    } else {
                        setErrorMsg(data.message);
                        setErrorDetails(data.details || []);
                    }
                })
                .catch(err => {
                    setErrorMsg("Failed to add employee manually.");
                });
            };

            const handleStartEdit = (emp) => {
                setEditEmpCode(emp.emp_code);
                setEditEmpName(emp.emp_name);
                setEditBranchName(emp.branch_name || '');
                setEditZone(emp.zone || 'AMD_BU');
                setEditDivision(emp.division || '');
                setEditBu(emp.business_unit || 'Two-Wheeler');
                setEditRole(emp.role || 'PL Exe');
                setEditProductName(emp.product_name || '');
                setEditStatus(emp.status || 'ACTIVE');
                setEditChangeDetail(emp.change_detail || '');
                setShowEditModal(true);
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                setErrorMsg('');
                setErrorDetails([]);
                setSuccessMsg('');

                const payload = {
                    emp_name: editEmpName.trim().toUpperCase(),
                    branch_name: editBranchName.trim().toUpperCase(),
                    zone: editZone,
                    division: editDivision.trim().toUpperCase(),
                    business_unit: editBu,
                    role: editRole.trim().toUpperCase(),
                    product_name: editProductName.trim().toUpperCase(),
                    status: editStatus,
                    change_detail: editChangeDetail.trim().toUpperCase()
                };

                fetch(`/api/roster/${editEmpCode}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setSuccessMsg(data.message);
                        setShowEditModal(false);
                        loadEmps();
                        loadFilterOptions();
                    } else {
                        setErrorMsg(data.message);
                    }
                })
                .catch(err => {
                    setErrorMsg("Failed to update employee details.");
                });
            };

            const handleDeleteEmp = (code) => {
                const reason = prompt(`Are you sure you want to delete Employee Code '${code}'?\nPlease enter a reason / detail for deletion (e.g. Resigned, Transferred, Shifted BU):`);
                if (reason === null) return;
                
                setErrorMsg('');
                setSuccessMsg('');

                fetch(`/api/roster/${code}?reason=${encodeURIComponent(reason.trim() || 'NO REASON SPECIFIED')}`, {
                    method: 'DELETE'
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        setSuccessMsg(data.message);
                        loadEmps();
                        loadFilterOptions();
                    } else {
                        setErrorMsg(data.message);
                    }
                })
                .catch(err => {
                    setErrorMsg("Failed to delete employee.");
                });
            };

            return (
                <div className="space-y-6">
                    {/* Manual Entry Modal */}
                    {showManualModal && (

                                                <option value="BTL">BTL</option>
                                                <option value="DBH / DPH">DBH / DPH</option>

                                                <option value="CPU Team">CPU Team</option>
                                                <option value="DTL">DTL</option>

                                                <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Branch Name</label>
                                                <input type="text" value={branchName} onChange={e => setBranchName(e.target.value.toUpperCase())} placeholder="e.g. AHMEDABAD" className="input-field uppercase" />

                                                <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Zone</label>

                                                    <option value="CH_BU">CH_BU</option>
                                                    <option value="DEL_BU">DEL_BU</option>
                                                    <option value="KOL_BU">KOL_BU</option>

                                    <i className="fas fa-search text-xs"></i>

                                <input type="text" value={searchQuery} onChange={e => handleSearch(e.target.value)} placeholder="Search by Employee Code, Name, or Product..." className="input-field pl-9 py-1.5 text-xs bg-slate-50/50 hover:bg-slate-50 focus:bg-white" />

                                    <i className="fas fa-filter text-socrates-primary"></i> Filtered: {filteredCount}

                        <div className="overflow-x-auto">

                                        emps.map((e, i) => (
                                            <tr key={i} className={`hover:bg-slate-50 transition-colors ${e.status === 'DELETED' ? 'bg-slate-50/50 opacity-70' : ''}`}>
                                                <td className="px-6 py-4 font-semibold text-socrates-primary">{e.emp_code}</td>
                                                <td className="px-6 py-4 font-medium text-socrates-dark">{e.emp_name}</td>

                                                    <div className="text-[10px] text-slate-500 mt-1 italic max-w-[150px] truncate" title={e.change_detail}>{e.change_detail || 'ADDED MANUALLY'}</div>
                                                </td>

                                                        <i className="fas fa-edit text-[10px]"></i> Edit
                                                    </button>
                                                    <button onClick={() => handleDeleteEmp(e.emp_code)} className="text-xs text-red-600 hover:text-red-800 font-bold flex items-center gap-1 bg-red-50/50 hover:bg-red-100/50 border border-red-100 rounded px-2.5 py-1 transition-all">

        };


        const LibraryView = ({user}) => {
            const [status, setStatus] = useState('idle'); // idle, loading, generating, review
            const [modules, setModules] = useState([]);
            const [title, setTitle] = useState('');
            const [qCount, setQCount] = useState(15);
            const [selectedFile, setSelectedFile] = useState(null);
            const [trainers, setTrainers] = useState([]);
            const [assignedAuditor, setAssignedAuditor] = useState('');
            
            // Auditor review states
            const [reviewModuleId, setReviewModuleId] = useState(null);
            const [reviewTitle, setReviewTitle] = useState('');
            const [reviewQuestions, setReviewQuestions] = useState([]);

            const loadModules = () => {
                const trId = user?.id || 'ADMIN';
                fetch(`/api/modules?trainer_id=${encodeURIComponent(trId)}`)
                    .then(res => res.json())
                    .then(data => setModules(data))
                    .catch(err => {
                        console.error("Using offline fallback modules:", err);
                        setModules(db.get('s_modules') || []);
                    });
            };
            
            useEffect(() => { 
                loadModules(); 
                fetch('/api/trainers')
                    .then(res => res.json())
                    .then(data => setTrainers(data || []))
                    .catch(err => console.error("Error loading trainers:", err));
            }, []);

            const handleDelete = (id) => {
                if(confirm('Are you sure you want to delete this module?')) {
                    fetch(`/api/modules/${id}`, { method: 'DELETE' })
                        .then(res => res.json())
                        .then(() => {
                            loadModules();
                        })
                        .catch(err => {
                            console.error("Offline delete fallback:", err);
                            const updated = modules.filter(m => m.id !== id);
                            db.set('s_modules', updated);
                            loadModules();
                        });
                }
            };

            const startGenerator = () => {
                if(!title) return alert("Please enter a Module Title.");
                
                setStatus('loading');
                const formData = new FormData();
                formData.append('title', title);
                formData.append('count', qCount);
                formData.append('trainer_id', user?.id || 'ADMIN');
                if (selectedFile) {
                    formData.append('file', selectedFile);
                }
                
                fetch('/api/modules/generate', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Open the Auditor panel with generated draft questions
                        setReviewModuleId(null);
                        setReviewTitle(data.title);
                        // Map each question to have default approved=0 for auditor to audit
                        const mappedQs = data.questions.map(q => ({
                            question_text: q.question,
                            option_a: q.options[0],
                            option_b: q.options[1],
                            option_c: q.options[2],
                            option_d: q.options[3],
                            correct_index: q.correctIndex,
                            approved: 0
                        }));
                        setReviewQuestions(mappedQs);
                        setStatus('review');
                        setTitle('');
                        setSelectedFile(null);
                    } else {
                        alert("AI Generation failed: " + data.message);
                        setStatus('idle');
                    }
                })
                .catch(err => {
                    console.error("AI generator fetch crash:", err);
                    alert("System error. Running offline fallback draft.");
                    setStatus('idle');
                });
            };

            const handleResumeAudit = (mod) => {
                setReviewModuleId(mod.id);
                setReviewTitle(mod.title);
                // Map from database questions structure back to auditor draft
                const mappedQs = mod.questions.map(q => ({
                    id: q.id,
                    question_text: q.question_text,
                    option_a: q.option_a,
                    option_b: q.option_b,
                    option_c: q.option_c,
                    option_d: q.option_d,
                    correct_index: q.correct_index,
                    approved: q.approved
                }));
                setReviewQuestions(mappedQs);
                setStatus('review');
            };

            const toggleQuestionApproval = (idx) => {
                const updated = [...reviewQuestions];
                updated[idx].approved = updated[idx].approved === 1 ? 0 : 1;
                setReviewQuestions(updated);
            };

            const updateQuestionField = (idx, field, value) => {
                const updated = [...reviewQuestions];
                updated[idx][field] = value;
                setReviewQuestions(updated);
            };

            const commitModuleToDb = (isFinalize) => {
                const pendingCount = reviewQuestions.filter(q => q.approved === 0).length;
                
                if (isFinalize && pendingCount > 0) {
                    alert(`⚠️ Cannot Finalize Module. There are still ${pendingCount} questions pending trainer approval. Please audit all questions or click 'Save Draft Progress' instead.`);
                    return;
                }
                
                const payload = {
                    title: reviewTitle,
                    trainer_id: user?.id || 'ADMIN',
                    audited_by: assignedAuditor || 'Awaiting Audit',
                    module_id: reviewModuleId,
                    questions: reviewQuestions.map(q => ({
                        question: q.question_text,
                        options: [q.option_a, q.option_b, q.option_c, q.option_d],
                        correctIndex: q.correct_index,
                        approved: q.approved
                    }))
                };
                
                fetch('/api/modules/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        setStatus('idle');
                        loadModules();
                    } else {
                        alert("Error saving: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Save failed:", err);
                    alert("Database save error occurred.");
                });
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 relative">
                    
                    {/* MAKER-CHECKER AUDIT WIZARD MODAL */}
                    {status === 'review' && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col border border-slate-200 overflow-hidden transform transition-all">
                                <div className="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-lg text-socrates-dark flex items-center gap-2">
                                            <i className="fas fa-user-shield text-socrates-primary"></i>
                                            Trainer Auditor Console
                                        </h3>
                                        <p className="text-xs text-socrates-primary font-bold tracking-widest uppercase mt-0.5">{reviewTitle}</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs font-bold bg-amber-50 border border-amber-200 text-amber-800 px-3 py-1 rounded-full">
                                            Audited: {reviewQuestions.filter(q => q.approved === 1).length} / {reviewQuestions.length}
                                        </span>
                                        <button onClick={() => setStatus('idle')} className="text-slate-400 hover:text-slate-700 text-xl"><i className="fas fa-times"></i></button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
                                    {reviewQuestions.map((q, idx) => {
                                        const isApproved = q.approved === 1;
                                        return (
                                            <div 
                                                key={idx} 
                                                className={`p-6 rounded-xl border bg-white transition-all shadow-sm ${isApproved ? 'border-emerald-300 shadow-[0_0_10px_rgba(16,185,129,0.05)]' : 'border-amber-300 shadow-[0_0_10px_rgba(245,158,11,0.05)]'}`}
                                            >
                                                <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                                                    <span className="text-sm font-bold text-slate-800">Socratic Question {idx + 1}</span>
                                                    
                                                    {/* Pending Approval vs Approved Glow Badge */}
                                                    <button 
                                                        onClick={() => toggleQuestionApproval(idx)}
                                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all flex items-center gap-1.5 shadow-sm ${
                                                            isApproved 
                                                                ? 'bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100' 
                                                                : 'bg-amber-50 text-amber-800 border border-amber-200 hover:bg-amber-100'
                                                        }`}
                                                    >
                                                        {isApproved ? (
                                                            <><i className="fas fa-check-circle"></i> ✓ Audited & Approved</>
                                                        ) : (
                                                            <><i className="fas fa-exclamation-circle animate-pulse"></i> ⚠️ Pending Trainer Approval</>
                                                        )}
                                                    </button>
                                                </div>
                                                
                                                <div className="space-y-4">
                                                    <div>
                                                        <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide">Question Dialogue Text</label>
                                                        <textarea 
                                                            value={q.question_text} 
                                                            onChange={(e) => updateQuestionField(idx, 'question_text', e.target.value)}
                                                            className="input-field min-h-[60px]"
                                                        />
                                                    </div>

                                <div className="p-5 border-t border-slate-200 bg-slate-50 flex justify-between items-center rounded-b-2xl">
                                    <button onClick={() => setStatus('idle')} className="btn-outline">Cancel</button>
                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => commitModuleToDb(false)}

                                            title="Saves your audited progress to resume later"

                                            <i className="fas fa-save mr-1.5"></i> Save Progress as Draft
                                        </button>
                                        <button

                    )}
                    
                    {/* GENERATOR SETUP */}
                    <div className="card p-8">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="w-10 h-10 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center shadow-sm border border-purple-100"><i className="fas fa-magic text-xl"></i></div>
                            <h3 className="font-bold text-xl text-socrates-dark tracking-tight">AI Module Generator</h3>
                        </div>
                        <p className="text-sm text-slate-500 mb-8 leading-relaxed">Upload a training program PDF or paste text policy. The system will extract it and generate customized MCQs.</p>
                        
                        {status === 'loading' ? (
                            <div className="py-20 text-center space-y-4">
                                <div className="w-16 h-16 border-4 border-socrates-primary border-t-transparent rounded-full fa-spin mx-auto"></div>
                                <h4 className="font-bold text-base text-slate-800 animate-pulse">Socrates AI is generating Socratic questions...</h4>
                                <p className="text-xs text-slate-400 max-w-xs mx-auto">Analyzing policy clauses, generating multiple options, and mapping correct answer structures.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Module Title</label>
                                        <input type="text" value={title} onChange={(e)=>setTitle(e.target.value)} className="input-field" placeholder="e.g. KYC Updates" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Assign Auditor (Checker)</label>
                                        <select 
                                            value={assignedAuditor} 
                                            onChange={(e) => setAssignedAuditor(e.target.value)} 
                                            className="input-field bg-white py-3 text-sm font-semibold"
                                        >
                                            <option value="">Awaiting Audit</option>
                                            {trainers.map(t => (
                                                <option key={t.trainer_id} value={t.name}>{t.name} ({t.trainer_id})</option>

                                        </select>
