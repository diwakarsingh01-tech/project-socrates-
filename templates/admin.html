<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates Admin Portal</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        socrates: {
                            primary: '#2563EB', primaryHover: '#1D4ED8', dark: '#0F172A',
                            light: '#F8FAFC', accent: '#10B981', border: '#E2E8F0', text: '#334155'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Lock scroll to internal flex containers */
            background-color: #F8FAFC;
            color: #0F172A;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }
        .card { background: white; border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.02); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { border-color: rgba(37, 99, 235, 0.2); box-shadow: 0 20px 30px -10px rgba(15, 23, 42, 0.06); transform: translateY(-2px); }
        
        .btn-primary { 
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); 
            color: white; 
            border-radius: 14px; 
            padding: 11px 24px; 
            font-weight: 800; 
            font-size: 14px; 
            transition: all 0.25s ease; 
            cursor: pointer; 
            box-shadow: 0 4px 10px -1px rgba(37,99,235,0.2); 
            border: none; 
            outline: none; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            letter-spacing: 0.01em;
        }
        .btn-primary:active { transform: scale(0.98); }
        
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #64748B; font-weight: 700; font-size: 13px; border-radius: 14px; transition: all 0.25s ease; cursor: pointer; margin-bottom: 4px; }
        .nav-link:hover { background: #F1F5F9; color: #0F172A; }
        .nav-link.active { background: #EFF6FF; border-left: 5px solid #2563EB; color: #2563EB; }

        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #94A3B8; font-weight: 700; font-size: 13px; border-radius: 14px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; margin-bottom: 4px; border-left: 4px solid transparent; }
        .sidebar-link:hover { background: rgba(255,255,255,0.06); color: #F8FAFC; }
        .sidebar-link.active { background: rgba(37,99,235,0.15); border-left-color: #3B82F6; color: #60A5FA; font-weight: 800; text-shadow: 0 0 10px rgba(59,130,246,0.2); }
        
        .input-field { border: 1.5px solid #E2E8F0; border-radius: 14px; padding: 12px 16px; font-size: 14px; width: 100%; outline: none; transition: all 0.2s ease; background: #F8FAFC; }
        .input-field:focus { border-color: #2563EB; background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.06); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        
        /* Institutional auto-set fix */
        .vh-lock { height: 100dvh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    {% raw %}
        const { useState, useEffect } = React;
        const socket = io();

        const cleanQuestionText = (text) => {
            if (typeof text !== 'string') return text;
            return text.replace(/^\[[^\]]+\]\s*/g, '').trim();
        };

        const cleanOptionText = (opt) => {
            if (typeof opt !== 'string') return opt;
            return opt.replace(/^(Option\s+[A-D][:.-]?\s*|[A-D][:.-]\s*)/i, '').trim();
        };

        // PRODUCTION DATABASE HANDLER (LOCALSTORAGE FALLBACK)
        const db = {
            get: (key) => JSON.parse(localStorage.getItem(key) || '[]'),
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            init: () => {
                // Production: No default mock data.
                // Clear any legacy demo data from localStorage if exists
                if (localStorage.getItem('s_trainers') && localStorage.getItem('s_trainers').includes('Sanjay Verma')) {
                    localStorage.removeItem('s_trainers');
                    localStorage.removeItem('s_modules');
                    localStorage.removeItem('s_roster');
                }
            }
        };
        db.init();

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null); 
            const [trainersList, setTrainersList] = useState([]);
            const [impersonatedTrainer, setImpersonatedTrainer] = useState(null);
            const [dbDiag, setDbDiag] = useState({ database_type: 'Checking...', connection_status: 'Checking...', connection_error: null, database_url: '' });
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const activeTrainer = impersonatedTrainer || user;
            const isSuperAdmin = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'superadmin';
            const isLeader = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'leader';

            const handleLogout = () => {
                fetch('/api/admin/logout', { method: 'POST' })
                    .finally(() => {
                        localStorage.removeItem('socrates_active_module');
                        setUser(null);
                        setImpersonatedTrainer(null);
                        setView('login');
                    });
            };

            useEffect(() => {
                fetch('/api/admin/me')
                    .then(res => {
                        if (res.ok) return res.json();
                        throw new Error("No active session");
                    })
                    .then(data => {
                        if (data.status === 'success') {
                            setUser({ id: data.user.trainer_id, name: data.user.name, role: data.user.role });
                            setView('dashboard');
                        }
                    })
                    .catch(err => console.log("Session restore: prompting login."));
            }, []);

            useEffect(() => {
                if (activeTrainer) {
                    fetch('/api/admin/diagnostics')
                        .then(res => res.json())
                        .then(data => setDbDiag(data))
                        .catch(err => setDbDiag({ database_type: 'Unknown', connection_status: 'Failed to fetch', connection_error: err.message, database_url: '' }));
                }
            }, [activeTrainer]);

            useEffect(() => {
                if (isSuperAdmin) {
                    fetch('/api/trainers')
                        .then(res => res.json())
                        .then(data => setTrainersList(data))
                        .catch(err => console.error("Error loading switcher trainers:", err));
                } else {
                    setImpersonatedTrainer(null);
                }
            }, [user]);

            useEffect(() => {
                if (view !== 'live_session') {
                    localStorage.removeItem('socrates_active_module');
                }
            }, [view]);

            const renderContent = () => {
                switch(view) {
                    case 'dashboard': return <AdminDashboard onNav={setView} user={activeTrainer} dbDiag={dbDiag} />;
                    case 'live_session': return <LiveSession onClose={() => setView('dashboard')} user={activeTrainer} />;
                    case 'roster': return <RosterView user={activeTrainer} />;
                    case 'library': return <LibraryView user={activeTrainer} />;
                    case 'analytics': return <AnalyticsView user={activeTrainer} />;
                    case 'access_mgmt': return <AccessMgmtView user={activeTrainer} />;
                    case 'travel_hub': return <TravelHubView user={activeTrainer} />;
                    default: return <AdminDashboard onNav={setView} user={activeTrainer} dbDiag={dbDiag} />;
                }
            };

            const downloadTemplate = () => {
                const csvData = "Employee Code,Employee Name,Business Unit,Zone,Division,Branch Name,Role,Product Name\nSF-1001,RAHUL SINGH,TWO-WHEELER,NORTH ZONE,DELHI DIVISION,DELHI RF,PL EXE,SPLENDOR V2\nSF-1002,NEHA SHARMA,TWO-WHEELER,WEST ZONE,GUJARAT DIVISION,AHMEDABAD RF,PL EXE,ACTIVA 6G\nSF-1003,AMIT PATEL,TWO-WHEELER,NORTH ZONE,PUNJAB DIVISION,CHANDIGARH RF,PL EXE,ACTIVA 6G\nSF-1004,PRIYA DAS,TWO-WHEELER,EAST ZONE,BENGAL DIVISION,KOLKATA RF,PL EXE,ACTIVA 6G";
                const blob = new Blob([csvData], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Socrates_Roster_Template.csv';
                a.click();
            };

            const handleLogin = (id, pwd) => {
                fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trainer_id: id.toUpperCase().trim(), password: pwd })
                })
                .then(res => {
                    if (res.ok) {
                        return res.json();
                    } else {
                        return res.text().then(text => {
                            let msg = 'Invalid Credentials';
                            try {
                                const err = JSON.parse(text);
                                msg = err.message || msg;
                            } catch(e) {}
                            throw new Error(msg);
                        });
                    }
                })
                .then(data => {
                    setUser({ id: id.toUpperCase().trim(), name: data.name, role: data.role });
                    setView('dashboard');
                })
                .catch(err => {
                    console.error("Login failure:", err);
                    alert("❌ Login Failed: " + err.message);
                });
            };            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 p-4 relative overflow-hidden">
                        {/* Breathtaking background decorative glows */}
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none animate-pulse"></div>
                        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none animate-pulse" style={{ animationDelay: '2s' }}></div>
                        
                        <div className="w-full max-w-sm p-8 bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 rounded-[2.5rem] shadow-2xl shadow-slate-950/85 relative z-10 transition-all duration-300 hover:border-slate-700/80">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg shadow-blue-500/20 border border-blue-400/25 animate-bounce" style={{ animationDuration: '3s' }}><i className="fas fa-brain"></i></div>
                            </div>
                            <h1 className="text-2xl font-black text-center text-white mb-1 tracking-tight font-outfit">Socrates Admin</h1>
                            <p className="text-xs text-center text-slate-400 mb-8 font-bold tracking-widest uppercase">Training Operations Console</p>
                            
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Trainer / Admin ID</label>
                                    <input type="text" id="loginId" placeholder="e.g. ADMIN or TRAINER1" className="w-full bg-slate-950/50 border border-slate-800 focus:border-blue-500 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 outline-none transition-all focus:ring-4 focus:ring-blue-500/10 font-medium" />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Password</label>
                                    <input type="password" id="loginPwd" placeholder="••••••••" className="w-full bg-slate-950/50 border border-slate-800 focus:border-blue-500 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 outline-none transition-all focus:ring-4 focus:ring-blue-500/10 font-medium" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('loginId').value, document.getElementById('loginPwd').value)} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl py-3.5 font-extrabold text-sm transition-all active:scale-[0.98] shadow-lg shadow-blue-500/15 flex items-center justify-center gap-2 mt-6 uppercase tracking-wider">
                                    <span>Secure Access</span>
                                    <i className="fas fa-shield-halved text-xs"></i>
                                </button>
                            </div>

                            {/* Database Diagnostics Badge */}
                            <div className="mt-8 pt-6 border-t border-slate-800/80 flex flex-col items-center">
                                <div className="flex items-center gap-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                                    <span className={`w-1.5 h-1.5 rounded-full ${
                                        dbDiag.connection_status === 'Connected' ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'
                                    }`}></span>
                                    <span>System DB Status:</span>
                                </div>
                                <div className="mt-2 text-[10px] flex flex-wrap justify-center gap-2 font-mono">
                                    <span className={`px-2.5 py-1 rounded-lg font-bold border ${
                                        dbDiag.connection_status === 'Connected' 
                                            ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
                                            : dbDiag.connection_status === 'Checking...'
                                                ? 'bg-amber-500/10 text-amber-400 border-amber-500/20 animate-pulse'
                                                : 'bg-rose-500/10 text-rose-400 border-rose-500/20'
                                    }`}>
                                        <i className={`fas ${dbDiag.database_type === 'PostgreSQL' ? 'fa-database' : 'fa-folder-open'} mr-1`}></i>
                                        {dbDiag.database_type} &bull; {dbDiag.connection_status}
                                    </span>
                                </div>
                                {dbDiag.connection_error && (
                                    <div className="mt-2.5 p-2 bg-rose-500/10 border border-rose-500/20 rounded-lg text-[9px] text-rose-455 font-mono text-center max-w-xs break-all">
                                        Error: {dbDiag.connection_error}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-[100dvh] w-full overflow-hidden bg-slate-100 animate-fade-in">
                    <div className="w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-10 hidden md:flex shrink-0 shadow-xl">
                        <div className="p-6 border-b border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white text-sm shadow-lg shadow-blue-500/20"><i className="fas fa-brain"></i></div>
                                <span className="font-bold text-xl tracking-tight text-white font-outfit">Socrates</span>
                            </div>
                            <p className="text-[10px] text-slate-400 mt-2 uppercase font-black tracking-widest leading-none">{user?.role} OPERATIONS</p>
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto space-y-1">
                            <div onClick={() => setView('dashboard')} className={`sidebar-link ${view==='dashboard'?'active':''}`}><i className="fas fa-layer-group w-5"></i> Dashboard</div>
                            <div onClick={() => { localStorage.removeItem('socrates_active_module'); setView('live_session'); }} className={`sidebar-link ${view==='live_session'?'active':''}`}><i className="fas fa-satellite-dish w-5"></i> Live Session</div>
                            <div onClick={() => setView('library')} className={`sidebar-link ${view==='library'?'active':''}`}><i className="fas fa-robot w-5"></i> AI Library</div>
                            <div onClick={() => setView('roster')} className={`sidebar-link ${view==='roster'?'active':''}`}><i className="fas fa-users-cog w-5"></i> Master Roster</div>
                            <div onClick={() => setView('analytics')} className={`sidebar-link ${view==='analytics'?'active':''}`}><i className="fas fa-chart-pie w-5"></i> Analytics Hub</div>
                            <div onClick={() => setView('travel_hub')} className={`sidebar-link ${view==='travel_hub'?'active':''}`}><i className="fas fa-map-marked-alt w-5"></i> Travel Hub</div>
                            
                            {(isSuperAdmin || isLeader) && (
                                <div onClick={() => setView('access_mgmt')} className={`sidebar-link ${view==='access_mgmt'?'active':''} mt-6 border-t border-slate-800 pt-6`}><i className="fas fa-user-shield w-5 text-purple-400"></i> Access Control</div>
                            )}
                        </div>
                        <div className="p-4 border-t border-slate-800 bg-slate-950/40">
                            <div className="flex items-center gap-3 p-2.5 bg-slate-800/40 backdrop-blur-md rounded-2xl border border-slate-800 shadow-md">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-sm font-black text-white shadow-md uppercase">{user?.name?.substring(0,2)}</div>
                                <div className="min-w-0 flex-1">
                                    <div className="font-bold text-xs text-slate-200 truncate">{user?.name}</div>
                                    <div className="text-[10px] text-slate-400 font-bold cursor-pointer hover:text-rose-400 transition-colors uppercase tracking-wider" onClick={handleLogout}>Sign Out</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex flex-col min-w-0 bg-slate-50/50">
                        {/* Desktop & Tablet Top Bar */}
                        <div className="h-16 md:h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 md:px-8 flex flex-row justify-between items-center sticky top-0 z-30 shadow-sm shrink-0">
                            <div className="flex items-center gap-3 min-w-0">
                                <button 
                                    onClick={() => setIsMobileMenuOpen(true)}
                                    className="md:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-xl shrink-0"
                                >
                                    <i className="fas fa-bars text-lg"></i>
                                </button>
                                <h1 className="text-base md:text-xl font-black text-slate-900 capitalize tracking-tight font-outfit truncate">{view.replace('_', ' ')}</h1>
                                {isSuperAdmin && (
                                    <div className="flex items-center gap-2 bg-purple-50 border border-purple-100 rounded-xl px-3 py-1.5 shrink-0 ml-2 hidden sm:flex">
                                        <i className="fas fa-user-shield text-purple-600 text-[10px]"></i>
                                        <span className="font-black text-purple-800 text-[9px] uppercase tracking-widest">View As:</span>
                                        <select 
                                            value={impersonatedTrainer ? impersonatedTrainer.id : ''}
                                            onChange={(e) => {
                                                const selectedId = e.target.value;
                                                if (!selectedId) setImpersonatedTrainer(null);
                                                else {
                                                    const matched = trainersList.find(t => t.id === selectedId);
                                                    setImpersonatedTrainer(matched || null);
                                                }
                                            }}
                                            className="bg-transparent text-purple-900 font-black outline-none cursor-pointer text-[10px] max-w-[120px] truncate"
                                        >
                                            <option value="">Full Admin</option>
                                            {trainersList.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                        </select>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-2 md:gap-4 shrink-0">
                                {view === 'roster' && (
                                    <button onClick={downloadTemplate} className="h-10 px-4 rounded-xl border border-slate-200 bg-white text-slate-600 font-bold text-xs hover:border-blue-400 transition-all flex items-center gap-2 shadow-sm">
                                        <i className="fas fa-download text-blue-600"></i>
                                        <span className="hidden lg:inline">Get CSV Template</span>
                                    </button>
                                )}
                                <button className="h-10 px-4 md:px-6 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-black text-xs md:text-sm tracking-wider shadow-lg shadow-blue-500/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2" onClick={() => { localStorage.removeItem('socrates_active_module'); setView('live_session'); }}>
                                    <i className="fas fa-play text-[10px]"></i>
                                    <span>LIVE SESSION</span>
                                </button>
                            </div>
                        </div>

                        {/* Main Content Area - Scrollable */}
                        <div className="flex-1 overflow-y-auto no-scrollbar p-4 md:p-8">
                            <div className="max-w-[1600px] mx-auto w-full pb-20 md:pb-4">
                                {renderContent()}
                            </div>
                        </div>
                    </div>

                    {/* Bottom Mobile Navigation Bar (Visible only on mobile screen widths) */}
                    <div className="md:hidden bg-white/95 backdrop-blur-md border-t border-slate-200/80 fixed bottom-0 left-0 right-0 z-40 flex justify-around py-3 shadow-[0_-8px_20px_rgba(0,0,0,0.05)] px-2">
                        {[
                            { id: 'dashboard', icon: 'layer-group', label: 'Home' },
                            { id: 'live_session', icon: 'satellite-dish', label: 'Live' },
                            { id: 'library', icon: 'robot', label: 'AI Library' },
                            { id: 'roster', icon: 'users-cog', label: 'Roster' },
                            { id: 'travel_hub', icon: 'map-marked-alt', label: 'Travel' },
                            { id: 'analytics', icon: 'chart-pie', label: 'Data' }
                        ].map(item => (
                            <button 
                                key={item.id}
                                onClick={() => {
                                    if (item.id === 'live_session') localStorage.removeItem('socrates_active_module');
                                    setView(item.id);
                                }} 
                                className={`flex flex-col items-center gap-1.5 px-2 py-1 transition-all rounded-xl ${
                                    view === item.id ? 'text-blue-600' : 'text-slate-400 opacity-80'
                                }`}
                            >
                                <i className={`fas fa-${item.icon} text-lg ${view === item.id ? 'animate-pulse' : ''}`}></i>
                                <span className="text-[8px] font-black uppercase tracking-tighter">{item.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Mobile Sidebar Navigation Drawer Overlay */}
                    {isMobileMenuOpen && (
                        <div 
                            className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 transition-opacity md:hidden animate-fade-in"
                            onClick={() => setIsMobileMenuOpen(false)}
                        >
                            {/* Slide-over Content Drawer */}
                            <div 
                                className="w-64 max-w-xs h-full bg-slate-900 shadow-2xl flex flex-col transform translate-x-0 transition-transform duration-300 ease-out border-r border-slate-800"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950/20">
                                    <div className="flex items-center gap-2.5">
                                        <div className="w-7 h-7 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center text-white text-xs shadow-md"><i className="fas fa-brain"></i></div>
                                        <span className="font-bold text-lg tracking-tight text-white font-outfit">Socrates</span>
                                    </div>
                                    <button 
                                        onClick={() => setIsMobileMenuOpen(false)}

        const RosterView = ({user}) => {
            const isSuperAdmin = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'superadmin';
            const isLeader = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'leader';
            const [emps, setEmps] = useState([]);
            const [errorMsg, setErrorMsg] = useState('');
            const [errorDetails, setErrorDetails] = useState([]);
            const [successMsg, setSuccessMsg] = useState('');
            const [isUploading, setIsUploading] = useState(false);
            const [isRosterUploading, setIsRosterUploading] = useState(false);
            const [isHistoricalUploading, setIsHistoricalUploading] = useState(false);
            const [uploadStep, setUploadStep] = useState(0);
            const [isLoadingEmps, setIsLoadingEmps] = useState(false);
            const [showManualModal, setShowManualModal] = useState(false);
            
            // Manual form fields
            const [empCode, setEmpCode] = useState('');
            const [empName, setEmpName] = useState('');
            const [branchName, setBranchName] = useState('');
            const [zone, setZone] = useState('NORTH ZONE');
            const [division, setDivision] = useState('');
            const [bu, setBu] = useState('TWO-WHEELER');
            const [role, setRole] = useState('PL Exe');
            const [productName, setProductName] = useState('');
            const [changeDetail, setChangeDetail] = useState('');

            // Dynamic auditing filters
            const [selZone, setSelZone] = useState('');
            const [selDiv, setSelDiv] = useState('');
            const [selBranch, setSelBranch] = useState('');
            const [selBu, setSelBu] = useState('');
            const [selRole, setSelRole] = useState('');
            const [selProduct, setSelProduct] = useState('');
            const [filterOptions, setFilterOptions] = useState({ 
                zones: [], divisions: [], branches: [], divisions_meta: [], branches_meta: [],
                business_units: [], roles: [], products: []
            });

            // Search & counters state
            const [searchQuery, setSearchQuery] = useState('');
            const [totalCount, setTotalCount] = useState(0);
            const [filteredCount, setFilteredCount] = useState(0);

            // Edit form fields & modal
            const [showEditModal, setShowEditModal] = useState(false);
            const [editEmpCode, setEditEmpCode] = useState('');
            const [editEmpName, setEditEmpName] = useState('');
            const [editBranchName, setEditBranchName] = useState('');
            const [editZone, setEditZone] = useState('NORTH ZONE');
            const [editDivision, setEditDivision] = useState('');
            const [editBu, setEditBu] = useState('TWO-WHEELER');
            const [editRole, setEditRole] = useState('PL Exe');
            const [editProductName, setEditProductName] = useState('');
            const [editStatus, setEditStatus] = useState('ACTIVE');
            const [editChangeDetail, setEditChangeDetail] = useState('');

            const loadFilterOptions = () => {
                fetch('/api/roster/filters')
                    .then(res => res.json())
                    .then(data => setFilterOptions(data))
                    .catch(err => console.error("Error loading roster filters:", err));
            };

             const loadEmps = (zoneVal = selZone, divVal = selDiv, branchVal = selBranch, searchVal = searchQuery, buVal = selBu, roleVal = selRole, productVal = selProduct) => {
                setIsLoadingEmps(true);
                let url = '/api/roster?';
                if (zoneVal) url += `zone=${encodeURIComponent(zoneVal)}&`;
                if (divVal) url += `division=${encodeURIComponent(divVal)}&`;
                if (branchVal) url += `branch=${encodeURIComponent(branchVal)}&`;
                if (buVal) url += `business_unit=${encodeURIComponent(buVal)}&`;
                if (roleVal) url += `role=${encodeURIComponent(roleVal)}&`;
                if (productVal) url += `product_name=${encodeURIComponent(productVal)}&`;
                if (searchVal) url += `q=${encodeURIComponent(searchVal)}&`;
                
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        setEmps(data);
                        setFilteredCount(data.length);
                        if (!zoneVal && !divVal && !branchVal && !searchVal && !buVal && !roleVal && !productVal) {
                            setTotalCount(data.length);
                        }
                        setIsLoadingEmps(false);
                    })
                    .catch(err => {
                        console.log("Using offline fallback", err);
                        const fallbackData = db.get('s_roster') || [];
                        setEmps(fallbackData);
                        setFilteredCount(fallbackData.length);
                        if (!zoneVal && !divVal && !branchVal && !searchVal && !buVal && !roleVal && !productVal) {
                            setTotalCount(fallbackData.length);
                        }
                        setIsLoadingEmps(false);
                    });
            };

            const handleFilterChange = (type, val) => {
                let newZone = selZone;
                let newDiv = selDiv;
                let newBranch = selBranch;
                let newBu = selBu;
                let newRole = selRole;
                let newProduct = selProduct;
                
                if (type === 'zone') {
                    newZone = val;
                    setSelZone(val);
                    setSelDiv('');
                    setSelBranch('');
                    newDiv = '';
                    newBranch = '';
                } else if (type === 'division') {
                    newDiv = val;
                    setSelDiv(val);
                    setSelBranch('');
                    newBranch = '';
                } else if (type === 'branch') {
                    newBranch = val;
                    setSelBranch(val);
                } else if (type === 'bu') {
                    newBu = val;
                    setSelBu(val);
                } else if (type === 'role') {
                    newRole = val;
                    setSelRole(val);
                } else if (type === 'product') {
                    newProduct = val;
                    setSelProduct(val);
                }
                
                loadEmps(newZone, newDiv, newBranch, searchQuery, newBu, newRole, newProduct);
            };

            const handleSearch = (val) => {
                setSearchQuery(val);
                loadEmps(selZone, selDiv, selBranch, val, selBu, selRole, selProduct);
            };

            useEffect(() => { 
                loadEmps(); 
                loadFilterOptions();
            }, []);

            // Adaptive Default Filters based on Trainer Scopes
            useEffect(() => {
                if (user && user?.role?.toLowerCase() === 'trainer') {
                    const zonesScope = user.zones && user.zones !== 'ALL' ? user.zones.split(',') : [];
                    const divsScope = user.divisions && user.divisions !== 'ALL' ? user.divisions.split(',') : [];
                    const branchesScope = user.branches && user.branches !== 'ALL' ? user.branches.split(',') : [];
                    
                    let defZone = '';
                    let defDiv = '';
                    let defBranch = '';
                    
                    if (zonesScope.length > 0) defZone = zonesScope[0].trim();
                    if (divsScope.length > 0) defDiv = divsScope[0].trim();
                    if (branchesScope.length > 0) defBranch = branchesScope[0].trim();
                    
                    setSelZone(defZone);
                    setSelDiv(defDiv);
                    setSelBranch(defBranch);
                    
                    loadEmps(defZone, defDiv, defBranch, searchQuery);
                } else if (user && (user?.role?.toLowerCase() === 'superadmin' || user?.role?.toLowerCase() === 'leader')) {
                    // reset defaults
                    setSelZone('');
                    setSelDiv('');
                    setSelBranch('');
                    loadEmps('', '', '', searchQuery);
                }
            }, [user]);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                
                setErrorMsg('');
                setErrorDetails([]);
                setSuccessMsg('');
                setIsUploading(true);
                setIsRosterUploading(true);
                setUploadStep(1);

                const formData = new FormData();
                formData.append('file', file);

                const t1 = setTimeout(() => setUploadStep(2), 700);
                const t2 = setTimeout(() => setUploadStep(3), 1400);
                const t3 = setTimeout(() => setUploadStep(4), 2100);

                const startTime = Date.now();

                fetch('/api/roster/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    const elapsed = Date.now() - startTime;
                    const remainingDelay = Math.max(0, 2800 - elapsed);
                    
                    setTimeout(() => {
                        clearTimeout(t1);
                        clearTimeout(t2);
                        clearTimeout(t3);
                        setIsUploading(false);
                        setIsRosterUploading(false);
                        setUploadStep(0);
                        if (data.status === 'success') {
                            setSuccessMsg(data.message);
                            loadEmps();

                                            <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mt-1.5 shrink-0"></span>
                                            <span>Accepts Date formats: YYYY-MM-DD or YYYY-MM.</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        const LibraryView = ({user}) => {
            const isSuperAdmin = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'superadmin';
            const isLeader = user?.role?.toLowerCase()?.replace(/\s/g, '') === 'leader';
            const [status, setStatus] = useState('idle'); // idle, loading, generating, review
            const [modules, setModules] = useState([]);
            const [title, setTitle] = useState('');
            const [qCount, setQCount] = useState(15);
            const [selectedFile, setSelectedFile] = useState(null);
            const [trainers, setTrainers] = useState([]);
            const [assignedAuditor, setAssignedAuditor] = useState('');
            const [difficulty, setDifficulty] = useState('Medium');
            const [reviewDifficulty, setReviewDifficulty] = useState('Medium');
            const [genLanguage, setGenLanguage] = useState('en');
            const [pastedText, setPastedText] = useState('');
            
            // Auditor review states
            const [reviewModuleId, setReviewModuleId] = useState(null);
            const [reviewTitle, setReviewTitle] = useState('');
            const [reviewQuestions, setReviewQuestions] = useState([]);
            const [activeEditIdx, setActiveEditIdx] = useState(null);

            const loadModules = () => {
                const trId = user?.id || 'ADMIN';
                fetch(`/api/modules?trainer_id=${encodeURIComponent(trId)}`)
                    .then(res => res.json())
                    .then(data => setModules(data))
                    .catch(err => {
                        console.error("Using offline fallback modules:", err);
                        setModules(db.get('s_modules') || []);
                    });
            };
            
            useEffect(() => { 
                loadModules(); 
                fetch('/api/trainers')
                    .then(res => res.json())
                    .then(data => setTrainers(data || []))
                    .catch(err => console.error("Error loading trainers:", err));
            }, []);

            const handleDelete = (id) => {
                if(confirm('Are you sure you want to delete this module?')) {
                    fetch(`/api/modules/${id}`, { method: 'DELETE' })
                        .then(res => res.json())
                        .then(() => {
                            loadModules();
                        })
                        .catch(err => {
                            console.error("Offline delete fallback:", err);
                            const updated = modules.filter(m => m.id !== id);
                            db.set('s_modules', updated);
                            loadModules();
                        });
                }
            };

            const handleExport = (mod) => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(mod, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `${mod.title.toLowerCase().replace(/[^a-z0-9]+/g, '_')}_module.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            };

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (!parsed.title || (!parsed.questions && !parsed.questions_count)) {
                            alert("❌ Invalid Socrates module format. Missing title or questions.");
                            return;
                        }
                        
                        const payload = {
                            title: parsed.title,
                            difficulty: parsed.difficulty || 'Medium',
                            trainer_id: user?.id || 'ADMIN',
                            audited_by: parsed.audited_by || 'Super Admin',
                            questions: (parsed.questions || []).map(q => ({
                                question_text: q.question_text || q.question,
                                options: [q.option_a, q.option_b, q.option_c, q.option_d] || q.options,
                                correctIndex: q.correct_index !== undefined ? q.correct_index : q.correctIndex,
                                approved: q.approved !== undefined ? q.approved : 1,
                                translations: q.translations || {}
                            }))
                        };
                        
                        fetch('/api/modules/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === 'success') {
                                alert(`✓ Module "${parsed.title}" imported successfully!`);
                                loadModules();
                            } else {
                                alert("Import failed: " + data.message);
                            }
                        })
                        .catch(err => {
                            console.error("Import API crash:", err);
                            alert("Error saving imported module to database.");
                        });
                    } catch (err) {
                        alert("❌ Failed to parse JSON file. Make sure it is a valid JSON module.");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reset input
            };

            const startGenerator = () => {
                if(!title) return alert("Please enter a Module Title.");
                
                setStatus('loading');
                const formData = new FormData();
                formData.append('title', title);
                formData.append('count', qCount);
                formData.append('trainer_id', user?.id || 'ADMIN');
                formData.append('difficulty', difficulty);
                formData.append('language', genLanguage);
                if (selectedFile) {
                    formData.append('file', selectedFile);
                }
                if (pastedText) {
                    formData.append('text', pastedText);
                }
                
                fetch('/api/modules/generate', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Open the Auditor panel with generated draft questions
                        setReviewModuleId(null);
                        setReviewTitle(data.title);
                        setReviewDifficulty(data.difficulty || 'Medium');
                        // Map each question to have default approved=0 for auditor to audit
                        const mappedQs = data.questions.map(q => ({
                            question_text: q.question,
                            option_a: q.options[0],
                            option_b: q.options[1],
                            option_c: q.options[2],
                            option_d: q.options[3],
                            correct_index: q.correctIndex,
                            approved: 0,
                            translations: q.translations
                        }));
                        setReviewQuestions(mappedQs);
                        setActiveEditIdx(null);
                        setStatus('review');
                        setTitle('');
                        setSelectedFile(null);
                    } else {
                        alert("AI Generation failed: " + data.message);
                        setStatus('idle');
                    }
                })
                .catch(err => {
                    console.error("AI generator fetch crash:", err);
                    alert("System error. Running offline fallback draft.");
                    setStatus('idle');
                });
            };

            const handleResumeAudit = (mod) => {
                setActiveEditIdx(null);
                setReviewModuleId(mod.id);
                setReviewTitle(mod.title);
                setReviewDifficulty(mod.difficulty || 'Medium');
                // Map from database questions structure back to auditor draft
                const mappedQs = mod.questions.map(q => ({
                    id: q.id,
                    question_text: q.question_text,
                    option_a: q.option_a,
                    option_b: q.option_b,
                    option_c: q.option_c,
                    option_d: q.option_d,
                    correct_index: q.correct_index,
                    approved: q.approved,
                    translations: q.translations
                }));
                setReviewQuestions(mappedQs);
                setStatus('review');
            };

            const toggleQuestionApproval = (idx) => {
                const updated = [...reviewQuestions];
                updated[idx].approved = updated[idx].approved === 1 ? 0 : 1;
                setReviewQuestions(updated);
            };

            const updateQuestionField = (idx, field, value) => {
                const updated = [...reviewQuestions];
                updated[idx][field] = value;
                setReviewQuestions(updated);
            };

            const commitModuleToDb = (isFinalize) => {
                const pendingCount = reviewQuestions.filter(q => q.approved === 0).length;
                
                if (isFinalize && pendingCount > 0) {
                    alert(`⚠️ Cannot Finalize Module. There are still ${pendingCount} questions pending trainer approval. Please audit all questions or click 'Save Draft Progress' instead.`);
                    return;
                }
                
                const payload = {
                    title: reviewTitle,
                    trainer_id: user?.id || 'ADMIN',
                    audited_by: assignedAuditor || 'Awaiting Audit',
                    module_id: reviewModuleId,
                    difficulty: reviewDifficulty,
                    questions: reviewQuestions.map(q => ({
                        question: q.question_text,
                        options: [q.option_a, q.option_b, q.option_c, q.option_d],
                        correctIndex: q.correct_index,
                        approved: q.approved,
                        translations: q.translations
                    }))
                };
                
                fetch('/api/modules/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        setStatus('idle');
                        loadModules();
                    } else {
                        alert("Error saving: " + data.message);
                    }
                })
                .catch(err => {
                    console.error("Save failed:", err);
                    alert("Database save error occurred.");
                });
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 relative">
                    
                    {/* MAKER-CHECKER AUDIT WIZARD MODAL */}
                    {status === 'review' && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col border border-slate-200 overflow-hidden transform transition-all">
                                <div className="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-lg text-socrates-dark flex items-center gap-2">
                                            <i className="fas fa-user-shield text-socrates-primary"></i>
                                            Trainer Auditor Console
                                        </h3>
                                        <p className="text-xs text-socrates-primary font-bold tracking-widest uppercase mt-0.5">{reviewTitle}</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs font-bold bg-amber-50 border border-amber-200 text-amber-800 px-3 py-1 rounded-full">
                                            Audited: {reviewQuestions.filter(q => q.approved === 1).length} / {reviewQuestions.length}
                                        </span>
                                        <button onClick={() => setStatus('idle')} className="text-slate-400 hover:text-slate-700 text-xl"><i className="fas fa-times"></i></button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
                                    {reviewQuestions.map((q, idx) => {
                                        const isApproved = q.approved === 1;
                                        return (
                                            <div 
                                                key={idx} 
                                                className={`p-6 rounded-xl border bg-white transition-all shadow-sm ${isApproved ? 'border-emerald-300 shadow-[0_0_10px_rgba(16,185,129,0.05)]' : 'border-amber-300 shadow-[0_0_10px_rgba(245,158,11,0.05)]'}`}
                                            >
                                                <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                                                    <span className="text-sm font-bold text-slate-800">Socratic Question {idx + 1}</span>
                                                    
                                                    {/* Pending Approval vs Approved Glow Badge */}
                                                    <button 
                                                        onClick={() => toggleQuestionApproval(idx)}
                                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all flex items-center gap-1.5 shadow-sm ${
                                                            isApproved 
                                                                ? 'bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100' 
                                                                : 'bg-amber-50 text-amber-800 border border-amber-200 hover:bg-amber-100'
                                                        }`}
                                                    >
                                                        {isApproved ? (
                                                            <><i className="fas fa-check-circle"></i> ✓ Audited & Approved</>
                                                        ) : (
                                                            <><i className="fas fa-exclamation-circle animate-pulse"></i> ⚠️ Pending Trainer Approval</>
                                                        )}
                                                    </button>
                                                </div>
                                                
                                                {activeEditIdx === idx ? (
                                                    <div className="space-y-4 animate-fade-in">
                                                        <div>
                                                            <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide">Question Dialogue Text</label>
                                                            <textarea 
                                                                value={q.question_text} 
                                                                onChange={(e) => updateQuestionField(idx, 'question_text', e.target.value)}
                                                                className="input-field min-h-[60px]"
                                                            />
                                                        </div>
                                                        
                                                        <div className="grid grid-cols-2 gap-4">
                                                            {['a', 'b', 'c', 'd'].map((ch, i) => (
                                                                <div key={ch} className="relative">
                                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wide">Option {ch.toUpperCase()}</label>
                                                                    <input 
                                                                        type="text" 
                                                                        value={q[`option_${ch}`]} 
                                                                        onChange={(e) => updateQuestionField(idx, `option_${ch}`, e.target.value)}
                                                                        className="input-field pr-12 font-medium"
                                                                    />
                                                                    <button
                                                                        onClick={() => updateQuestionField(idx, 'correct_index', i)}
                                                                        className={`absolute right-2 top-6 w-7 h-7 rounded-md flex items-center justify-center text-xs font-bold transition-all ${
                                                                            q.correct_index === i 
                                                                                ? 'bg-emerald-500 text-white shadow-sm' 
                                                                                : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                                                        }`}
                                                                        title="Set as Correct"
                                                                    >
                                                                        {ch.toUpperCase()}
                                                                    </button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        
                                                        <div className="flex justify-end pt-2">
                                                            <button 
                                                                onClick={() => setActiveEditIdx(null)}
                                                                className="btn-primary py-1.5 px-4 rounded-xl text-xs font-bold bg-slate-800 border-slate-800 hover:bg-slate-900 text-white flex items-center gap-1.5 shadow-sm transition-all"
                                                            >
                                                                <i className="fas fa-check"></i> Done Editing
                                                            </button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="space-y-4 animate-fade-in">
                                                        <p className="text-slate-800 font-bold text-sm sm:text-base leading-relaxed">
                                                            {cleanQuestionText(q.question_text)}
                                                        </p>
                                                        
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                                                            {['a', 'b', 'c', 'd'].map((ch, i) => {
                                                                const optVal = q[`option_${ch}`];
                                                                const isCorrect = q.correct_index === i;
                                                                return (
                                                                    <div 
                                                                        key={ch} 
                                                                        className={`p-3 rounded-xl border flex items-center gap-3 transition-all ${
                                                                            isCorrect 
                                                                                ? 'border-emerald-500 bg-emerald-50/40 text-emerald-950 font-bold shadow-sm' 
                                                                                : 'border-slate-100 bg-slate-50/50 text-slate-600 font-semibold'
                                                                        }`}
                                                                    >
                                                                        <div className={`w-6 h-6 rounded-lg border flex items-center justify-center text-xs font-extrabold shrink-0 ${
                                                                            isCorrect 
                                                                                ? 'border-emerald-500 bg-emerald-500 text-white' 
                                                                                : 'border-slate-200 text-slate-400 bg-white'
                                                                        }`}>
                                                                            {ch.toUpperCase()}
                                                                        </div>
                                                                        <span className="text-xs leading-normal">{cleanOptionText(optVal)}</span>
                                                                        {isCorrect && (
                                                                            <i className="fas fa-check-circle text-emerald-500 ml-auto text-xs shrink-0"></i>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                        
                                                        <div className="flex justify-end pt-3 border-t border-slate-100 mt-2">
                                                            <button 
                                                                onClick={() => setActiveEditIdx(idx)}
                                                                className="btn-outline py-1.5 px-3.5 rounded-xl border-slate-200 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5 text-xs transition-all"
                                                            >
                                                                <i className="fas fa-edit text-slate-400"></i> Edit Question
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="p-5 border-t border-slate-200 bg-slate-50 flex justify-between items-center rounded-b-2xl">
                                    <button onClick={() => setStatus('idle')} className="btn-outline">Cancel</button>
                                    
                                    {/* Socratic Difficulty selector in auditor console */}
                                    <div className="flex items-center gap-2">
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Difficulty:</label>
                                        <select 
                                            value={reviewDifficulty} 
                                            onChange={(e) => setReviewDifficulty(e.target.value)} 
                                            className="px-3 py-1.5 rounded-lg border border-slate-300 bg-white text-xs font-bold text-slate-700 focus:outline-none focus:border-socrates-primary shadow-sm"
                                        >
                                            <option value="Easy">Easy (Low Complexity)</option>
                                            <option value="Medium">Medium (Standard Policy)</option>
                                            <option value="Hard">Hard (Exceptions/Deviations)</option>
                                        </select>
                                    </div>

                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => commitModuleToDb(false)} 
                                            className="btn-outline bg-amber-50/50 border-amber-300 text-amber-700 hover:bg-amber-50"
                                            title="Saves your audited progress to resume later"
                                        >
                                            <i className="fas fa-save mr-1.5"></i> Save Progress as Draft
                                        </button>
                                        <button 
                                            onClick={() => commitModuleToDb(true)} 
                                            className="btn-primary shadow-lg flex items-center gap-1.5"
                                        >
                                            <i className="fas fa-check-double"></i> Finalize & Save Module
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* GENERATOR SETUP */}
                    <div className="card p-8">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="w-10 h-10 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center shadow-sm border border-purple-100"><i className="fas fa-magic text-xl"></i></div>
                            <h3 className="font-bold text-xl text-socrates-dark tracking-tight">AI Module Generator</h3>
                        </div>
                        <p className="text-sm text-slate-500 mb-8 leading-relaxed">Upload a training program PDF or paste text policy. The system will extract it and generate customized MCQs.</p>
                        
                        {status === 'loading' ? (
                            <div className="py-20 text-center space-y-4">
                                <div className="w-16 h-16 border-4 border-socrates-primary border-t-transparent rounded-full fa-spin mx-auto"></div>
                                <h4 className="font-bold text-base text-slate-800 animate-pulse">Socrates AI is generating Socratic questions...</h4>
                                <p className="text-xs text-slate-400 max-w-xs mx-auto">Analyzing policy clauses, generating multiple options, and mapping correct answer structures.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-x-6 gap-y-5">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Module Title</label>
                                        <input 
                                            type="text" 
                                            value={title} 
                                            onChange={(e)=>setTitle(e.target.value)} 
                                            className="input-field bg-white shadow-sm border-slate-300 py-2.5 text-xs font-semibold text-socrates-dark focus:border-socrates-primary focus:ring-2 focus:ring-blue-100" 
                                            placeholder="e.g. KYC Updates" 
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Assign Auditor (Checker)</label>
                                        <select 
                                            value={assignedAuditor} 
                                            onChange={(e) => setAssignedAuditor(e.target.value)} 
                                            className="input-field bg-white shadow-sm border-slate-300 py-2.5 text-xs font-semibold text-socrates-dark focus:border-socrates-primary focus:ring-2 focus:ring-blue-100"
                                        >
                                            <option value="">Awaiting Audit</option>
                                            {trainers.map(t => (
                                                <option key={t.id} value={t.name}>{t.name} ({t.id})</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Difficulty Level</label>
                                        <select 
                                            value={difficulty} 
                                            onChange={(e) => setDifficulty(e.target.value)} 
                                            className="input-field bg-white shadow-sm border-slate-300 py-2.5 text-xs font-semibold text-socrates-dark focus:border-socrates-primary focus:ring-2 focus:ring-blue-100"
                                        >
                                            <option value="Easy">Easy (Low Complexity)</option>
                                            <option value="Medium">Medium (Standard Policy)</option>
                                            <option value="Hard">Hard (Exceptions/Deviations)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Number of Questions</label>
                                        <select 
                                            value={qCount} 
                                            onChange={(e) => setQCount(parseInt(e.target.value))} 
                                            className="input-field bg-white shadow-sm border-slate-300 py-2.5 text-xs font-semibold text-socrates-dark focus:border-socrates-primary focus:ring-2 focus:ring-blue-100"
                                        >
                                            <option value="5">5 Questions</option>
                                            <option value="10">10 Questions</option>
                                            <option value="15">15 Questions</option>
                                            <option value="20">20 Questions</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Translation Language</label>
                                        <select 
                                            value={genLanguage} 
                                            onChange={(e) => setGenLanguage(e.target.value)} 
                                            className="input-field bg-white shadow-sm border-slate-300 py-2.5 text-xs font-semibold text-socrates-dark focus:border-socrates-primary focus:ring-2 focus:ring-blue-100"
                                        >
                                            <option value="en">English Only (Super Fast)</option>
                                            <option value="all">All 9 Languages (Slow)</option>
                                            <option value="hindi">Hindi</option>
                                            <option value="hinglish">Hinglish</option>
                                            <option value="punjabi">Punjabi</option>
                                            <option value="bengali">Bengali</option>
                                            <option value="marathi">Marathi</option>
                                            <option value="telugu">Telugu</option>
                                            <option value="tamil">Tamil</option>
                                            <option value="gujarati">Gujarati</option>
                                            <option value="kannada">Kannada</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Upload Training PDF</label>
                                        <div className="relative">
                                            <input 
                                                type="file" 
                                                accept=".pdf"
                                                onChange={(e) => setSelectedFile(e.target.files[0])}
                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" 
                                            />
                                            <div className="input-field bg-slate-50 shadow-sm border-slate-300 py-2.5 px-4 text-center hover:bg-slate-100 transition-colors flex items-center justify-center gap-2 cursor-pointer overflow-hidden text-ellipsis whitespace-nowrap">
                                                <i className="fas fa-file-pdf text-red-500 text-sm"></i>
                                                <span className="text-xs font-semibold text-slate-600 truncate">
                                                    {selectedFile ? selectedFile.name : "Choose PDF..."}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="relative">
                                    <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                                    <div className="relative flex justify-center text-xs"><span className="bg-white px-2 text-slate-400 font-bold uppercase">OR</span></div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Paste Training Material</label>
                                    <textarea value={pastedText} onChange={(e) => setPastedText(e.target.value)} className="input-field h-24 resize-none" placeholder="Paste policy changes here..."></textarea>
                                </div>
