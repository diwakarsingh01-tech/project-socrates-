                                            { medal: '👑', color: 'amber', size: 'w-80 scale-110', h: 'h-32 md:h-48', order: 'order-1 md:order-2', pulse: true },
                                            { medal: '🥉', color: 'orange', size: 'w-64', h: 'h-16 md:h-24', order: 'order-3' }
                                        ][idx];
                                        return (
                                            <div key={idx} className={`${config.order} flex flex-col items-center w-full ${config.size}`}>
                                                <div className={`w-16 h-16 rounded-full bg-${config.color}-500 border-2 border-white flex items-center justify-center text-xl shadow-lg mb-4 ${config.pulse ? 'animate-pulse' : ''}`}>{config.medal}</div>
                                                <div className="text-slate-200 font-bold mb-4 truncate w-full">{tr.emp_name}</div>
                                                <div className={`w-full bg-${config.color}-900/50 border-t-2 border-${config.color}-500 ${config.h} rounded-t-2xl shadow-xl flex flex-col items-center justify-center`}>
                                                    <span className="text-[10px] text-slate-400 font-black uppercase tracking-widest">{idx === 1 ? 'Grand Champion' : idx === 0 ? 'Runner Up' : '3rd Elite'}</span>
                                                    <span className="text-xl font-black text-white mt-1">{tr.score} pts</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <button onClick={onClose} className="px-10 py-4 bg-white text-slate-900 rounded-full font-black text-lg shadow-xl hover:scale-105 transition-all">
                                    Exit Broadcast Room
                                </button>
                            </div>
                        </div>
                    )}

                    {/* HEADER STATUS BAR */}
                    <div className="bg-white px-6 py-4 flex items-center justify-between border-b border-slate-200 z-30 shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="relative flex h-3 w-3">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-3 w-3 bg-red-600"></span>
                            </div>
                            <div className="hidden sm:block">
                                <h2 className="text-sm font-black text-slate-900 uppercase tracking-tight">Socrates Live Broadcast</h2>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{activeModule?.title || 'No Module Active'}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-100 px-3 py-1.5 rounded-xl border border-slate-200 flex items-center gap-2">
                                <i className="fas fa-users text-slate-400 text-xs"></i>
                                <span className="text-xs font-black text-slate-700">{connectedTrainees.length} <span className="hidden sm:inline">Connected</span></span>
                            </div>
                            <button onClick={onClose} className="p-2.5 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors">
                                <i className="fas fa-power-off text-sm"></i>
                            </button>
                        </div>
                    </div>

                    {/* MAIN BROADCASTING AREA */}
                    <div className="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
                        
                        {/* LEFT: MAIN DISPLAY CARD */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50 flex flex-col">
                            
                            {/* BROADCAST TOOLBAR TABS */}
                            <div className="flex bg-slate-900 p-1.5 rounded-2xl gap-1 self-center mb-8 shadow-2xl">
                                <button onClick={() => setActiveTab('display')} className={`px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${activeTab === 'display' ? 'bg-white text-slate-900 shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="fas fa-desktop"></i> Broadcast
                                </button>
                                <button onClick={() => setActiveTab('leaderboard')} className={`px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${activeTab === 'leaderboard' ? 'bg-white text-slate-900 shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="fas fa-trophy"></i> Rankings
                                </button>
                                <button onClick={() => setActiveTab('trainees')} className={`px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${activeTab === 'trainees' ? 'bg-white text-slate-900 shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="fas fa-users-class"></i> Trainee Feed ({connectedTrainees.length})
                                </button>
                            </div>

                            {activeTab === 'display' && (
                                <div className="flex-1 flex flex-col">
                                    {stage === 'waiting' && (
                                        <div className="m-auto w-full max-w-2xl flex flex-col md:flex-row gap-8 items-center bg-white p-8 md:p-12 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 animate-fade-in">
                                            <div className="flex-1 text-center md:text-left space-y-6">
                                                <span className="px-4 py-1.5 bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-widest rounded-full border border-blue-100">Broadcasting Room Open</span>
                                                <h1 className="text-4xl font-black text-slate-900 tracking-tight leading-tight">Join the Session</h1>
                                                <div className="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200">
                                                    <div className="text-6xl font-black text-blue-600 tracking-[0.2em] font-mono">{sessionId}</div>
                                                    <p className="text-xs text-slate-400 font-bold mt-4 uppercase tracking-widest">Share this PIN with trainees</p>
                                                </div>
                                                <div className="flex flex-col sm:flex-row gap-3">
                                                    <button onClick={() => {
                                                        const text = `*Socrates Session PIN*: ${sessionId}\n*Join Link*: ${window.location.origin}/?pin=${sessionId}`;
                                                        navigator.clipboard.writeText(text);
                                                        alert("Session PIN & Link Copied!");
                                                    }} className="flex-1 py-3 px-6 bg-slate-900 text-white rounded-2xl font-bold text-xs hover:bg-slate-800 transition-all shadow-lg">
                                                        <i className="fas fa-copy mr-2"></i> Copy Invite
                                                    </button>
                                                    <button onClick={() => {
                                                        const text = `*Socrates AI Training PIN*: ${sessionId}\nJoin here: ${window.location.origin}/?pin=${sessionId}`;
                                                        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
                                                    }} className="flex-1 py-3 px-6 bg-emerald-500 text-white rounded-2xl font-bold text-xs hover:bg-emerald-600 transition-all shadow-lg">
                                                        <i className="fab fa-whatsapp mr-2 text-sm"></i> WhatsApp PIN
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="shrink-0 p-6 bg-slate-50 rounded-[2rem] border border-slate-200 shadow-inner">
                                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(window.location.origin + '/?pin=' + sessionId)}`} alt="QR Code" className="w-48 h-48 md:w-56 md:h-56 mix-blend-multiply" />
                                                <p className="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mt-4">Scan to Join Live</p>
                                            </div>
                                        </div>
                                    )}

                                    {(stage === 'pretest' || stage === 'posttest') && (
                                        <div className="max-w-4xl mx-auto w-full space-y-8 animate-fade-in flex-1 flex flex-col">
                                            <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden flex-1">
                                                <div className="p-8 md:p-12 h-full flex flex-col">
                                                    <div className="flex items-center justify-between mb-8">
                                                        <div className="flex items-center gap-2">
                                                            <span className="px-3 py-1 bg-purple-50 text-purple-600 text-[10px] font-black uppercase tracking-widest rounded-full border border-purple-100">{stage === 'pretest' ? 'Pre-Test' : 'Post-Test'}</span>
                                                            <span className="text-xs text-slate-400 font-bold tracking-widest uppercase">Q{activeQIdx + 1} / {currentQ.totalQs}</span>
                                                        </div>
                                                        <div className="flex items-center gap-1.5">
                                                            <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
                                                            <span className="text-xs text-slate-500 font-bold uppercase tracking-widest">{totalVotes} Responses</span>
                                                        </div>
                                                    </div>
                                                    <h3 className="text-2xl md:text-3xl font-black text-slate-900 leading-tight mb-12">{cleanQuestionText(currentQ.question)}</h3>
                                                    
                                                    <div className="space-y-4 mt-auto">
                                                        {currentQ.options.map((opt, i) => {
                                                            const pct = totalVotes === 0 ? 0 : Math.round((votes[i]/totalVotes)*100);
                                                            const isCorrect = i === currentQ.correctIndex;
                                                            return (
                                                                <div key={i} className="group relative">
                                                                    <div className={`absolute inset-0 bg-slate-100 rounded-2xl transition-all duration-700 ${isCorrect ? 'bg-emerald-50/50' : ''}`} style={{ width: `${pct}%` }}></div>
                                                                    <div className={`relative flex items-center justify-between p-5 rounded-2xl border-2 transition-all ${isCorrect ? 'border-emerald-200' : 'border-slate-100'}`}>
                                                                        <div className="flex items-center gap-4">
                                                                            <span className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm border-2 ${isCorrect ? 'bg-emerald-500 text-white border-emerald-400' : 'bg-white text-slate-400 border-slate-100'}`}>{String.fromCharCode(65 + i)}</span>
                                                                            <span className={`font-bold text-sm ${isCorrect ? 'text-emerald-700' : 'text-slate-600'}`}>{cleanOptionText(opt)}</span>
                                                                        </div>
                                                                        <div className="flex items-center gap-4">
                                                                            {isCorrect && <i className="fas fa-check-circle text-emerald-500 text-lg"></i>}
                                                                            <span className="text-sm font-black text-slate-900">{pct}%</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="bg-white p-2 rounded-2xl border border-slate-200 shadow-sm flex gap-2">
                                                <button onClick={() => navigateToQuestion(activeQIdx - 1)} disabled={activeQIdx === 0} className="flex-1 py-4 text-xs font-black uppercase tracking-widest text-slate-600 hover:bg-slate-50 rounded-xl disabled:opacity-30 transition-all"><i className="fas fa-arrow-left mr-2"></i> Prev</button>
                                                <button onClick={() => navigateToQuestion(activeQIdx + 1)} disabled={activeQIdx >= currentQ.totalQs - 1} className="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 shadow-lg disabled:opacity-30 transition-all">Next <i className="fas fa-arrow-right ml-2"></i></button>
                                            </div>
                                        </div>
                                    )}

                                    {stage === 'training' && (
                                        <div className="m-auto text-center space-y-8 animate-fade-in bg-white p-16 rounded-[3rem] shadow-xl border border-slate-100">
                                            <div className="w-24 h-24 bg-blue-50 rounded-[2rem] shadow-inner flex items-center justify-center text-4xl text-blue-600 mx-auto border border-blue-100"><i className="fas fa-lock"></i></div>
                                            <div>
                                                <h1 className="text-4xl font-black text-slate-900 tracking-tight">Dialogue Phase Active</h1>
                                                <p className="text-slate-500 font-bold max-w-sm mx-auto mt-4 uppercase text-xs tracking-widest">Screens are locked for training</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'leaderboard' && (
                                <div className="max-w-4xl mx-auto w-full bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden animate-slide-up flex-1 flex flex-col">
                                    <div className="px-10 py-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                        <div>
                                            <h4 className="font-black text-slate-900 text-xl uppercase tracking-tight">Live Rankings</h4>
                                            <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Accuracy Leaderboard</p>
                                        </div>
                                        <span className="text-xs font-black text-emerald-600 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100 uppercase">Live Update</span>
                                    </div>
                                    <div className="flex-1 overflow-y-auto divide-y divide-slate-50">
                                        {leaderboard.length > 0 ? leaderboard.map((tr, idx) => (
                                            <div key={idx} className="px-10 py-6 flex items-center justify-between hover:bg-slate-50 transition-colors">
                                                <div className="flex items-center gap-6">
                                                    <span className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-lg ${idx < 3 ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-400'}`}>{idx + 1}</span>
                                                    <div>
                                                        <div className="text-base font-black text-slate-900">{tr.emp_name}</div>
                                                        <div className="text-xs text-slate-400 font-bold uppercase tracking-wider">{tr.emp_code}</div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-12">
                                                    <div className="flex gap-3">
                                                        <div className="text-center"><div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Correct</div><div className="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-lg font-black">{tr.correct_count}</div></div>
                                                        <div className="text-center"><div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Wrong</div><div className="px-3 py-1 bg-rose-50 text-rose-600 rounded-lg font-black">{tr.wrong_count}</div></div>
                                                    </div>
                                                    <div className="text-right w-24">
                                                        <div className="text-2xl font-black text-slate-900">{tr.score}</div>
                                                        <div className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Points</div>
                                                    </div>
                                                </div>
                                            </div>
                                        )) : (
                                            <div className="m-auto text-center py-20">
                                                <i className="fas fa-trophy text-slate-200 text-6xl mb-4"></i>
                                                <p className="text-slate-400 font-bold italic uppercase text-xs tracking-widest">Awaiting assessment submissions...</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'trainees' && (
                                <div className="max-w-6xl mx-auto w-full bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden animate-slide-up flex-1 flex flex-col">
                                    <div className="px-10 py-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                        <div>
                                            <h4 className="font-black text-slate-900 text-xl uppercase tracking-tight">Connected Trainees</h4>
                                            <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Real-time attendance feed</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="text-xs font-black text-blue-600 bg-blue-50 px-4 py-2 rounded-full border border-blue-100 uppercase">{connectedTrainees.length} Live</span>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-10">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                                            {connectedTrainees.map((u, idx) => (
                                                <div key={idx} className="bg-slate-50 border border-slate-100 p-6 rounded-[2rem] flex flex-col items-center text-center group hover:bg-white hover:border-blue-300 hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                                                    <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-black text-white text-xl mb-4 shadow-lg group-hover:scale-110 transition-transform">{u.name.substring(0,2)}</div>
                                                    <div className="text-xs font-black text-slate-900 truncate w-full mb-1">{u.name}</div>
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-tight">{u.id}</div>
                                                    <div className="mt-4 flex items-center gap-1.5">
                                                        <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                                                        <span className="text-[8px] font-black text-emerald-600 uppercase tracking-widest">Connected</span>
                                                    </div>
                                                </div>
                                            ))}
                                            {connectedTrainees.length === 0 && (
                                                <div className="col-span-full py-20 text-center">
                                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fas fa-users-slash text-slate-300 text-3xl"></i></div>
                                                    <p className="text-slate-400 font-bold italic uppercase text-xs tracking-widest leading-loose">No trainees connected yet.<br/>Share the PIN to start the feed.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* RIGHT: MASTER CONTROL CONSOLE */}
                        <div className="hidden lg:flex w-96 bg-white border-l border-slate-200 flex-col shadow-[-10px_0_30px_rgba(0,0,0,0.02)] z-20">
                            <div className="p-8 space-y-8 overflow-y-auto">
                                <div className="space-y-4">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><i className="fas fa-sliders-h text-blue-600"></i> Mission Control</h4>
                                    <div className="space-y-3">
                                        {['pretest', 'training', 'posttest'].map((v, i) => (
                                            <button key={v} onClick={() => pushView(v)} className={`w-full group relative overflow-hidden flex items-center justify-between p-4 rounded-2xl border-2 transition-all ${stage === v ? 'border-blue-600 bg-blue-50 shadow-md' : 'border-slate-100 hover:border-blue-200'}`}>
                                                <div className="text-left">
                                                    <div className={`text-[10px] font-black uppercase tracking-widest ${stage === v ? 'text-blue-600' : 'text-slate-400'}`}>Phase 0{i+1}</div>
                                                    <div className={`text-sm font-black ${stage === v ? 'text-blue-700' : 'text-slate-700'}`}>{v === 'training' ? 'Lock Screens' : `Push ${v.charAt(0).toUpperCase() + v.slice(1)}`}</div>
                                                </div>
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${stage === v ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400 group-hover:bg-blue-100 group-hover:text-blue-600'}`}>
                                                    <i className={`fas fa-${v === 'training' ? 'lock' : v === 'pretest' ? 'paper-plane' : 'bolt'} text-xs`}></i>
                                                </div>
                                            </button>
                                        ))}
                                        <button onClick={triggerFinalPodium} className="w-full mt-4 p-4 bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl text-white font-black text-sm uppercase tracking-widest shadow-xl shadow-amber-200 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3"><i className="fas fa-crown"></i> Launch Podium</button>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><i className="fas fa-language text-purple-600"></i> Broadcast Language</h4>
                                    <div className="grid grid-cols-2 gap-2">
                                        {['en', 'hindi', 'hinglish', 'marathi', 'telugu', 'tamil'].map(l => (
                                            <button key={l} onClick={() => broadcastLanguageOverride(l)} className={`py-2 px-3 rounded-xl border text-[10px] font-bold transition-all ${selectedLanguageOverride === l ? 'bg-slate-900 text-white border-slate-900 shadow-lg' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>{l.toUpperCase()}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center justify-between">
                                        <span><i className="fas fa-users-class text-emerald-600 mr-2"></i> Connected Feed</span>
                                        <span className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">{connectedTrainees.length}</span>
                                    </h4>
                                    <div className="max-h-60 overflow-y-auto pr-2 space-y-2 no-scrollbar">
                                        {connectedTrainees.map((u, idx) => (
                                            <div key={idx} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <div className="w-8 h-8 rounded-lg bg-white flex items-center justify-center font-bold text-[10px] text-socrates-primary border border-slate-200">{u.name.substring(0,2)}</div>
                                                <div className="min-w-0 flex-1">
                                                    <div className="text-[11px] font-black text-slate-800 truncate">{u.name}</div>
                                                    <div className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">{u.id}</div>
                                                </div>
                                                <div className="ml-auto w-1.5 h-1.5 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* MOBILE TAB BAR */}
                        <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 flex gap-4 z-[50] shadow-[0_-10px_30px_rgba(0,0,0,0.1)]">
                            <button onClick={() => pushView('pretest')} className={`flex-1 flex flex-col items-center py-2 rounded-2xl ${stage === 'pretest' ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}><i className="fas fa-paper-plane mb-1 text-sm"></i><span className="text-[8px] font-black uppercase tracking-widest">Pre-Test</span></button>
                            <button onClick={() => pushView('training')} className={`flex-1 flex flex-col items-center py-2 rounded-2xl ${stage === 'training' ? 'text-amber-500 bg-amber-50' : 'text-slate-400'}`}><i className="fas fa-lock mb-1 text-sm"></i><span className="text-[8px] font-black uppercase tracking-widest">Lock</span></button>
                            <button onClick={() => pushView('posttest')} className={`flex-1 flex flex-col items-center py-2 rounded-2xl ${stage === 'posttest' ? 'text-emerald-600 bg-emerald-50' : 'text-slate-400'}`}><i className="fas fa-bolt mb-1 text-sm"></i><span className="text-[8px] font-black uppercase tracking-widest">Post-Test</span></button>
                            <button onClick={triggerFinalPodium} className="flex-1 flex flex-col items-center py-2 rounded-2xl text-amber-600 bg-amber-50 border border-amber-200 shadow-sm"><i className="fas fa-crown mb-1 text-sm"></i><span className="text-[8px] font-black uppercase tracking-widest">Podium</span></button>
                        </div>
                    </div>
                </div>
            );
        };


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    {% endraw %}
    </script>
</body>
</html>
